# Temporary bridge: the Claude Code cloud environment cannot download from
# Canva's export domain, so this action fetches the generated lesson artwork
# (URLs listed in _art_manifest.json) and commits it to the branch.
# Remove this workflow and the manifest once all artwork is in the repo.
name: Fetch lesson artwork
on:
  push:
    branches: [ "claude/mobile-manuals-audio-hub-4t8ona" ]
    paths: [ "_art_manifest.json" ]
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artwork listed in manifest
        run: |
          mkdir -p assets/images/lessons
          node -e '
            const fs = require("fs");
            const { execFileSync } = require("child_process");
            const m = JSON.parse(fs.readFileSync("_art_manifest.json", "utf8"));
            let fail = 0;
            for (const [file, url] of Object.entries(m)) {
              if (!/^[a-z0-9_.-]+$/i.test(file)) { console.error("BAD NAME:", file); fail++; continue; }
              const out = "assets/images/lessons/" + file;
              try {
                execFileSync("curl", ["-sSfL", "--retry", "3", "-o", out, url], { stdio: "inherit" });
                const sz = fs.statSync(out).size;
                console.log(file, sz, "bytes");
                if (sz < 5000) { console.error("TOO SMALL:", file); fs.unlinkSync(out); fail++; }
              } catch (e) { console.error("FAILED:", file, e.message); fail++; }
            }
            console.log((Object.keys(m).length - fail) + " ok, " + fail + " failed");
          '
      - name: Commit artwork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/lessons
          git diff --cached --quiet || git commit -m "Add generated lesson artwork (automated download)"
          git push
