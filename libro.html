<!DOCTYPE html>
<html lang="es">
<head>
<script src="vesper_auth.js"></script>
<script src="vesper_exam_index.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro del estudiante | Vesper Academy</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/images/vesper_logo.png" type="image/png">
<style>
/* Pantalla de carga / error — el libro real sustituye al documento al cargar */
:root{--navy:#1B1B2F;--navy2:#2c2c4a;--gold:#c5a059;--cream:#f5f2eb;--err:#b03a3a;}
html,body{height:100%;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;
  background:var(--navy);background-image:radial-gradient(ellipse at 30% 20%,#2c2c4a 0%,#1B1B2F 70%);padding:20px;}
.card{background:var(--cream);width:100%;max-width:430px;border-radius:14px;overflow:hidden;
  box-shadow:0 18px 50px rgba(0,0,0,.45);text-align:center;}
.card .head{background:var(--navy);color:var(--cream);padding:24px 30px 18px;border-bottom:4px solid var(--gold);}
.card .head h1{font-family:Georgia,serif;font-size:20px;letter-spacing:1.5px;font-weight:normal;margin:0;}
.card .head h1 b{color:#d9bd84;}
.card .head p{font-size:11.5px;opacity:.8;margin:6px 0 0;letter-spacing:1px;text-transform:uppercase;}
.card .body{padding:28px 30px 30px;color:#3a3325;font-size:14.5px;line-height:1.6;}
.spinner{width:34px;height:34px;border:3px solid #d4c9ae;border-top-color:var(--gold);border-radius:50%;
  margin:0 auto 16px;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:var(--err);font-weight:600;}
.muted{color:#8d8270;font-size:12.5px;margin-top:14px;}
.body a.btn{display:inline-block;margin-top:18px;padding:11px 22px;background:var(--navy);color:var(--cream);
  border-radius:7px;text-decoration:none;font-size:14px;letter-spacing:.5px;}
.body a.btn:hover{background:var(--navy2);}
.body a.plain{color:#6b5d3f;font-size:13px;display:inline-block;margin-top:12px;}
/* Foco de teclado visible (WCAG 2.4.7) */
:focus-visible{outline:3px solid var(--gold,#c5a059);outline-offset:2px}
</style>
<link rel="stylesheet" href="assets/css/vesper_tokens.css">
</head>
<body>

<div class="card">
  <div class="head">
    <h1>VESPER <b>ACADEMY</b></h1>
    <p>Libro del estudiante</p>
  </div>
  <div class="body" id="status">
    <div class="spinner"></div>
    <div id="status-msg">Cargando libro&hellip;</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var statusEl = document.getElementById("status");
  var msgEl = document.getElementById("status-msg");

  function fail(html) {
    statusEl.innerHTML = html +
      '<a class="plain" href="materiales.html">&larr; Volver a mis materiales</a>';
  }
  function note(text) { msgEl.textContent = text; }

  /* ── 1. Validar el id pedido ── */
  var id = new URLSearchParams(location.search).get("id") || "";
  if (!/^[a-z0-9_]{1,60}$/.test(id)) {
    fail('<div class="err">Libro no especificado.</div>' +
         '<div class="muted">Abre un libro desde el portal del alumno.</div>');
    return;
  }

  if (!window.VesperAuth) {
    fail('<div class="err">No se pudo cargar el control de acceso.</div>' +
         '<div class="muted">Recarga la p&aacute;gina.</div>');
    return;
  }

  /* Base de Firestore donde viven los libros (debe coincidir con
     DB_ID en _scripts/upload_manuals.py) */
  var DB_ID = "teachermanuals";

  /* ── 2. Sesión de Firebase (el candado de vesper_auth.js ya redirige
         en el sitio publicado; esto cubre ademas localhost/file://) ── */
  VesperAuth.initFirebase().then(function (auth) {
    var settled = false;
    auth.onAuthStateChanged(function (user) {
      if (settled) return;
      settled = true;

      var next = encodeURIComponent("libro.html" + location.search);
      if (!user) {
        fail('<div class="err">Necesitas iniciar sesi&oacute;n.</div>' +
             '<a class="btn" href="login.html?next=' + next + '">Iniciar sesi&oacute;n</a>');
        return;
      }
      if (!user.emailVerified) {
        fail('<div class="err">Tu correo a&uacute;n no est&aacute; verificado.</div>' +
             '<div class="muted">Busca el correo de verificaci&oacute;n y vuelve a entrar.</div>' +
             '<a class="btn" href="login.html?verify=1&next=' + next + '">Ir al acceso</a>');
        return;
      }

      note("Descargando libro…");
      fetchBook(user);
    });
  }).catch(function () {
    fail('<div class="err">Sin conexi&oacute;n con el servicio de acceso.</div>' +
         '<div class="muted">Revisa tu conexi&oacute;n e int&eacute;ntalo de nuevo.</div>');
  });

  /* ── 3. Descargar el libro desde Firestore vía REST (las reglas del
         servidor solo lo permiten a alumnos y profesores autorizados).
         Se usa REST y no el SDK porque la base tiene id propio. ── */
  function fetchBook(user) {
    var base = "https://firestore.googleapis.com/v1/projects/" +
               VesperAuth.config.firebase.projectId + "/databases/" + DB_ID +
               "/documents/studentbooks/" + id;

    user.getIdToken().then(function (token) {
      function getDoc(url) {
        return fetch(url, { headers: { "Authorization": "Bearer " + token } })
          .then(function (r) {
            return r.json().then(function (j) { return { status: r.status, body: j }; });
          });
      }

      getDoc(base).then(function (meta) {
        if (meta.status === 403) {
          fail('<div class="err">Tu cuenta a&uacute;n no tiene acceso de alumno.</div>' +
               '<div class="muted">Sesi&oacute;n: ' + (user.email || "") +
               '<br>P&iacute;dele a tu profesor o a la academia que activen tu correo.</div>');
          return;
        }
        if (meta.status === 404) {
          fail('<div class="err">Este libro a&uacute;n no est&aacute; disponible en l&iacute;nea.</div>' +
               '<div class="muted">La academia todav&iacute;a no lo ha subido al servidor.</div>');
          return;
        }
        if (meta.status !== 200) {
          fail('<div class="err">No se pudo cargar el libro (HTTP ' + meta.status + ').</div>' +
               '<div class="muted">Int&eacute;ntalo de nuevo en unos minutos.</div>');
          return;
        }

        var f = meta.body.fields || {};
        var count = parseInt((f.chunkCount || {}).integerValue || "1", 10);
        var bookTitle = (f.title || {}).stringValue || id;
        note("Abriendo: " + bookTitle);

        /* Rastreador ligero para el héroe "Hoy" del portal (materiales.html):
           recuerda el último libro abierto con éxito. Cross-página, durable. */
        try {
          localStorage.setItem("vesper_last", JSON.stringify({
            href: "libro.html?id=" + id, title: bookTitle, kind: "libro", ts: Date.now()
          }));
        } catch (e) {}

        var jobs = [];
        for (var i = 0; i < count; i++) { jobs.push(getDoc(base + "/chunks/" + i)); }
        Promise.all(jobs).then(function (parts) {
          var html = parts.map(function (p) {
            return (p.status === 200 && ((p.body.fields || {}).html || {}).stringValue) || "";
          }).join("");
          if (html.length < 100) {
            fail('<div class="err">El libro se descarg&oacute; incompleto.</div>' +
                 '<div class="muted">Avisa a la academia para que lo vuelva a subir.</div>');
            return;
          }
          render(html);
        });
      }).catch(function () {
        fail('<div class="err">No hay conexi&oacute;n con el servidor de libros.</div>' +
             '<div class="muted">Revisa tu conexi&oacute;n e int&eacute;ntalo de nuevo.</div>');
      });
    }).catch(function () {
      fail('<div class="err">No se pudo validar tu sesi&oacute;n.</div>' +
           '<div class="muted">Cierra sesi&oacute;n y vuelve a entrar.</div>');
    });
  }

  /* ── 4. Renderizar: el libro sustituye a esta página por completo,
         así su CSS de impresión y sus scripts funcionan tal cual ── */
  function render(html) {
    /* el candado ya se pasó aquí: quita su <script> del documento del libro */
    html = html.replace(/<script[^>]*src=["']vesper_auth\.js["'][^>]*>\s*<\/script>/gi, "");

    /* arreglo móvil: los libros se generan con ancho de papel A4 (210mm),
       así que en el teléfono se ven apretados. Se inyecta un viewport (si
       falta) y overrides solo-móvil; la impresión no cambia porque todo va
       dentro del media query. */
    var mobileFix = "";
    if (!/<meta[^>]+name=["']?viewport/i.test(html)) {
      mobileFix += '<meta name="viewport" content="width=device-width, initial-scale=1.0">';
    }
    mobileFix +=
      '<style id="vesper-mobile-fix">' +
      'img{max-width:100%;height:auto;}' +
      /* la navegación propia del libro ("← Dashboard" a index/hub) no aplica
         dentro del visor: el visor pone su propio chip de regreso. Ocultarla
         también evita que sus reglas móviles (.no-print{top/left}) estiren
         los chips inyectados a pantalla completa. */
      '.no-print:not(.vm-chip){display:none!important;}' +
      '@media (max-width:768px){' +
        'html,body{overflow-x:hidden!important;}' +
        '*{overflow-wrap:break-word;}' +
        'body{padding:8px!important;}' +
        '.book-container{max-width:100%!important;width:auto!important;padding:18px 14px!important;box-shadow:none!important;}' +
        'h1{font-size:1.55em!important;margin-top:30px!important;}' +
        'h2{font-size:1.25em!important;padding-left:10px!important;}' +
        'h3{font-size:1.1em!important;}' +
        '.cover-page{height:auto!important;min-height:60vh;}' +
        '.cover-title{font-size:2.1em!important;}' +
        '.cover-subtitle{font-size:1.15em!important;}' +
        '.cover-logo{max-width:130px!important;}' +
        '.lesson-block{padding:16px 12px!important;}' +
        '.script-box,.vocab-list,.idiom-list,.question-box,.activity-box,.media-box{padding:12px 10px!important;}' +
        'table{display:block!important;overflow-x:auto!important;max-width:100%!important;-webkit-overflow-scrolling:touch;}' +
        'pre{white-space:pre-wrap!important;max-width:100%!important;}' +
        '[style*="width"]{max-width:100%!important;}' +
        /* ── el arreglo clave: los libros usan .page A4 con 12mm (~45px) de
           relleno lateral en móvil, que se come ~24% del ancho y aprieta todo.
           Bajarlo a 16px y re-ajustar los elementos "a sangre" (que salen al
           borde con margen negativo = al relleno de la página) para que no se
           desborden. Aplica a TODAS las pieles (base/premium2/basics/bespoke). ── */
        '.page:not(.cover-page){padding:16px 16px 30px!important;}' +
        '.cover-page{padding-left:18px!important;padding-right:18px!important;}' +
        '.module-header{margin-left:-16px!important;margin-right:-16px!important;margin-top:-16px!important;padding-left:16px!important;padding-right:16px!important;}' +
        '.lesson-title{margin-left:-16px!important;margin-right:-16px!important;padding-left:18px!important;padding-right:18px!important;}' +
        '.toolkit-divider{margin-left:-16px!important;margin-right:-16px!important;padding-left:16px!important;padding-right:16px!important;}' +
        '.lesson-block{padding:15px 15px 16px!important;}' +
        '.vesper-hero{padding:13px 14px!important;gap:12px!important;}' +
        '.vesper-hero .vh-cat{flex:0 0 44px!important;width:44px!important;height:44px!important;}' +
        '.lesson-block .lb-header{gap:11px!important;}' +
        '.lesson-block .lb-header i{flex:0 0 34px!important;width:34px!important;height:34px!important;}' +
        '.lesson-block .lb-header::before{left:46px!important;}' +
        '.tier,.yourturn{padding:11px 13px!important;}' +
        '.vcard{padding:10px 12px!important;gap:9px!important;}' +
        '.page-num{left:16px!important;right:16px!important;}' +
        /* índice (TOC): en móvil pasa de 2 columnas apretadas a 1 sola,
           y los títulos largos ya pueden encoger/envolver sin desbordar. */
        '.toc-grid{grid-template-columns:1fr!important;gap:8px 0!important;}' +
        '.toc-item,.toc-item a{min-width:0!important;}' +
      '}' +
      '</style>';
    if (/<\/head>/i.test(html)) {
      html = html.replace(/<\/head>/i, mobileFix + "</head>");
    } else {
      html = mobileFix + html;
    }

    /* botón flotante para volver al portal.
       vm-chip: blindaje contra el CSS de los libros — su regla móvil
       .no-print{top:10px;left:10px} fijaba top+bottom y left+right a la vez
       y estiraba estos pills a pantalla completa. */
    var chip =
      '<a href="materiales.html" style="position:fixed;top:auto;bottom:calc(14px + env(safe-area-inset-bottom));left:14px;right:auto;z-index:99999;' +
      'background:#1B1B2F;color:#f5efe2;font:12px/1 sans-serif;padding:9px 14px;border-radius:20px;' +
      'opacity:.88;box-shadow:0 2px 8px rgba(0,0,0,.3);text-decoration:none;" ' +
      'onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.88" class="no-print vm-chip vm-chip-l">' +
      '&larr; Mis materiales</a>';
    /* chip de examen: solo si este libro tiene un examen publicado */
    if ((window.VESPER_EXAM_IDS || []).indexOf(id) !== -1) {
      chip +=
        '<a href="exam.html?course=' + encodeURIComponent(id) + '" style="position:fixed;top:auto;bottom:calc(14px + env(safe-area-inset-bottom));right:14px;left:auto;z-index:99999;' +
        'background:#c5a059;color:#1B1B2F;font:700 12px/1 sans-serif;padding:9px 14px;border-radius:20px;' +
        'opacity:.92;box-shadow:0 2px 8px rgba(0,0,0,.3);text-decoration:none;" ' +
        'onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.92" class="no-print vm-chip vm-chip-r">' +
        'Presentar examen &rarr;</a>';
    }
    chip += '<style>' +
      'a.vm-chip{position:fixed!important;top:auto!important;width:auto!important;height:auto!important;display:inline-block!important;}' +
      'a.vm-chip-l{left:14px!important;right:auto!important;bottom:calc(14px + env(safe-area-inset-bottom))!important;}' +
      'a.vm-chip-r{right:14px!important;left:auto!important;bottom:calc(14px + env(safe-area-inset-bottom))!important;}' +
      '@keyframes vmFlash{0%,100%{box-shadow:0 0 0 0 rgba(197,160,89,0);}18%{box-shadow:0 0 0 4px rgba(197,160,89,.7),0 0 26px 6px rgba(197,160,89,.45);}}' +
      '.vm-jump{animation:vmFlash 2.4s ease-out 1;}' +
      '@media print{a.no-print{display:none!important}}</style>';

    /* Enlace profundo a una lección: si la URL trae #anchor (desde el buscador
       de temas del portal), lleva el scroll a esa lección y la resalta. Como el
       libro reemplaza el documento con document.write, el navegador no aplica
       el fragmento solo; lo hacemos a mano tras pintar. */
    chip += '<script>(function(){var h=(location.hash||"").replace(/^#/,"");' +
      'if(!/^[a-z0-9_]{1,40}$/i.test(h))return;' +
      'function jump(){var el=document.getElementById(h);if(!el)return;' +
      'try{el.scrollIntoView({behavior:"smooth",block:"start"});}catch(e){el.scrollIntoView();}' +
      'el.classList.add("vm-jump");setTimeout(function(){el.classList.remove("vm-jump");},2500);}' +
      'if(document.readyState==="complete"){setTimeout(jump,120);}' +
      'else{window.addEventListener("load",function(){setTimeout(jump,120);});}})();<\/script>';

    /* Blindaje de enlaces "practicar en la app": algunos libros traen botones
       hacia leccion.html?id=… (o lesson.html?id=…) usando el ancla LOCAL de la
       lección (l1, sl1, lesson3…). Ese id NO existe en el motor de lecciones de
       la app, así que el alumno caía en "Lección no encontrada". Si el id apunta
       a una lección que vive AQUÍ (el libro tiene ese ancla), lo mantenemos
       dentro del libro (scroll + resalte) en vez de mandarlo a un id inexistente.
       Si el id sí es una lección real de la app (el libro no tiene ese ancla),
       dejamos que navegue con normalidad. */
    chip += '<script>(function(){' +
      'document.addEventListener("click",function(e){' +
      'var a=e.target&&e.target.closest?e.target.closest("a[href]"):null;if(!a)return;' +
      'var m=(a.getAttribute("href")||"").match(/(?:^|\\/)(?:leccion|lesson)\\.html\\?(?:[^#]*&)?id=([a-z0-9_:-]+)/i);' +
      'if(!m)return;var el=document.getElementById(m[1]);if(!el)return;' +
      'e.preventDefault();' +
      'try{el.scrollIntoView({behavior:"smooth",block:"start"});}catch(_){el.scrollIntoView();}' +
      'el.classList.add("vm-jump");setTimeout(function(){el.classList.remove("vm-jump");},2500);' +
      '},true);})();<\/script>';
    if (/<\/body>/i.test(html)) {
      html = html.replace(/<\/body>(?![\s\S]*<\/body>)/i, chip + "</body>");
    } else {
      html += chip;
    }

    document.open();
    document.write(html);
    document.close();
  }
})();
</script>
</body>
</html>
