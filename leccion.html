<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lecciones gratis · Vesper Academy</title>
<meta name="description" content="Aprende ingles gratis, sin cuenta. Lecciones cortas con ejercicios, racha diaria y XP.">
<link rel="icon" href="assets/images/favicon_32.png" sizes="32x32">
<link rel="manifest" href="manifest_lecciones.webmanifest">
<meta name="theme-color" content="#1B1B2F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vesper Lecciones">
<link rel="apple-touch-icon" href="assets/images/apple_touch_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1B2F; --gold:#C9A84C; --success:#2D9E75; --error:#C0392B;
    --cream:#FBF8F1; --paper:#ffffff; --muted:#6b6b76; --line:#ece7da;
    --gold-tint:rgba(201,168,76,.14); --ok-tint:rgba(45,158,117,.12); --no-tint:rgba(192,57,43,.10);
    --radius:16px; --shadow:0 6px 22px rgba(27,27,47,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.5;-webkit-text-size-adjust:100%}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  .wrap{max-width:600px;margin:0 auto;padding:14px 16px 40px;min-height:100vh}
  h1{font-family:"Inria Serif",Georgia,serif;font-size:1.7rem;line-height:1.2;margin:.2em 0}
  h2{font-family:"Inria Serif",Georgia,serif;font-size:1.25rem;margin:.1em 0 .5em}
  p{margin:.4em 0}
  .muted{color:var(--muted);font-size:.92rem}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .back{flex:0 0 auto;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;
    text-decoration:none;color:var(--ink);background:var(--paper);border:1px solid var(--line);font-size:1.2rem}
  .progress{flex:1;height:10px;background:#eee6d4;border-radius:999px;overflow:hidden}
  .bar{height:100%;background:var(--gold);border-radius:999px;transition:width .35s ease}
  /* cards */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
  .center{text-align:center}
  .center-row{justify-content:center}
  /* mascot */
  .mascot{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
  .center .mascot{flex-direction:column;align-items:center}
  .mascot-img{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--gold-tint);border:2px solid var(--gold);flex:0 0 auto}
  .bubble{background:var(--gold-tint);border-radius:14px;padding:9px 13px;font-size:.95rem;position:relative}
  /* meta pills */
  .lcard-top{display:flex;align-items:center;gap:8px;margin:6px 0}
  .pill{background:var(--ink);color:var(--cream);font-weight:600;font-size:.78rem;padding:3px 10px;border-radius:999px}
  .track{color:var(--gold);font-weight:600;font-size:.85rem;text-transform:uppercase;letter-spacing:.04em}
  /* body + examples */
  .body{font-size:1.02rem}
  .examples{list-style:none;padding:0;margin:14px 0 4px;display:grid;gap:8px}
  .examples li{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .examples .en{display:block;font-weight:600}
  .examples .es{display:block;color:var(--muted);font-size:.9rem}
  /* buttons */
  .btn{display:block;width:100%;min-height:50px;border:none;border-radius:13px;font-family:inherit;font-size:1.02rem;font-weight:600;
    cursor:pointer;margin-top:14px;background:var(--ink);color:var(--cream);padding:12px 16px}
  .btn:disabled{opacity:.45;cursor:default}
  .btn-gold{background:var(--gold);color:var(--ink)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn:active:not(:disabled){transform:translateY(1px)}
  /* MCQ */
  .exnum{font-size:.82rem;color:var(--muted);font-weight:600;margin:-4px 0 10px}
  .opts{display:grid;gap:10px;margin:6px 0}
  .opt{text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-family:inherit;
    font-size:1rem;color:var(--ink);cursor:pointer;min-height:50px}
  .opt.sel{border-color:var(--gold);background:var(--gold-tint)}
  .opt.correct{border-color:var(--success);background:var(--ok-tint)}
  .opt.wrong{border-color:var(--error);background:var(--no-tint)}
  .opt.locked{cursor:default}
  /* word order */
  .hint{background:var(--gold-tint);border-radius:12px;padding:8px 12px;font-size:.9rem;margin:2px 0 12px}
  .answer{min-height:56px;border:1.5px dashed var(--gold);border-radius:13px;padding:9px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--cream)}
  .answer .ph{color:var(--muted);font-size:.92rem;padding:4px 6px}
  .bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:44px}
  .chip{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:9px 15px;font-family:inherit;font-size:1rem;
    color:var(--ink);cursor:pointer;min-height:42px}
  .chip.placed{background:var(--gold-tint);border-color:var(--gold)}
  .chip.correct{background:var(--ok-tint);border-color:var(--success)}
  .chip.wrong{background:var(--no-tint);border-color:var(--error)}
  /* feedback */
  .fbbox{display:flex;gap:12px;align-items:flex-start;border-radius:13px;padding:12px;margin-top:14px}
  .fbbox.ok{background:var(--ok-tint)}
  .fbbox.no{background:var(--no-tint)}
  .fb-cat{width:46px;height:46px;border-radius:50%;object-fit:cover;flex:0 0 auto;border:2px solid var(--paper)}
  .explain{margin-top:6px;font-size:.92rem}
  /* feedback / xp screen */
  .xpbar{height:14px;background:#eee6d4;border-radius:999px;overflow:hidden;margin:14px 0}
  .xpfill{height:100%;background:var(--success);border-radius:999px;transition:width .6s ease}
  /* streak */
  .flame{font-size:2.6rem;line-height:1}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:16px 0}
  .day{background:var(--cream);border:1px solid var(--line);border-radius:11px;padding:8px 0;text-align:center;font-size:.8rem;color:var(--muted)}
  .day i{display:block;font-style:normal;font-size:1.05rem;margin-top:3px}
  .day.on{background:var(--gold-tint);border-color:var(--gold);color:var(--ink);font-weight:600}
  .day.today{outline:2px solid var(--gold)}
  .shields{font-size:1.4rem;margin:4px 0}
  .milestone{background:var(--gold-tint);border-radius:12px;padding:10px;font-weight:600;margin:10px 0}
  .stat-row{display:flex;gap:10px;justify-content:center;margin:12px 0}
  .stat{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:8px 14px;font-size:.95rem}
  /* index */
  .hero{display:flex;justify-content:center;margin-top:6px}
  .grid{display:grid;gap:12px;margin-top:8px}
  .lcard{text-align:left;display:block;width:100%}
  .lcard h2{margin:.2em 0}
  /* soft account nudge */
  .nudge{position:relative;background:var(--cream);border:1px dashed var(--gold);border-radius:12px;padding:11px 34px 11px 12px;font-size:.88rem;margin:14px 0;text-align:left}
  .nudge a{color:var(--ink);font-weight:600}
  .nudge .x{position:absolute;top:6px;right:8px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
  @media(min-width:640px){
    h1{font-size:2rem}
    .mascot-img{width:84px;height:84px}
    .wrap{padding-top:22px}
  }
</style>
</head>
<body>
<h2 class="sr-only">Lecciones gratis de Vesper Academy: lee la explicacion, resuelve los ejercicios y manten tu racha diaria.</h2>
<main id="app" aria-live="polite"></main>

<script src="vesper_lessons.js"></script>
<script src="vesper_mascot.js"></script>
<script src="vesper_progress.js"></script>
<script src="vesper_auth.js"></script>
<script src="vesper_sync.js"></script>
<script>
(function () {
  var qs = new URLSearchParams(location.search);
  var id = qs.get("id");
  var L = window.VESPER_LESSONS || {};
  var ORDER = window.VESPER_LESSONS_ORDER || Object.keys(L);
  var M = window.VESPER_MASCOT;
  var P = window.VesperProgress;
  var app = document.getElementById("app");

  var lesson = null, exIdx = 0, results = [], earnedXp = 0;

  function esc(s) {
    return ("" + (s == null ? "" : s)).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function show(html) { app.innerHTML = html; window.scrollTo(0, 0); }

  function mascot(state, line, size) {
    if (window.VESPER_MASCOT && VESPER_MASCOT.render) {
      return VESPER_MASCOT.render(state, { line: (line != null ? line : undefined), size: size || "md" });
    }
    return '<div class="mascot"><img class="mascot-img" src="assets/images/virtual_class_happy_cat.png" alt="Vesper Cat">'
      + (line ? '<div class="bubble">' + esc(line) + '</div>' : '') + '</div>';
  }
  function topbar(pct) {
    return '<div class="topbar"><a class="back" href="' + (id ? 'leccion.html' : 'index.html') + '" aria-label="Salir">&#8592;</a>'
      + '<div class="progress"><div class="bar" style="width:' + pct + '%"></div></div></div>';
  }
  function feedbackBox(ok, detail) {
    var state = ok ? "correct" : "incorrect";
    var line = (window.VESPER_MASCOT ? VESPER_MASCOT.get(state).line : (ok ? "Bien!" : "Casi..."));
    var cat = (window.VESPER_MASCOT && VESPER_MASCOT.render)
      ? VESPER_MASCOT.render(state, { size: "sm", line: false })
      : '<img class="fb-cat" src="assets/images/virtual_class_happy_cat.png" alt="">';
    return '<div class="fbbox ' + (ok ? "ok" : "no") + '">' + cat
      + '<div><b>' + (ok ? "Correcto!" : "Incorrecto") + '</b><div class="muted">' + esc(line) + '</div>'
      + (detail ? '<div class="explain">' + esc(detail) + '</div>' : '') + '</div></div>';
  }
  function shuffle(arr, avoid) {
    for (var k = 0; k < 10; k++) {
      for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
      if (!avoid || arr.join(" ") !== avoid.join(" ")) break;
    }
    return arr;
  }

  /* ---------- INDEX (no ?id=) ---------- */
  function renderIndex() {
    var st = P ? P.getState() : { streak: 0, xp: 0 };
    var cards = ORDER.map(function (k) {
      var l = L[k]; if (!l) return "";
      return '<button class="card lcard" data-go="' + esc(k) + '">'
        + '<div class="lcard-top"><span class="pill">' + esc(l.level) + '</span><span class="track">' + esc(l.track) + '</span></div>'
        + '<h2>' + esc(l.title) + '</h2>'
        + '<div class="muted">' + (l.exercises ? l.exercises.length : 0) + ' ejercicios &middot; +' + (l.xpReward || 0) + ' XP</div></button>';
    }).join("");
    show('<div class="wrap"><div class="hero">' + mascot("welcome") + '</div>'
      + '<div class="stat-row"><div class="stat">&#128293; <b>' + (st.streak || 0) + '</b> dias</div>'
      + '<div class="stat">&#11088; <b>' + (st.xp || 0) + '</b> XP</div></div>'
      + '<h1>Lecciones gratis</h1><p class="muted">Aprende sin cuenta. Tu progreso se guarda en este dispositivo.</p>'
      + '<div class="grid">' + cards + '</div></div>');
    each("[data-go]", function (b) { b.onclick = function () { location.search = "?id=" + encodeURIComponent(b.getAttribute("data-go")); }; });
  }

  /* ---------- COVER ---------- */
  function renderCover() {
    show('<div class="wrap">' + topbar(6) + '<div class="card center">'
      + mascot("welcome", "Vamos con: " + lesson.title)
      + '<div class="lcard-top center-row"><span class="pill">' + esc(lesson.level) + '</span><span class="track">' + esc(lesson.track) + '</span></div>'
      + '<h1>' + esc(lesson.title) + '</h1>'
      + '<p class="muted">' + lesson.exercises.length + ' ejercicios &middot; +' + (lesson.xpReward || 0) + ' XP</p>'
      + '<button class="btn btn-gold" id="start">Empezar</button></div></div>');
    byId("start").onclick = renderExplanation;
  }

  /* ---------- EXPLANATION ---------- */
  function renderExplanation() {
    var ex = lesson.explanation || {};
    var examples = (ex.examples || []).map(function (e) {
      return '<li><span class="en">' + esc(e.en) + '</span><span class="es">' + esc(e.es) + '</span></li>';
    }).join("");
    show('<div class="wrap">' + topbar(22) + '<div class="card">'
      + mascot(lesson.mascotState || "explaining")
      + '<h2>Explicacion</h2><p class="body">' + esc(ex.body || "") + '</p>'
      + (examples ? '<ul class="examples">' + examples + '</ul>' : '')
      + '<button class="btn btn-gold" id="cont">Continuar</button></div></div>');
    byId("cont").onclick = function () { exIdx = 0; results = []; renderExercise(); };
  }

  /* ---------- EXERCISES ---------- */
  function renderExercise() {
    var total = lesson.exercises.length;
    var pct = 22 + Math.round(58 * (exIdx / total));
    var ex = lesson.exercises[exIdx];
    if (ex.type === "multiple_choice") renderMCQ(ex, pct, total);
    else if (ex.type === "word_order") renderWordOrder(ex, pct, total);
    else advance();
  }
  function advance() {
    exIdx++;
    if (exIdx < lesson.exercises.length) renderExercise(); else renderFeedback();
  }
  function exHeader(pct, total) {
    return topbar(pct) + '<div class="exnum">Ejercicio ' + (exIdx + 1) + ' de ' + total + '</div>';
  }

  function renderMCQ(ex, pct, total) {
    var opts = ex.options.map(function (o, i) { return '<button class="opt" data-i="' + i + '">' + esc(o) + '</button>'; }).join("");
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>' + esc(ex.question || "Elige la opcion correcta") + '</h2>'
      + '<div class="opts">' + opts + '</div><div id="fb"></div>'
      + '<button class="btn" id="verify" disabled>Verificar</button></div></div>');
    var sel = -1, done = false;
    var optEls = document.querySelectorAll(".opt");
    each(".opt", function (b) {
      b.onclick = function () {
        if (done) return;
        sel = +b.getAttribute("data-i");
        for (var x = 0; x < optEls.length; x++) optEls[x].classList.remove("sel");
        b.classList.add("sel");
        byId("verify").disabled = false;
      };
    });
    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true;
      var ok = sel === ex.correctIndex;
      for (var x = 0; x < optEls.length; x++) {
        var i = +optEls[x].getAttribute("data-i");
        optEls[x].classList.add("locked");
        if (i === ex.correctIndex) optEls[x].classList.add("correct");
        if (i === sel && !ok) optEls[x].classList.add("wrong");
      }
      results[exIdx] = ok;
      byId("fb").innerHTML = feedbackBox(ok, ok ? "" : (ex.explanation || ""));
      this.textContent = (exIdx + 1 < total) ? "Siguiente" : "Ver resultados";
    };
  }

  function renderWordOrder(ex, pct, total) {
    var bank = shuffle(ex.words.slice(), ex.correctOrder).map(function (t) { return { t: t }; });
    var answer = [];
    var done = false;
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Ordena las palabras</h2>'
      + (ex.hint ? '<p class="hint">&#128161; ' + esc(ex.hint) + '</p>' : '')
      + '<div class="answer" id="answer" aria-label="Tu respuesta"></div>'
      + '<div class="bank" id="bank"></div><div id="fb"></div>'
      + '<button class="btn" id="verify" disabled>Verificar</button></div></div>');

    function draw() {
      var ans = byId("answer"), bk = byId("bank");
      ans.innerHTML = answer.length
        ? answer.map(function (w, i) { return '<button class="chip placed' + (w.cls || "") + '" data-a="' + i + '">' + esc(w.t) + '</button>'; }).join("")
        : '<span class="ph">Toca las palabras en orden...</span>';
      bk.innerHTML = bank.map(function (w, i) { return '<button class="chip" data-b="' + i + '">' + esc(w.t) + '</button>'; }).join("");
      if (!done) {
        each("#answer [data-a]", function (c) { c.onclick = function () { var i = +c.getAttribute("data-a"); bank.push(answer[i]); answer.splice(i, 1); draw(); }; });
        each("#bank [data-b]", function (c) { c.onclick = function () { var i = +c.getAttribute("data-b"); answer.push(bank[i]); bank.splice(i, 1); draw(); }; });
      }
      byId("verify").disabled = done ? false : (answer.length !== ex.words.length);
    }
    draw();

    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true;
      var ok = true;
      for (var i = 0; i < answer.length; i++) {
        if (answer[i].t === ex.correctOrder[i]) answer[i].cls = " correct";
        else { answer[i].cls = " wrong"; ok = false; }
      }
      results[exIdx] = ok;
      draw();
      byId("fb").innerHTML = feedbackBox(ok, ok ? "" : ("Orden correcto: " + ex.correctOrder.join(" ")));
      this.textContent = (exIdx + 1 < total) ? "Siguiente" : "Ver resultados";
    };
  }

  /* ---------- FEEDBACK / XP ---------- */
  function renderFeedback() {
    var total = lesson.exercises.length;
    var correct = results.filter(Boolean).length;
    earnedXp = Math.max(5, Math.round((lesson.xpReward || 0) * correct / Math.max(1, total)));
    var perfect = correct === total;
    show('<div class="wrap">' + topbar(86) + '<div class="card center">'
      + mascot(perfect ? "milestone" : "correct", perfect ? "Leccion perfecta!" : "Buen trabajo!")
      + '<h1>+' + earnedXp + ' XP</h1>'
      + '<p class="muted">' + correct + ' de ' + total + ' correctos</p>'
      + '<div class="xpbar"><div class="xpfill" style="width:' + Math.round(100 * correct / total) + '%"></div></div>'
      + '<button class="btn btn-gold" id="cont">Continuar</button></div></div>');
    byId("cont").onclick = renderStreak;
  }

  /* ---------- STREAK ---------- */
  function renderStreak() {
    var info = P ? P.completeLesson(lesson.lessonId, earnedXp)
                 : { streak: 1, xp: earnedXp, milestone: false, shields: 0 };
    var grid = P ? P.weekGrid() : [];
    var cells = grid.map(function (d) {
      return '<div class="day' + (d.active ? " on" : "") + (d.isToday ? " today" : "") + '"><span>' + d.label + '</span><i>' + (d.active ? "🔥" : "&middot;") + '</i></div>';
    }).join("");
    var shields = "";
    for (var i = 0; i < (info.shields || 0); i++) shields += "🛡️";
    var mstate = info.milestone ? "milestone" : (info.streak > 0 ? "streak_alive" : "streak_broken");
    var hasNext = lesson.nextLessonId && L[lesson.nextLessonId];
    show('<div class="wrap">' + topbar(100) + '<div class="card center">'
      + mascot(mstate)
      + '<div class="flame">&#128293;</div>'
      + '<h1>' + info.streak + ' ' + (info.streak === 1 ? "dia" : "dias") + ' de racha</h1>'
      + (shields ? '<div class="shields">' + shields + '</div>' : '')
      + '<div class="week">' + cells + '</div>'
      + '<div class="stat-row"><div class="stat">&#11088; <b>' + info.xp + '</b> XP total</div></div>'
      + (info.milestone ? '<div class="milestone">&#127881; Nuevo escudo de racha!</div>' : '')
      + '<div class="nudge" id="nudge">Guarda tu progreso en todos tus dispositivos: <a href="#" id="nudge-account">crea una cuenta</a> (opcional).'
      + '<button class="x" id="xn" aria-label="Cerrar">&times;</button></div>'
      + (hasNext ? '<button class="btn btn-gold" id="nextL">Siguiente leccion &rarr;</button>'
                 : '<button class="btn btn-gold" id="moreL">Ver todas las lecciones</button>')
      + '<button class="btn btn-ghost" id="home">Volver al inicio</button></div></div>');
    var xn = byId("xn"); if (xn) xn.onclick = function () { byId("nudge").style.display = "none"; };
    var na = byId("nudge-account"); if (na) na.onclick = function (e) { e.preventDefault(); if (window.VESPER_SYNC && VESPER_SYNC.openAuth) VESPER_SYNC.openAuth(); else location.href = "login.html"; };
    var nx = byId("nextL"); if (nx) nx.onclick = function () { location.search = "?id=" + encodeURIComponent(lesson.nextLessonId); };
    var ml = byId("moreL"); if (ml) ml.onclick = function () { location.search = ""; };
    byId("home").onclick = function () { location.href = "index.html"; };
  }

  /* ---------- helpers ---------- */
  function byId(x) { return document.getElementById(x); }
  function each(sel, fn) { var n = document.querySelectorAll(sel); for (var i = 0; i < n.length; i++) fn(n[i]); }

  /* ---------- boot ---------- */
  if (!L || !Object.keys(L).length) { show('<div class="wrap"><div class="card center"><h1>Sin lecciones</h1><p class="muted">No se cargaron los datos.</p></div></div>'); return; }
  if (!id) { renderIndex(); return; }
  lesson = L[id];
  if (!lesson) {
    show('<div class="wrap"><div class="card center">' + mascot("incorrect", "No encuentro esa leccion.")
      + '<h1>Leccion no encontrada</h1><a class="btn btn-gold" href="leccion.html">Ver lecciones</a></div></div>');
    return;
  }
  renderCover();
})();
</script>
<script>
  /* PWA: registra el service worker (offline) solo en http/https, no en file:// */
  if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () { /* sin SW: sigue funcionando online */ });
    });
  }
</script>
