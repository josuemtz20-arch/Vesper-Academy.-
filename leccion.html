<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lecciones gratis · Vesper Academy</title>
<meta name="description" content="Aprende ingles gratis, sin cuenta. Lecciones cortas con ejercicios, racha diaria y XP.">
<link rel="icon" href="assets/images/favicon_32.png" sizes="32x32">
<link rel="manifest" href="manifest_lecciones.webmanifest">
<meta name="theme-color" content="#141c2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vesper Lecciones">
<link rel="apple-touch-icon" href="assets/images/apple_touch_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/vesper_tokens.css">
<script src="vesper_prefs.js"></script>
<style>
  :root{
    --ink:#141c2a; --gold:#c5a059; --success:#2D9E75; --error:#C0392B;
    --cream:#f5f2eb; --paper:#ffffff; --muted:#6b6b76; --line:#ece7da;
    --gold-tint:rgba(197,160,89,.14); --ok-tint:rgba(45,158,117,.12); --no-tint:rgba(192,57,43,.10);
    --radius:16px; --shadow:0 6px 22px rgba(20,28,42,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.5;-webkit-text-size-adjust:100%}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  .wrap{max-width:600px;margin:0 auto;padding:14px 16px 40px;min-height:100vh}
  h1{font-family:"Inria Serif",Georgia,serif;font-size:1.7rem;line-height:1.2;margin:.2em 0}
  h2{font-family:"Inria Serif",Georgia,serif;font-size:1.25rem;margin:.1em 0 .5em}
  p{margin:.4em 0}
  .muted{color:var(--muted);font-size:.92rem}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .back{flex:0 0 auto;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;
    text-decoration:none;color:var(--ink);background:var(--paper);border:1px solid var(--line);font-size:1.2rem}
  .progress{flex:1;height:10px;background:#eee6d4;border-radius:999px;overflow:hidden}
  .bar{height:100%;background:var(--gold);border-radius:999px;transition:width .35s ease}
  /* cards */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
  .center{text-align:center}
  .center-row{justify-content:center}
  /* mascot */
  .mascot{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
  .center .mascot{flex-direction:column;align-items:center}
  .mascot-img{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--gold-tint);border:2px solid var(--gold);flex:0 0 auto}
  .bubble{background:var(--gold-tint);border-radius:14px;padding:9px 13px;font-size:.95rem;position:relative}
  /* meta pills */
  .lcard-top{display:flex;align-items:center;gap:8px;margin:6px 0}
  .pill{background:var(--ink);color:var(--cream);font-weight:600;font-size:.78rem;padding:3px 10px;border-radius:999px}
  .track{color:var(--gold);font-weight:600;font-size:.85rem;text-transform:uppercase;letter-spacing:.04em}
  /* body + examples */
  .body{font-size:1.02rem}
  .examples{list-style:none;padding:0;margin:14px 0 4px;display:grid;gap:8px}
  .examples li{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .examples .en{display:block;font-weight:600}
  .examples .es{display:block;color:var(--muted);font-size:.9rem}
  /* buttons */
  .btn{display:block;width:100%;min-height:50px;border:none;border-radius:13px;font-family:inherit;font-size:1.02rem;font-weight:600;
    cursor:pointer;margin-top:14px;background:var(--ink);color:var(--cream);padding:12px 16px}
  .btn:disabled{opacity:.45;cursor:default}
  .btn-gold{background:var(--gold);color:var(--ink)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn:active:not(:disabled){transform:translateY(1px)}
  /* MCQ */
  .exnum{font-size:.82rem;color:var(--muted);font-weight:600;margin:-4px 0 10px}
  .opts{display:grid;gap:10px;margin:6px 0}
  .opt{text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-family:inherit;
    font-size:1rem;color:var(--ink);cursor:pointer;min-height:50px}
  .opt.sel{border-color:var(--gold);background:var(--gold-tint)}
  .opt.correct{border-color:var(--success);background:var(--ok-tint)}
  .opt.wrong{border-color:var(--error);background:var(--no-tint)}
  .opt.locked{cursor:default}
  /* word order */
  .hint{background:var(--gold-tint);border-radius:12px;padding:8px 12px;font-size:.9rem;margin:2px 0 12px}
  .answer{min-height:56px;border:1.5px dashed var(--gold);border-radius:13px;padding:9px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--cream)}
  .answer .ph{color:var(--muted);font-size:.92rem;padding:4px 6px}
  .bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:44px}
  .chip{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:9px 15px;font-family:inherit;font-size:1rem;
    color:var(--ink);cursor:pointer;min-height:42px}
  .chip.placed{background:var(--gold-tint);border-color:var(--gold)}
  .chip.correct{background:var(--ok-tint);border-color:var(--success)}
  .chip.wrong{background:var(--no-tint);border-color:var(--error)}
  /* feedback */
  .fbbox{display:flex;gap:12px;align-items:flex-start;border-radius:13px;padding:12px;margin-top:14px}
  .fbbox.ok{background:var(--ok-tint)}
  .fbbox.no{background:var(--no-tint)}
  .fb-cat{width:46px;height:46px;border-radius:50%;object-fit:cover;flex:0 0 auto;border:2px solid var(--paper)}
  .explain{margin-top:6px;font-size:.92rem}
  /* feedback / xp screen */
  .xpbar{height:14px;background:#eee6d4;border-radius:999px;overflow:hidden;margin:14px 0}
  .xpfill{height:100%;background:var(--success);border-radius:999px;transition:width .6s ease}
  /* streak */
  .flame{font-size:2.6rem;line-height:1}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:16px 0}
  .day{background:var(--cream);border:1px solid var(--line);border-radius:11px;padding:8px 0;text-align:center;font-size:.8rem;color:var(--muted)}
  .day i{display:block;font-style:normal;font-size:1.05rem;margin-top:3px}
  .day.on{background:var(--gold-tint);border-color:var(--gold);color:var(--ink);font-weight:600}
  .day.today{outline:2px solid var(--gold)}
  .shields{font-size:1.4rem;margin:4px 0}
  .milestone{background:var(--gold-tint);border-radius:12px;padding:10px;font-weight:600;margin:10px 0}
  .stat-row{display:flex;gap:10px;justify-content:center;margin:12px 0}
  .stat{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:8px 14px;font-size:.95rem}
  /* index */
  .hero{display:flex;justify-content:center;margin-top:6px}
  .grid{display:grid;gap:12px;margin-top:8px}
  .lcard{text-align:left;display:block;width:100%}
  .lcard h2{margin:.2em 0}
  /* soft account nudge */
  .nudge{position:relative;background:var(--cream);border:1px dashed var(--gold);border-radius:12px;padding:11px 34px 11px 12px;font-size:.88rem;margin:14px 0;text-align:left}
  .nudge a{color:var(--ink);font-weight:600}
  .nudge .x{position:absolute;top:6px;right:8px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
  /* ===== Hub progresivo (estilo Test-English) ===== */
  .hub-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 6px}
  .hub-hello{font-family:"Inria Serif",Georgia,serif;font-size:1.5rem;line-height:1.1;margin:0}
  .hub-stats{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 4px}
  .hub-stat{background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:.85rem;font-weight:600}
  /* continue card */
  .cont-card{display:flex;align-items:center;gap:14px;text-align:left;width:100%;background:linear-gradient(135deg,var(--ink),#26263e);color:var(--cream);border:none;border-radius:18px;padding:16px 18px;cursor:pointer;margin:10px 0 6px;box-shadow:var(--shadow)}
  .cont-ico{flex:0 0 auto;width:48px;height:48px;border-radius:50%;background:var(--gold);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
  .cont-card .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;opacity:.8}
  .cont-card .ttl{font-weight:700;font-size:1.05rem;margin:2px 0}
  .cont-card .meta{font-size:.8rem;opacity:.85}
  /* level tabs */
  .lvl-tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 2px 4px;margin:6px -2px 2px;-webkit-overflow-scrolling:touch}
  .lvl-tab{flex:0 0 auto;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);background:var(--paper);border-radius:13px;padding:8px 12px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lvl-tab.on{border-color:var(--gold);background:var(--gold-tint)}
  .lvl-tab .nm{font-weight:700;font-size:.95rem}
  .lvl-tab .pc{font-size:.72rem;color:var(--muted)}
  .ring{width:30px;height:30px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--ink)}
  .ring i{width:22px;height:22px;border-radius:50%;background:var(--paper);display:flex;align-items:center;justify-content:center;font-style:normal}
  /* level header */
  .lvl-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0 2px}
  .lvl-head h2{margin:0;font-size:1.2rem}
  .lvl-head .lvl-badge{font-size:.72rem;font-weight:700;color:#fff;border-radius:999px;padding:3px 10px}
  .lvl-prog{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 2px}
  .lvl-prog i{display:block;height:100%;border-radius:999px;transition:width .5s ease}
  /* skill section */
  .skill-sec{margin:14px 0 2px}
  .skill-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;margin:8px 0 8px;color:var(--ink)}
  .skill-h .ic{font-size:1.1rem}
  .skill-h .ct{margin-left:auto;font-size:.78rem;color:var(--muted);font-weight:600}
  /* lesson cards */
  .lgrid{display:grid;gap:10px}
  .lcard2{display:flex;align-items:center;gap:12px;text-align:left;width:100%;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lcard2:active:not(.locked){transform:translateY(1px)}
  .lcard2.completed{border-color:var(--success)}
  .lcard2.locked{opacity:.6;cursor:not-allowed;background:var(--cream)}
  .lc-badge{flex:0 0 auto;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;background:var(--gold-tint);color:var(--ink)}
  .lcard2.completed .lc-badge{background:var(--ok-tint)}
  .lcard2.locked .lc-badge{background:#e9e6dd}
  .lc-body{flex:1;min-width:0}
  .lc-ttl{font-weight:600;font-size:1rem;line-height:1.25}
  .lc-sub{font-size:.8rem;color:var(--muted);margin-top:2px}
  .lc-stars{color:var(--gold);font-size:.95rem;letter-spacing:1px}
  .lc-stars .off{color:var(--line)}
  .lc-go{flex:0 0 auto;color:var(--muted);font-size:1.1rem}
  .hub-toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--cream);padding:10px 16px;border-radius:999px;font-size:.85rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:9997}
  .hub-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* adaptive badge + warm-up */
  .adapt-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);color:var(--ink);border:1px solid var(--gold);border-radius:999px;padding:5px 12px;font-size:.78rem;font-weight:600;margin:8px 0 2px}
  .warm-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--line);margin:0 3px}
  .warm-dot.on{background:var(--gold)}
  /* true / false */
  .statement{font-size:1.08rem;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:6px 0 4px}
  .tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 4px}
  .tf-btn{min-height:54px;border:1.5px solid var(--line);border-radius:13px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer}
  .tf-btn.sel{border-color:var(--gold);background:var(--gold-tint)}
  .tf-btn.correct{border-color:var(--success);background:var(--ok-tint)}
  .tf-btn.wrong{border-color:var(--error);background:var(--no-tint)}
  .tf-btn.locked{cursor:default}
  /* fill blank + translate input */
  .type-input{width:100%;min-height:50px;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;font-family:inherit;font-size:1.05rem;color:var(--ink);background:var(--paper);-webkit-appearance:none}
  .type-input:focus{outline:none;border-color:var(--gold)}
  .type-input.correct{border-color:var(--success);background:var(--ok-tint)}
  .type-input.wrong{border-color:var(--error);background:var(--no-tint)}
  .fb-sentence{font-size:1.12rem;margin:8px 0 10px;line-height:2}
  .fb-sentence input{display:inline-block;width:auto;min-width:108px;min-height:0;padding:6px 10px;vertical-align:baseline}
  /* matching */
  .match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 4px}
  .match-item{display:block;width:100%;text-align:center;border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;margin-bottom:8px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:.98rem;cursor:pointer;min-height:48px}
  .match-item.sel{border-color:var(--gold);background:var(--gold-tint)}
  .match-item.done{border-color:var(--success);background:var(--ok-tint);cursor:default;opacity:.7}
  .match-item.bad{border-color:var(--error);background:var(--no-tint);animation:vc-shake .4s ease}
  /* listening */
  .listen-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:4px 0 8px}
  .listen-play{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--cream);border:none;border-radius:14px;padding:14px 20px;font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer}
  .listen-play .ic{font-size:1.25rem}
  .listen-slow{display:inline-flex;align-items:center;gap:8px;background:var(--paper);color:var(--ink);border:1.5px solid var(--line);border-radius:14px;padding:13px 16px;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer}
  .listen-slow:active{transform:translateY(1px)}
  .listen-note{color:var(--muted);font-size:.85rem;margin:0 0 12px}
  /* reading passage */
  .passage{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:6px 0 14px;max-height:340px;overflow:auto;-webkit-overflow-scrolling:touch}
  .passage h3{font-family:"Inria Serif",Georgia,serif;font-size:1.15rem;margin:0 0 8px}
  .passage p{font-size:1.04rem;line-height:1.7;margin:0 0 10px}
  .passage p:last-child{margin-bottom:0}
  .read-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);color:var(--ink);border:1px solid var(--gold);border-radius:999px;padding:4px 11px;font-size:.76rem;font-weight:600;margin:0 0 8px}
  .rq{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .rq:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .rq .rq-q{font-weight:600;font-size:1rem;margin:0 0 8px}
  .rq-num{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:4px}
  /* categorize */
  .cat-pool{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px;min-height:40px}
  .cat-tk{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:8px 14px;font-family:inherit;font-size:.96rem;color:var(--ink);cursor:pointer}
  .cat-tk.sel{border-color:var(--gold);background:var(--gold-tint)}
  .cat-tk.correct{border-color:var(--success);background:var(--ok-tint)}
  .cat-tk.wrong{border-color:var(--error);background:var(--no-tint)}
  .cat-buckets{display:grid;gap:10px}
  .cat-bucket{border:1.5px dashed var(--line);border-radius:13px;padding:10px 12px;min-height:60px;background:var(--cream)}
  .cat-bucket.active{border-color:var(--gold)}
  .cat-bucket h4{margin:0 0 4px;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .cat-bucket .cat-tk{margin:4px 4px 0 0;display:inline-block}
  /* gamificación: meta diaria, logros, repaso */
  .hub-stat.met{background:var(--ok-tint);border-color:var(--success);color:var(--ink)}
  .lcard2.review{background:linear-gradient(135deg,var(--gold-tint),var(--paper));border-color:var(--gold);border-style:dashed}
  .lcard2.review .lc-badge{background:var(--gold);color:var(--ink)}
  .trophy-shelf{margin:8px 0 2px;border:1px solid var(--line);border-radius:14px;background:var(--paper);padding:4px 12px}
  .trophy-shelf summary{cursor:pointer;font-weight:700;font-size:.9rem;list-style:none;display:flex;align-items:center;gap:8px;padding:8px 0}
  .trophy-shelf summary::-webkit-details-marker{display:none}
  .trophy-shelf .t-count{margin-left:auto;font-size:.78rem;color:var(--muted)}
  .trophy-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 10px}
  .trophy{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:.82rem;background:var(--cream);opacity:.55}
  .trophy.on{opacity:1;border-color:var(--gold);background:var(--gold-tint)}
  .trophy .t-ic{font-size:1rem}
  .trophy .t-nm{font-weight:600}
  .goal-card{background:var(--cream);border:1px solid var(--line);border-radius:13px;padding:12px;margin:12px 0;font-weight:600}
  .goal-card.met{background:var(--ok-tint);border-color:var(--success)}
  .goal-bar{height:9px;background:#eee6d4;border-radius:999px;overflow:hidden;margin:8px 0 4px}
  .goal-bar i{display:block;height:100%;background:var(--gold);border-radius:999px;transition:width .5s ease}
  .goal-card.met .goal-bar i{background:var(--success)}
  .goal-done{display:block;color:var(--success);font-size:.86rem}
  .ach-pop{display:grid;gap:8px;margin:12px 0}
  .ach-badge{display:flex;align-items:center;gap:11px;text-align:left;background:var(--gold-tint);border:1px solid var(--gold);border-radius:13px;padding:10px 13px}
  .ach-badge .ab-ic{font-size:1.7rem;line-height:1}
  .ach-badge .ab-tx{display:flex;flex-direction:column}
  .ach-badge .ab-tx b{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gold)}
  .ach-badge .ab-tx span{font-weight:700}
  /* buscador + filtros del hub */
  .hub-search{margin:12px 0 2px}
  .srch{position:relative}
  .srch-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;opacity:.7}
  .srch input{width:100%;min-height:46px;border:1.5px solid var(--line);border-radius:13px;padding:11px 14px 11px 40px;
    font-family:inherit;font-size:1rem;color:var(--ink);background:var(--paper);-webkit-appearance:none}
  .srch input:focus{outline:none;border-color:var(--gold)}
  .filter-row{display:flex;gap:8px;overflow-x:auto;padding:2px;margin:8px -2px 0;-webkit-overflow-scrolling:touch}
  .filter-row + .filter-row{margin-top:6px}
  .fchip{flex:0 0 auto;border:1.5px solid var(--line);background:var(--paper);border-radius:999px;padding:8px 13px;
    font-family:inherit;font-size:.85rem;font-weight:600;color:var(--ink);cursor:pointer;min-height:40px;white-space:nowrap}
  .fchip.on{border-color:var(--gold);background:var(--gold-tint)}
  .fchip:active{transform:translateY(1px)}
  .search-results{margin-top:12px}
  .search-results .lc-lvl{display:inline-block;font-size:.7rem;font-weight:700;color:var(--gold);
    letter-spacing:.04em;text-transform:uppercase;margin-right:6px}
  .search-empty{padding:14px 4px;color:var(--muted)}
  @media(min-width:640px){
    h1{font-size:2rem}
    .mascot-img{width:84px;height:84px}
    .wrap{padding-top:22px}
  }
  /* tablet / desktop: aprovecha el ancho con tarjetas de lección en 2 columnas.
     El reproductor (cover, explicación y ejercicios) se mantiene en 1 columna. */
  @media(min-width:760px){
    .wrap{max-width:720px}
    .lgrid{grid-template-columns:1fr 1fr;align-items:stretch}
    .grid{grid-template-columns:1fr 1fr}
    .lcard2{height:100%}
  }
</style>
</head>
<body>
<a class="va-skip-link" href="#app">Saltar al contenido</a>
<h2 class="sr-only">Lecciones gratis de Vesper Academy: lee la explicacion, resuelve los ejercicios y manten tu racha diaria.</h2>
<main id="app" aria-live="polite"></main>

<script src="vesper_lessons.js"></script>
<script src="vesper_activities.js"></script>
<script src="vesper_content_pack.js"></script>
<script src="vesper_expansion.js"></script>
<script src="vesper_expansion2.js"></script>
<script src="vesper_mascot.js"></script>
<script src="vesper_theme.js"></script>
<script src="vesper_adaptive.js"></script>
<script src="vesper_persona.js"></script>
<script src="vesper_progress.js"></script>
<script src="vesper_path.js"></script>
<script src="vesper_auth.js"></script>
<script src="vesper_sync.js"></script>
<script>
(function () {
  var qs = new URLSearchParams(location.search);
  var id = qs.get("id");
  if (window.VESPER_ACTIVITIES && VESPER_ACTIVITIES.merge) VESPER_ACTIVITIES.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_CONTENT_PACK && VESPER_CONTENT_PACK.merge) VESPER_CONTENT_PACK.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_EXPANSION && VESPER_EXPANSION.merge) VESPER_EXPANSION.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_EXPANSION2 && VESPER_EXPANSION2.merge) VESPER_EXPANSION2.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  var L = window.VESPER_LESSONS || {};
  var ORDER = window.VESPER_LESSONS_ORDER || Object.keys(L);
  var A = window.VESPER_ADAPTIVE || null;
  var PATH = window.VESPER_PATH || null;
  var PERS = window.VESPER_PERSONA || null;
  var M = window.VESPER_MASCOT;
  var P = window.VesperProgress;
  var app = document.getElementById("app");

  var lesson = null, baseLesson = null, profile = (A && A.getProfile) ? A.getProfile() : null;
  var exIdx = 0, results = [], earnedXp = 0;

  function esc(s) {
    return ("" + (s == null ? "" : s)).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function show(html) { app.innerHTML = html; window.scrollTo(0, 0); }

  function mascot(state, line, size) {
    if (window.VESPER_MASCOT && VESPER_MASCOT.render) {
      return VESPER_MASCOT.render(state, { line: (line != null ? line : undefined), size: size || "md" });
    }
    return '<div class="mascot"><img class="mascot-img" src="assets/images/virtual_class_happy_cat.png" alt="Vesper Cat">'
      + (line ? '<div class="bubble">' + esc(line) + '</div>' : '') + '</div>';
  }
  function topbar(pct) {
    return '<div class="topbar"><a class="back" href="' + (id ? 'leccion.html' : 'index.html') + '" aria-label="Salir">&#8592;</a>'
      + '<div class="progress"><div class="bar" style="width:' + pct + '%"></div></div></div>';
  }
  /* feedbackBox(ok, explanation, wrongFallback)
     - explanation: el "por que" del ejercicio (se muestra al fallar siempre y
       al acertar si la persona pidio retro explicativa: explainOnCorrect).
     - wrongFallback: texto solo-al-fallar (p.ej. "Respuesta: ...").
     - la frase de la mascota sale en el TONO elegido (VESPER_PERSONA.line). */
  /* efecto de sonido ligero (WebAudio, sin archivos) en acierto/error.
     Respeta la preferencia "Efectos de sonido" de Configuración. */
  var _actx = null;
  function playFx(ok) {
    try {
      if (window.VESPER_PREFS && !VESPER_PREFS.soundEnabled()) return;
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      _actx = _actx || new AC();
      if (_actx.state === "suspended") { try { _actx.resume(); } catch (e) {} }
      var t = _actx.currentTime;
      var notes = ok ? [660, 990] : [300, 200];   /* sube al acertar, baja al fallar */
      notes.forEach(function (f, i) {
        var o = _actx.createOscillator(), g = _actx.createGain();
        o.type = "sine"; o.frequency.value = f;
        var t0 = t + i * 0.09;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.12, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.16);
        o.connect(g); g.connect(_actx.destination);
        o.start(t0); o.stop(t0 + 0.18);
      });
    } catch (e) {}
  }

  function feedbackBox(ok, explanation, wrongFallback) {
    playFx(ok);
    var state = ok ? "correct" : "incorrect";
    var line = (PERS && PERS.line) ? PERS.line(state) : "";
    if (!line) line = (window.VESPER_MASCOT ? VESPER_MASCOT.get(state).line : (ok ? "Bien!" : "Casi..."));
    var showExp = (PERS && PERS.explainOnCorrect) ? (!ok || PERS.explainOnCorrect()) : !ok;
    var detail = ok ? (showExp ? (explanation || "") : "") : (explanation || wrongFallback || "");
    var cat = (window.VESPER_MASCOT && VESPER_MASCOT.render)
      ? VESPER_MASCOT.render(state, { size: "sm", line: false })
      : '<img class="fb-cat" src="assets/images/virtual_class_happy_cat.png" alt="">';
    return '<div class="fbbox ' + (ok ? "ok" : "no") + '">' + cat
      + '<div><b>' + (ok ? "Correcto!" : "Incorrecto") + '</b><div class="muted">' + esc(line) + '</div>'
      + (detail ? '<div class="explain">' + esc(detail) + '</div>' : '') + '</div></div>';
  }
  function shuffle(arr, avoid) {
    for (var k = 0; k < 10; k++) {
      for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
      if (!avoid || arr.join(" ") !== avoid.join(" ")) break;
    }
    return arr;
  }

  /* ---------- INDEX / HUB progresivo (no ?id=) ---------- */
  function toast(msg) {
    var t = byId("toast"); if (!t) return;
    t.textContent = msg; t.classList.add("show");
    clearTimeout(t._h); t._h = setTimeout(function () { t.classList.remove("show"); }, 1900);
  }

  function lessonCard(lid, built) {
    var l = L[lid]; if (!l) return "";
    var stt = PATH.status(lid, built);
    var n = l.exercises ? l.exercises.length : 0;
    var badge, second, attr, cls = "lcard2";
    if (stt === "completed") {
      cls += " completed"; badge = "&#10003;"; attr = 'data-go="' + esc(lid) + '"';
      var sc = PATH.getScore(lid), s = PATH.stars(sc != null ? sc : 70), starsHtml = '<span class="lc-stars">';
      for (var i = 0; i < 3; i++) starsHtml += (i < s ? "&#9733;" : '<span class="off">&#9733;</span>');
      starsHtml += "</span>";
      second = starsHtml + ' <span class="lc-sub">' + (sc != null ? sc + "% · Repasar" : "Completado") + "</span>";
    } else if (stt === "open") {
      badge = "&#9654;"; attr = 'data-go="' + esc(lid) + '"';
      second = '<span class="lc-sub">' + n + " ejercicios &middot; +" + (l.xpReward || 0) + " XP</span>";
    } else {
      cls += " locked"; badge = "&#128274;"; attr = 'data-locked="1"';
      second = '<span class="lc-sub">Completa la anterior para desbloquear</span>';
    }
    return '<button class="' + cls + '" ' + attr + '>'
      + '<span class="lc-badge">' + badge + '</span>'
      + '<span class="lc-body"><span class="lc-ttl">' + esc(l.title) + '</span>'
      + '<span style="display:block;margin-top:3px">' + second + '</span></span>'
      + '<span class="lc-go">' + (stt === "locked" ? "" : "&#8250;") + '</span></button>';
  }

  /* Vitrina de logros (ganados + bloqueados), plegable. */
  function buildTrophyShelf() {
    if (!P || !P.achievementsState) return "";
    var list = P.achievementsState();
    var earned = list.filter(function (a) { return a.unlocked; }).length;
    var chips = list.map(function (a) {
      return '<span class="trophy' + (a.unlocked ? " on" : "") + '" title="' + esc(a.name + (a.desc ? " — " + a.desc : "")) + '">'
        + '<span class="t-ic">' + (a.unlocked ? a.icon : "&#128274;") + '</span>'
        + '<span class="t-nm">' + esc(a.name) + '</span></span>';
    }).join("");
    return '<details class="trophy-shelf"><summary>&#127942; Logros <span class="t-count">' + earned + '/' + list.length + '</span></summary>'
      + '<div class="trophy-grid">' + chips + '</div></details>';
  }

  function renderIndex(selLevel) {
    var st = P ? P.getState() : { streak: 0, xp: 0, shields: 0 };
    var dg = (P && P.dailyGoal) ? P.dailyGoal() : null;
    var trophyHtml = buildTrophyShelf();
    var hello = (A && profile) ? A.greeting() : "Hola!";
    /* fallback simple si no hay motor de ruta */
    if (!PATH) {
      var cards = ORDER.map(function (k) {
        var l = L[k]; if (!l) return "";
        return '<button class="card lcard" data-go="' + esc(k) + '"><div class="lcard-top"><span class="pill">' + esc(l.level)
          + '</span><span class="track">' + esc(l.track) + '</span></div><h2>' + esc(l.title) + '</h2>'
          + '<div class="muted">' + (l.exercises ? l.exercises.length : 0) + ' ejercicios &middot; +' + (l.xpReward || 0) + ' XP</div></button>';
      }).join("");
      show('<div class="wrap"><div class="hero">' + mascot("welcome", hello) + '</div><h1>Lecciones gratis</h1><div class="grid">' + cards + '</div></div>');
      each("[data-go]", function (b) { b.onclick = function () { location.search = "?id=" + encodeURIComponent(b.getAttribute("data-go")); }; });
      return;
    }

    var built = PATH.build(L, ORDER);
    if (!selLevel) {
      var band = (A && profile) ? A.levelToBand(A.profileLevel()) : null;
      if (band && built.levels[band] && built.levels[band].total) selLevel = band;
      else {
        for (var i = 0; i < PATH.LEVELS.length; i++) {
          var lv = PATH.LEVELS[i], gg = built.levels[lv];
          if (gg.total && gg.done < gg.total) { selLevel = lv; break; }
        }
        if (!selLevel) selLevel = PATH.LEVELS[0];
      }
    }

    /* continuar donde lo dejaste */
    var contId = PATH.continueLesson(built), contHtml = "";
    if (contId && L[contId]) {
      var cl = L[contId], anyDone = Object.keys(built.completed).length > 0;
      contHtml = '<button class="cont-card" data-go="' + esc(contId) + '"><span class="cont-ico">&#9654;</span>'
        + '<span style="min-width:0"><span class="lbl">' + (anyDone ? "Continuar" : "Empieza aquí") + '</span>'
        + '<span class="ttl">' + esc(cl.title) + '</span>'
        + '<span class="meta">' + esc(cl.level) + ' &middot; ' + (cl.exercises ? cl.exercises.length : 0) + ' ejercicios &middot; +' + (cl.xpReward || 0) + ' XP</span></span></button>';
    }

    /* pestañas de nivel con anillo de progreso */
    var tabs = PATH.LEVELS.map(function (lv) {
      var pr = PATH.levelProgress(lv, built), col = PATH.levelColor(lv);
      var ring = '<span class="ring" style="background:conic-gradient(' + col + ' ' + pr.pct + '%, var(--line) 0)"><i>' + pr.pct + '</i></span>';
      return '<button class="lvl-tab' + (lv === selLevel ? " on" : "") + '" data-lvl="' + lv + '">' + ring
        + '<span><span class="nm">' + lv + '</span><br><span class="pc">' + pr.done + '/' + pr.total + '</span></span></button>';
    }).join("");

    /* secciones por destreza del nivel seleccionado */
    var g = built.levels[selLevel], pr = PATH.levelProgress(selLevel, built), col = PATH.levelColor(selLevel);
    var sections = "";
    PATH.SKILL_ORDER.forEach(function (sk) {
      var ids = g.bySkill[sk]; if (!ids || !ids.length) return;
      var meta = PATH.SKILLS[sk];
      var doneN = ids.filter(function (id) { return built.completed[id]; }).length;
      var reviewReady = ids.length >= 2 && doneN === ids.length;
      var reviewCard = "";
      if (reviewReady) {
        var rid = "review:" + selLevel + ":" + sk;
        var mastered = !!((st.achievements || {})["master:" + selLevel + ":" + sk]);
        var rsc = PATH.getScore(rid);
        reviewCard = '<button class="lcard2 review' + (mastered ? " completed" : "") + '" data-go="' + esc(rid) + '">'
          + '<span class="lc-badge">&#127942;</span>'
          + '<span class="lc-body"><span class="lc-ttl">Repaso de ' + esc(meta.label) + '</span>'
          + '<span style="display:block;margin-top:3px"><span class="lc-sub">'
          + (rsc != null ? "Mejor: " + rsc + "% · Repetir" : "Pon a prueba todo lo aprendido") + '</span></span></span>'
          + '<span class="lc-go">&#8250;</span></button>';
      }
      sections += '<div class="skill-sec"><div class="skill-h"><span class="ic">' + meta.icon + '</span>' + meta.label
        + '<span class="ct">' + doneN + "/" + ids.length + '</span></div><div class="lgrid">'
        + ids.map(function (id) { return lessonCard(id, built); }).join("") + reviewCard + '</div></div>';
    });
    if (!sections) sections = '<p class="muted">Próximamente más lecciones en este nivel.</p>';

    /* buscador + filtros (atacan la falta de descubrimiento con 90+ lecciones) */
    var skillChips = PATH.SKILL_ORDER.map(function (sk) {
      var m = PATH.SKILLS[sk];
      return '<button class="fchip" type="button" aria-pressed="false" data-skill="' + sk + '">' + m.icon + ' ' + esc(m.label) + '</button>';
    }).join("");
    var searchUI = '<div class="hub-search" id="hubSearch">'
      + '<div class="srch"><span class="srch-ic" aria-hidden="true">&#128270;</span>'
      + '<label class="sr-only" for="lessonSearch">Buscar lecciones por título, tema o nivel</label>'
      + '<input id="lessonSearch" type="search" inputmode="search" autocomplete="off" role="searchbox"'
      + ' aria-controls="searchResults" placeholder="Buscar lección, tema o nivel…"></div>'
      + '<div class="filter-row" role="group" aria-label="Filtrar por destreza">'
      + '<button class="fchip on" type="button" aria-pressed="true" data-skill="all">Todas</button>' + skillChips + '</div>'
      + '<div class="filter-row" role="group" aria-label="Filtrar por estado">'
      + '<button class="fchip on" type="button" aria-pressed="true" data-state="all">Todas</button>'
      + '<button class="fchip" type="button" aria-pressed="false" data-state="open">Pendientes</button>'
      + '<button class="fchip" type="button" aria-pressed="false" data-state="completed">Completadas</button></div></div>';

    show('<div class="wrap">'
      + '<div class="hub-head"><div><h1 class="hub-hello">' + esc(hello) + '</h1>'
      + '<p class="muted" style="margin:2px 0 0;font-size:.88rem">Tu ruta de inglés, paso a paso.</p></div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<a href="chat.html" aria-label="Habla con Vesper" title="Habla con Vesper"'
      + ' style="display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;flex:none;'
      + 'border-radius:50%;background:var(--paper);border:1px solid var(--line);text-decoration:none;font-size:1.2rem">&#128172;</a>'
      + '<a href="configuracion.html" aria-label="Configuración de Vesper" title="Configuración"'
      + ' style="display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;flex:none;'
      + 'border-radius:50%;background:var(--paper);border:1px solid var(--line);text-decoration:none;font-size:1.2rem">⚙️</a>'
      + mascot("welcome", false, "sm") + '</div></div>'
      + '<div class="hub-stats"><span class="hub-stat">&#128293; ' + (st.streak || 0) + ' días</span>'
      + '<span class="hub-stat">&#11088; ' + (st.xp || 0) + ' XP</span>'
      + (dg ? '<span class="hub-stat' + (dg.met ? ' met' : '') + '">&#127919; ' + Math.min(dg.progress, dg.target) + '/' + dg.target + '</span>' : "")
      + ((st.shields || 0) ? '<span class="hub-stat">&#128737;&#65039; ' + st.shields + '</span>' : "") + '</div>'
      + trophyHtml
      + contHtml
      + searchUI
      + '<div id="searchResults" class="search-results" aria-live="polite" hidden></div>'
      + '<div id="levelView">'
      + '<div class="lvl-tabs">' + tabs + '</div>'
      + '<div class="lvl-head"><h2>Nivel ' + selLevel + '</h2>'
      + '<span class="lvl-badge" style="background:' + col + '">' + pr.done + "/" + pr.total + '</span></div>'
      + '<div class="lvl-prog"><i style="width:' + pr.pct + '%;background:' + col + '"></i></div>'
      + sections + '</div>'
      + '</div><div class="hub-toast" id="toast"></div>');

    each(".lvl-tab", function (b) { b.onclick = function () { renderIndex(b.getAttribute("data-lvl")); }; });
    each("[data-go]", function (b) { b.onclick = function () { location.search = "?id=" + encodeURIComponent(b.getAttribute("data-go")); }; });
    each("[data-locked]", function (b) { b.onclick = function () { toast("Completa la lección anterior para desbloquear 🔒"); }; });

    /* ---- lógica de búsqueda/filtros (sólo actualiza #searchResults) ---- */
    function searchCard(lid) {
      var l = L[lid]; if (!l) return "";
      var stt = PATH.status(lid, built);
      var badge, attr, cls = "lcard2";
      if (stt === "completed") { cls += " completed"; badge = "&#10003;"; attr = 'data-go="' + esc(lid) + '"'; }
      else if (stt === "open") { badge = "&#9654;"; attr = 'data-go="' + esc(lid) + '"'; }
      else { cls += " locked"; badge = "&#128274;"; attr = 'data-locked="1"'; }
      var sk = PATH.skillOf(l), m = PATH.SKILLS[sk] || { label: "", icon: "" };
      return '<button class="' + cls + '" ' + attr + '>'
        + '<span class="lc-badge">' + badge + '</span>'
        + '<span class="lc-body"><span class="lc-ttl">' + esc(l.title) + '</span>'
        + '<span class="lc-sub" style="display:block;margin-top:3px"><span class="lc-lvl">' + esc(l.level) + '</span>'
        + m.icon + ' ' + esc(m.label) + (stt === "locked" ? ' &middot; &#128274;' : '') + '</span></span>'
        + '<span class="lc-go">' + (stt === "locked" ? "" : "&#8250;") + '</span></button>';
    }
    var fSkill = "all", fState = "all", fQuery = "", fTimer = null;
    function applyFilter() {
      var active = !!fQuery.trim() || fSkill !== "all" || fState !== "all";
      var lvView = byId("levelView"), res = byId("searchResults");
      if (!res) return;
      if (!active) { if (lvView) lvView.hidden = false; res.hidden = true; res.innerHTML = ""; return; }
      if (lvView) lvView.hidden = true;
      res.hidden = false;
      var q = fQuery.trim().toLowerCase();
      var hits = built.order.filter(function (id) {
        var l = L[id]; if (!l) return false;
        if (fSkill !== "all" && PATH.skillOf(l) !== fSkill) return false;
        var stt = PATH.status(id, built);
        if (fState === "completed" && stt !== "completed") return false;
        if (fState === "open" && stt === "completed") return false;
        if (q) {
          var hay = (l.title + " " + (l.track || "") + " " + (l.level || "") + " " + (l.topic || "")).toLowerCase();
          if (hay.indexOf(q) < 0) return false;
        }
        return true;
      });
      if (!hits.length) {
        res.innerHTML = '<p class="search-empty">Sin resultados. Prueba otra palabra o quita un filtro.</p>';
        return;
      }
      res.innerHTML = '<div class="muted" style="margin:0 2px 8px;font-size:.85rem">' + hits.length
        + (hits.length === 1 ? ' lección' : ' lecciones') + '</div>'
        + '<div class="lgrid">' + hits.map(searchCard).join("") + '</div>';
      each("#searchResults [data-go]", function (b) { b.onclick = function () { location.search = "?id=" + encodeURIComponent(b.getAttribute("data-go")); }; });
      each("#searchResults [data-locked]", function (b) { b.onclick = function () { toast("Completa la lección anterior para desbloquear 🔒"); }; });
    }
    var inp = byId("lessonSearch");
    if (inp) inp.oninput = function () { fQuery = inp.value; clearTimeout(fTimer); fTimer = setTimeout(applyFilter, 150); };
    each("#hubSearch [data-skill]", function (b) {
      b.onclick = function () {
        fSkill = b.getAttribute("data-skill");
        each("#hubSearch [data-skill]", function (x) { var on = x === b; x.classList.toggle("on", on); x.setAttribute("aria-pressed", on ? "true" : "false"); });
        applyFilter();
      };
    });
    each("#hubSearch [data-state]", function (b) {
      b.onclick = function () {
        fState = b.getAttribute("data-state");
        each("#hubSearch [data-state]", function (x) { var on = x === b; x.classList.toggle("on", on); x.setAttribute("aria-pressed", on ? "true" : "false"); });
        applyFilter();
      };
    });
  }

  /* ---------- COVER ---------- */
  function renderCover() {
    var line = (A ? A.personalize("Vamos con: " + lesson.title) : "Vamos con: " + lesson.title);
    show('<div class="wrap">' + topbar(6) + '<div class="card center">'
      + mascot("welcome", line)
      + '<div class="lcard-top center-row"><span class="pill">' + esc(lesson.level) + '</span><span class="track">' + esc(lesson.track) + '</span></div>'
      + '<h1>' + esc(lesson.title) + '</h1>'
      + (lesson.adapted ? '<div class="adapt-badge">&#10024; ' + esc(lesson.adaptNote) + '</div>' : '')
      + '<p class="muted">' + lesson.exercises.length + ' ejercicios &middot; +' + (lesson.xpReward || 0) + ' XP</p>'
      + '<button class="btn btn-gold" id="start">Empezar</button></div></div>');
    byId("start").onclick = renderExplanation;
  }

  /* ---------- EXPLANATION ---------- */
  function renderExplanation() {
    var ex = lesson.explanation || {};
    var showEs = !PERS || PERS.showSpanish();   /* mezcla de idioma: oculta el ES si eligio "Solo ingles" */
    var examples = (ex.examples || []).map(function (e) {
      return '<li><span class="en">' + esc(e.en) + '</span>'
        + (showEs && e.es ? '<span class="es">' + esc(e.es) + '</span>' : '') + '</li>';
    }).join("");
    show('<div class="wrap">' + topbar(22) + '<div class="card">'
      + mascot(lesson.mascotState || "explaining")
      + '<h2>Explicacion</h2><p class="body">' + esc(ex.body || "") + '</p>'
      + (examples ? '<ul class="examples">' + examples + '</ul>' : '')
      + '<button class="btn btn-gold" id="cont">Continuar</button></div></div>');
    byId("cont").onclick = function () { exIdx = 0; results = []; renderExercise(); };
  }

  /* ---------- EXERCISES ---------- */
  function renderExercise() {
    var total = lesson.exercises.length;
    var pct = 22 + Math.round(58 * (exIdx / total));
    var ex = lesson.exercises[exIdx];
    if (ex.type === "multiple_choice") renderMCQ(ex, pct, total);
    else if (ex.type === "word_order") renderWordOrder(ex, pct, total);
    else if (ex.type === "true_false") renderTrueFalse(ex, pct, total);
    else if (ex.type === "fill_blank") renderFillBlank(ex, pct, total);
    else if (ex.type === "translate" || ex.type === "type_answer") renderTranslate(ex, pct, total);
    else if (ex.type === "matching") renderMatching(ex, pct, total);
    else if (ex.type === "listening") renderListening(ex, pct, total);
    else if (ex.type === "categorize") renderCategorize(ex, pct, total);
    else if (ex.type === "reading") renderReading(ex, pct, total);
    else advance();
  }
  function advance() {
    exIdx++;
    if (exIdx < lesson.exercises.length) renderExercise(); else renderFeedback();
  }
  function exHeader(pct, total) {
    return topbar(pct) + '<div class="exnum">Ejercicio ' + (exIdx + 1) + ' de ' + total + '</div>';
  }

  function renderMCQ(ex, pct, total) {
    var opts = ex.options.map(function (o, i) { return '<button class="opt" data-i="' + i + '">' + esc(o) + '</button>'; }).join("");
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>' + esc(ex.question || "Elige la opcion correcta") + '</h2>'
      + '<div class="opts">' + opts + '</div><div id="fb"></div>'
      + '<button class="btn" id="verify" disabled>Verificar</button></div></div>');
    var sel = -1, done = false;
    var optEls = document.querySelectorAll(".opt");
    each(".opt", function (b) {
      b.onclick = function () {
        if (done) return;
        sel = +b.getAttribute("data-i");
        for (var x = 0; x < optEls.length; x++) optEls[x].classList.remove("sel");
        b.classList.add("sel");
        byId("verify").disabled = false;
      };
    });
    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true;
      var ok = sel === ex.correctIndex;
      for (var x = 0; x < optEls.length; x++) {
        var i = +optEls[x].getAttribute("data-i");
        optEls[x].classList.add("locked");
        if (i === ex.correctIndex) optEls[x].classList.add("correct");
        if (i === sel && !ok) optEls[x].classList.add("wrong");
      }
      results[exIdx] = ok;
      byId("fb").innerHTML = feedbackBox(ok, ex.explanation || "", "Era: " + ex.options[ex.correctIndex]);
      this.textContent = (exIdx + 1 < total) ? "Siguiente" : "Ver resultados";
    };
  }

  function renderWordOrder(ex, pct, total) {
    var bank = shuffle(ex.words.slice(), ex.correctOrder).map(function (t) { return { t: t }; });
    var answer = [];
    var done = false;
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Ordena las palabras</h2>'
      + (ex.hint ? '<p class="hint">&#128161; ' + esc(ex.hint) + '</p>' : '')
      + '<div class="answer" id="answer" aria-label="Tu respuesta"></div>'
      + '<div class="bank" id="bank"></div><div id="fb"></div>'
      + '<button class="btn" id="verify" disabled>Verificar</button></div></div>');

    function draw() {
      var ans = byId("answer"), bk = byId("bank");
      ans.innerHTML = answer.length
        ? answer.map(function (w, i) { return '<button class="chip placed' + (w.cls || "") + '" data-a="' + i + '">' + esc(w.t) + '</button>'; }).join("")
        : '<span class="ph">Toca las palabras en orden...</span>';
      bk.innerHTML = bank.map(function (w, i) { return '<button class="chip" data-b="' + i + '">' + esc(w.t) + '</button>'; }).join("");
      if (!done) {
        each("#answer [data-a]", function (c) { c.onclick = function () { var i = +c.getAttribute("data-a"); bank.push(answer[i]); answer.splice(i, 1); draw(); }; });
        each("#bank [data-b]", function (c) { c.onclick = function () { var i = +c.getAttribute("data-b"); answer.push(bank[i]); bank.splice(i, 1); draw(); }; });
      }
      byId("verify").disabled = done ? false : (answer.length !== ex.words.length);
    }
    draw();

    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true;
      var ok = true;
      for (var i = 0; i < answer.length; i++) {
        if (answer[i].t === ex.correctOrder[i]) answer[i].cls = " correct";
        else { answer[i].cls = " wrong"; ok = false; }
      }
      results[exIdx] = ok;
      draw();
      byId("fb").innerHTML = feedbackBox(ok, "", "Orden correcto: " + ex.correctOrder.join(" "));
      this.textContent = (exIdx + 1 < total) ? "Siguiente" : "Ver resultados";
    };
  }

  /* ---------- shared helpers for typed/new activities ---------- */
  function norm(s) {
    return ("" + (s == null ? "" : s)).toLowerCase()
      .replace(/[’‘'`]/g, "")
      .replace(/[.,!?;:¿¡"]/g, " ")
      .replace(/\s+/g, " ").trim();
  }
  /* --- Voz natural: elige la mejor voz neural disponible en el dispositivo --- */
  var _voiceCache = null, _bestVoice = null;
  function loadVoices() {
    try {
      if (!window.speechSynthesis) return [];
      _voiceCache = speechSynthesis.getVoices() || [];
      _bestVoice = pickBestVoice(_voiceCache);
      return _voiceCache;
    } catch (e) { return []; }
  }
  function pickBestVoice(voices) {
    if (!voices || !voices.length) return null;
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang || ""); });
    if (!en.length) en = voices;
    /* Prioridad: voces neurales/naturales modernas (no roboticas) */
    var prefs = [
      /natural/i, /neural/i, /\bgoogle\b/i, /microsoft .*online/i, /\bsiri\b/i,
      /\b(samantha|aria|jenny|guy|libby|sonia|ryan|emma|ava|allison|nathan)\b/i,
      /\b(en-US|en-GB)\b/i
    ];
    for (var p = 0; p < prefs.length; p++) {
      var m = en.filter(function (v) { return prefs[p].test(v.name || "") || prefs[p].test(v.voiceURI || ""); });
      /* prefiere en-US/en-GB dentro del match */
      var us = m.filter(function (v) { return /en-?US/i.test(v.lang || ""); });
      if (us.length) return us[0];
      if (m.length) return m[0];
    }
    var anyUS = en.filter(function (v) { return /en-?US/i.test(v.lang || ""); });
    return anyUS[0] || en[0];
  }
  if (window.speechSynthesis) {
    loadVoices();
    try { speechSynthesis.onvoiceschanged = loadVoices; } catch (e) {}
  }
  function speak(text, audioPath, rate) {
    if (audioPath) {
      try {
        var a = new Audio(audioPath);
        a.playbackRate = rate ? Math.max(0.5, Math.min(1, rate / 0.92)) : 1;
        a.play().catch(function () { speakTTS(text, rate); });
        a.onerror = function () { speakTTS(text, rate); };
        return;
      } catch (e) { /* cae a TTS */ }
    }
    speakTTS(text, rate);
  }
  function speakTTS(text, rate) {
    try {
      if (window.speechSynthesis) {
        if (!_voiceCache) loadVoices();
        var u = new SpeechSynthesisUtterance(text);
        if (_bestVoice) { u.voice = _bestVoice; u.lang = _bestVoice.lang || "en-US"; }
        else { u.lang = "en-US"; }
        u.rate = rate || 0.92; u.pitch = 1;
        speechSynthesis.cancel(); speechSynthesis.speak(u);
      }
    } catch (e) {}
  }
  function setVerifyNext(btn, total) {
    btn.textContent = (exIdx + 1 < total) ? "Siguiente" : "Ver resultados";
  }

  /* ---------- TRUE / FALSE ---------- */
  function renderTrueFalse(ex, pct, total) {
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Verdadero o falso?</h2>'
      + '<div class="statement">' + esc(ex.statement) + '</div>'
      + '<div class="tf-row"><button class="tf-btn" data-v="1">Verdadero</button><button class="tf-btn" data-v="0">Falso</button></div>'
      + '<div id="fb"></div><button class="btn" id="verify" disabled>Verificar</button></div></div>');
    var sel = -1, done = false;
    var btns = document.querySelectorAll(".tf-btn");
    each(".tf-btn", function (b) {
      b.onclick = function () {
        if (done) return;
        sel = +b.getAttribute("data-v");
        for (var x = 0; x < btns.length; x++) btns[x].classList.remove("sel");
        b.classList.add("sel"); byId("verify").disabled = false;
      };
    });
    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true;
      var ok = (sel === 1) === (!!ex.answer);
      for (var x = 0; x < btns.length; x++) {
        var v = +btns[x].getAttribute("data-v"); btns[x].classList.add("locked");
        if ((v === 1) === (!!ex.answer)) btns[x].classList.add("correct");
        if (v === sel && !ok) btns[x].classList.add("wrong");
      }
      results[exIdx] = ok;
      byId("fb").innerHTML = feedbackBox(ok, ex.explanation || "", "Respuesta: " + (ex.answer ? "Verdadero" : "Falso"));
      setVerifyNext(this, total);
    };
  }

  /* ---------- FILL IN THE BLANK ---------- */
  function renderFillBlank(ex, pct, total) {
    var parts = ("" + (ex.sentence || "___")).split("___");
    var answers = ex.answers || (ex.answer != null ? [ex.answer] : []);
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Completa la frase</h2>'
      + (ex.hint ? '<p class="hint">&#128161; ' + esc(ex.hint) + '</p>' : '')
      + '<p class="fb-sentence">' + esc(parts[0])
      + '<input id="blank" class="type-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text"> '
      + esc(parts.slice(1).join("___")) + '</p>'
      + '<div id="fb"></div><button class="btn" id="verify" disabled>Verificar</button></div></div>');
    var done = false, inp = byId("blank");
    inp.oninput = function () { byId("verify").disabled = !inp.value.trim(); };
    inp.onkeydown = function (e) { if (e.key === "Enter" && !byId("verify").disabled) byId("verify").click(); };
    inp.focus();
    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true; inp.disabled = true;
      var val = norm(inp.value);
      var ok = answers.some(function (a) { return norm(a) === val; });
      inp.classList.add(ok ? "correct" : "wrong");
      results[exIdx] = ok;
      byId("fb").innerHTML = feedbackBox(ok, ex.explanation || "", "Respuesta: " + (answers[0] || ""));
      setVerifyNext(this, total);
    };
  }

  /* ---------- TRANSLATE / TYPE ANSWER ---------- */
  function renderTranslate(ex, pct, total) {
    var answers = ex.answers || [];
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Tu turno</h2><p class="body">' + esc(ex.prompt || "Traduce la frase") + '</p>'
      + '<input id="trans" class="type-input" placeholder="Escribe en ingles..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">'
      + '<div id="fb"></div><button class="btn" id="verify" disabled>Verificar</button></div></div>');
    var done = false, inp = byId("trans");
    inp.oninput = function () { byId("verify").disabled = !inp.value.trim(); };
    inp.onkeydown = function (e) { if (e.key === "Enter" && !byId("verify").disabled) byId("verify").click(); };
    inp.focus();
    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true; inp.disabled = true;
      var val = norm(inp.value);
      var ok = answers.some(function (a) { return norm(a) === val; });
      inp.classList.add(ok ? "correct" : "wrong");
      results[exIdx] = ok;
      byId("fb").innerHTML = feedbackBox(ok, ex.explanation || "", "Sugerencia: " + (answers[0] || ""));
      setVerifyNext(this, total);

  /* ---------- MATCHING ---------- */
  function renderMatching(ex, pct, total) {
    var pairs = ex.pairs || [];
    var lefts = pairs.map(function (p, i) { return { t: p.l, p: i }; });
    var rights = shuffle(pairs.map(function (p, i) { return { t: p.r, p: i }; }));
    var leftHtml = lefts.map(function (o) { return '<button class="match-item" data-side="l" data-p="' + o.p + '">' + esc(o.t) + '</button>'; }).join("");
    var rightHtml = rights.map(function (o) { return '<button class="match-item" data-side="r" data-p="' + o.p + '">' + esc(o.t) + '</button>'; }).join("");
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Emparejar</h2>'
      + '<p class="hint">&#128161; ' + esc(ex.instruction || "Toca una palabra y luego su pareja.") + '</p>'
      + '<div class="match-cols"><div>' + leftHtml + '</div><div>' + rightHtml + '</div></div>'
      + '<div id="fb"></div><button class="btn" id="verify" disabled>Empareja todo</button></div></div>');
    var selEl = null, matched = 0, errors = 0, done = false;
    function clearSel() { if (selEl) selEl.classList.remove("sel"); selEl = null; }
    each(".match-item", function (b) {
      b.onclick = function () {
        if (done || b.classList.contains("done")) return;
        var side = b.getAttribute("data-side");
        if (side === "l") {
          if (selEl && selEl.getAttribute("data-side") === "l") clearSel();
          selEl = b; b.classList.add("sel"); return;
        }
        if (!selEl) { return; }
        var lp = +selEl.getAttribute("data-p"), rp = +b.getAttribute("data-p");
        if (lp === rp) {
          selEl.classList.remove("sel"); selEl.classList.add("done"); b.classList.add("done");
          selEl = null; matched++;
          if (matched === pairs.length) {
            done = true;
            results[exIdx] = errors === 0;
            byId("fb").innerHTML = feedbackBox(errors === 0, "", "Lo lograste con " + errors + " intento(s) de mas.");
            var v = byId("verify"); v.disabled = false; setVerifyNext(v, total);
          }
        } else {
          errors++;
          var bad = b; bad.classList.add("bad"); var ls = selEl; if (ls) ls.classList.add("bad");
          clearSel();
          setTimeout(function () { bad.classList.remove("bad"); if (ls) ls.classList.remove("bad"); }, 420);
        }
      };
    });
    byId("verify").onclick = function () { if (done) advance(); };
  }

  /* ---------- LISTENING ---------- */
  function renderListening(ex, pct, total) {
    var hasOpts = Array.isArray(ex.options);
    var qHtml;
    if (hasOpts) {
      qHtml = '<p class="body">' + esc(ex.question || "Que escuchaste?") + '</p>'
        + '<div class="opts">' + ex.options.map(function (o, i) { return '<button class="opt" data-i="' + i + '">' + esc(o) + '</button>'; }).join("") + '</div>';
    } else {
      qHtml = '<p class="body">' + esc(ex.question || "Escribe lo que escuchaste") + '</p>'

    }
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Escucha</h2>'
      + '<div class="listen-controls"><button class="listen-play" id="play"><span class="ic">&#128266;</span> Reproducir</button>'
      + '<button class="listen-slow" id="playslow">&#128034; Más lento</button></div>'
      + '<div class="listen-note">Toca para escuchar. Puedes repetir las veces que quieras.</div>'
      + qHtml + '<div id="fb"></div><button class="btn" id="verify" disabled>Verificar</button></div></div>');
    byId("play").onclick = function () { speak(ex.text, ex.audio); };
    byId("playslow").onclick = function () { speak(ex.text, ex.audio, 0.62); };
    /* autoplay del audio si la preferencia está activa (Configuración → Sonido) */
    if (!window.VESPER_PREFS || VESPER_PREFS.autoplayEnabled()) {
      setTimeout(function () { try { speak(ex.text, ex.audio); } catch (e) {} }, 350);
    }
    var done = false;
    if (hasOpts) {
      var sel = -1, optEls = document.querySelectorAll(".opt");
      each(".opt", function (b) {
        b.onclick = function () {
          if (done) return;
          sel = +b.getAttribute("data-i");
          for (var x = 0; x < optEls.length; x++) optEls[x].classList.remove("sel");
          b.classList.add("sel"); byId("verify").disabled = false;
        };
      });
      byId("verify").onclick = function () {
        if (done) { advance(); return; }
        done = true;
        var ok = sel === ex.correctIndex;
        for (var x = 0; x < optEls.length; x++) {
          var i = +optEls[x].getAttribute("data-i"); optEls[x].classList.add("locked");
          if (i === ex.correctIndex) optEls[x].classList.add("correct");
          if (i === sel && !ok) optEls[x].classList.add("wrong");
        }
        results[exIdx] = ok;
        byId("fb").innerHTML = feedbackBox(ok, ex.explanation || "", "Era: " + ex.options[ex.correctIndex]);
        setVerifyNext(this, total);
      };
    } else {
      var answers = ex.answers || [ex.text];
      var inp = byId("ltype");
      inp.oninput = function () { byId("verify").disabled = !inp.value.trim(); };
      inp.onkeydown = function (e) { if (e.key === "Enter" && !byId("verify").disabled) byId("verify").click(); };
      byId("verify").onclick = function () {
        if (done) { advance(); return; }
        done = true; inp.disabled = true;
        var val = norm(inp.value);
        var ok = answers.some(function (a) { return norm(a) === val; });
        inp.classList.add(ok ? "correct" : "wrong");
        results[exIdx] = ok;
        byId("fb").innerHTML = feedbackBox(ok, "", "Era: " + (ex.text || answers[0] || ""));
        setVerifyNext(this, total);
      };
    }
  }

  /* ---------- CATEGORIZE ---------- */
  function renderCategorize(ex, pct, total) {
    var buckets = ex.buckets || [];
    var items = (ex.items || []).map(function (it, i) { return { t: it.t, bucket: it.bucket, i: i, at: null }; });
    var sel = null, done = false;
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<h2>Clasifica</h2>'
      + '<p class="hint">&#128161; ' + esc(ex.instruction || "Toca una palabra y luego su grupo.") + '</p>'
      + '<div class="cat-pool" id="pool"></div>'
      + '<div class="cat-buckets" id="buckets"></div>'
      + '<div id="fb"></div><button class="btn" id="verify" disabled>Verificar</button></div></div>');

    function tk(it, cls) { return '<button class="cat-tk' + (cls || "") + '" data-i="' + it.i + '">' + esc(it.t) + '</button>'; }
    function draw() {
      var pool = byId("pool"), bx = byId("buckets");
      var loose = items.filter(function (o) { return o.at === null; });
      pool.innerHTML = loose.length ? loose.map(function (o) { return tk(o, sel === o.i ? " sel" : ""); }).join("")
        : '<span class="muted" style="font-size:.85rem">Todo clasificado &#9989;</span>';
      bx.innerHTML = buckets.map(function (b) {
        var inside = items.filter(function (o) { return o.at === b.id; }).map(function (o) { return tk(o, o.cls || ""); }).join("");
        return '<div class="cat-bucket' + (sel !== null ? " active" : "") + '" data-b="' + b.id + '"><h4>' + esc(b.label) + '</h4>' + inside + '</div>';
      }).join("");
      if (!done) {
        each("#pool [data-i]", function (c) { c.onclick = function () { var i = +c.getAttribute("data-i"); sel = (sel === i ? null : i); draw(); }; });
        each(".cat-bucket [data-i]", function (c) { c.onclick = function () { var i = +c.getAttribute("data-i"); items[i].at = null; sel = i; draw(); }; });
        each("#buckets [data-b]", function (c) { c.onclick = function () { if (sel === null) return; items[sel].at = c.getAttribute("data-b"); sel = null; draw(); }; });
      }
      byId("verify").disabled = done ? false : items.some(function (o) { return o.at === null; });
    }
    draw();
    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true; sel = null;
      var ok = true;
      items.forEach(function (o) { if (o.at === o.bucket) o.cls = " correct"; else { o.cls = " wrong"; ok = false; } });
      draw();
      results[exIdx] = ok;
      byId("fb").innerHTML = feedbackBox(ok, "", "Revisa los que estan en rojo.");
      setVerifyNext(this, total);
    };
  }

  /* ---------- READING (pasaje + preguntas de comprension) ---------- */
  function renderReading(ex, pct, total) {
    var qs2 = ex.questions || [];
    var paras = Array.isArray(ex.passage) ? ex.passage : ("" + (ex.passage || "")).split(/\n{2,}|\n/);
    var passageHtml = paras.filter(function (p) { return ("" + p).trim(); })
      .map(function (p) { return '<p>' + esc(p) + '</p>'; }).join("");
    var qHtml = qs2.map(function (q, qi) {
      var opts = (q.options || []).map(function (o, i) {
        return '<button class="opt" data-q="' + qi + '" data-i="' + i + '">' + esc(o) + '</button>';
      }).join("");
      return '<div class="rq" data-qwrap="' + qi + '">'
        + '<div class="rq-num">Pregunta ' + (qi + 1) + ' de ' + qs2.length + '</div>'
        + '<div class="rq-q">' + esc(q.q || "Elige la opcion correcta") + '</div>'
        + '<div class="opts">' + opts + '</div><div class="rq-fb" id="rfb-' + qi + '"></div></div>';
    }).join("");
    show('<div class="wrap">' + exHeader(pct, total) + '<div class="card">'
      + '<span class="read-tag">&#128214; Lectura</span>'
      + (ex.title ? '<h2>' + esc(ex.title) + '</h2>' : '<h2>Lee y responde</h2>')
      + '<div class="passage">' + passageHtml + '</div>'
      + qHtml + '<div id="fb"></div>'
      + '<button class="btn" id="verify" disabled>Verificar</button></div></div>');

    var picks = qs2.map(function () { return -1; });
    var done = false;
    each(".opt", function (b) {
      b.onclick = function () {
        if (done) return;
        var qi = +b.getAttribute("data-q"), i = +b.getAttribute("data-i");
        picks[qi] = i;
        var group = document.querySelectorAll('.opt[data-q="' + qi + '"]');
        for (var x = 0; x < group.length; x++) group[x].classList.remove("sel");
        b.classList.add("sel");
        byId("verify").disabled = picks.some(function (p) { return p < 0; });
      };
    });
    byId("verify").onclick = function () {
      if (done) { advance(); return; }
      done = true;
      var allOk = true;
      qs2.forEach(function (q, qi) {
        var group = document.querySelectorAll('.opt[data-q="' + qi + '"]');
        var ok = picks[qi] === q.correctIndex;
        if (!ok) allOk = false;
        for (var x = 0; x < group.length; x++) {
          var i = +group[x].getAttribute("data-i");
          group[x].classList.add("locked");
          if (i === q.correctIndex) group[x].classList.add("correct");
          if (i === picks[qi] && !ok) group[x].classList.add("wrong");
        }
        byId("rfb-" + qi).innerHTML = feedbackBox(ok, q.explanation || "", "Era: " + (q.options[q.correctIndex] || ""));
      });
      results[exIdx] = allOk;
      setVerifyNext(this, total);
    };
  }

  /* ---------- FEEDBACK / XP ---------- */
  var lastPerfect = false, masteryUnlocked = false;
  function renderFeedback() {
    var total = lesson.exercises.length;
    var correct = results.filter(Boolean).length;
    var pct = Math.round(100 * correct / Math.max(1, total));
    earnedXp = Math.max(5, Math.round((lesson.xpReward || 0) * correct / Math.max(1, total)));
    if (PATH && PATH.setScore && lesson.lessonId) PATH.setScore(lesson.lessonId, pct);
    var perfect = correct === total;
    lastPerfect = perfect;
    /* repaso aprobado (>=80%) -> desbloquea maestría de la destreza */
    masteryUnlocked = false;
    if (lesson.isReview && pct >= 80 && P && P.unlock) {
      masteryUnlocked = P.unlock("master:" + lesson.reviewLevel + ":" + lesson.reviewSkill);
    }
    var head = lesson.isReview
      ? (pct >= 80 ? "Repaso superado!" : "Sigue practicando")
      : (perfect ? "Leccion perfecta!" : "Buen trabajo!");
    show('<div class="wrap">' + topbar(86) + '<div class="card center">'
      + mascot((perfect || (lesson.isReview && pct >= 80)) ? "milestone" : "correct", head)
      + '<h1>+' + earnedXp + ' XP</h1>'
      + '<p class="muted">' + correct + ' de ' + total + ' correctos &middot; ' + pct + '%</p>'
      + '<div class="xpbar"><div class="xpfill" style="width:' + pct + '%"></div></div>'
      + '<button class="btn btn-gold" id="cont">Continuar</button></div></div>');
    byId("cont").onclick = renderStreak;
  }

  /* ---------- STREAK ---------- */
  function renderStreak() {
    var info = P ? P.completeLesson(lesson.lessonId, earnedXp, { perfect: lastPerfect })
                 : { streak: 1, xp: earnedXp, milestone: false, shields: 0, newAchievements: [], dailyGoal: null };
    var grid = P ? P.weekGrid() : [];
    var cells = grid.map(function (d) {
      return '<div class="day' + (d.active ? " on" : "") + (d.isToday ? " today" : "") + '"><span>' + d.label + '</span><i>' + (d.active ? "🔥" : "&middot;") + '</i></div>';
    }).join("");
    var shields = "";
    for (var i = 0; i < (info.shields || 0); i++) shields += "🛡️";
    var mstate = info.milestone ? "milestone" : (info.streak > 0 ? "streak_alive" : "streak_broken");
    var hasNext = lesson.nextLessonId && L[lesson.nextLessonId];

    /* meta diaria */
    var dg = info.dailyGoal, goalHtml = "";
    if (dg) {
      var gp = Math.min(100, Math.round(100 * dg.progress / Math.max(1, dg.target)));
      goalHtml = '<div class="goal-card' + (dg.met ? ' met' : '') + '">&#127919; Meta diaria '
        + '<b>' + Math.min(dg.progress, dg.target) + '/' + dg.target + '</b>'
        + '<div class="goal-bar"><i style="width:' + gp + '%"></i></div>'
        + (dg.met ? '<span class="goal-done">Meta cumplida! &#10024;</span>' : '<span class="muted" style="font-size:.82rem">Te falta ' + Math.max(0, dg.target - dg.progress) + '</span>')
        + '</div>';
    }

    /* logros recién desbloqueados (incluye maestría de repaso) */
    var ach = (info.newAchievements || []).slice();
    if (masteryUnlocked) ach.push("master:" + lesson.reviewLevel + ":" + lesson.reviewSkill);
    var achHtml = "";
    if (ach.length && P && P.achievementsState) {
      var all = P.achievementsState(), byId2 = {};
      all.forEach(function (a) { byId2[a.id] = a; });
      achHtml = '<div class="ach-pop">' + ach.map(function (id) {
        var a = byId2[id] || { icon: "⭐", name: id };
        return '<div class="ach-badge"><span class="ab-ic">' + a.icon + '</span><span class="ab-tx"><b>Logro desbloqueado</b><span>' + esc(a.name) + '</span></span></div>';
      }).join("") + '</div>';
    }

    show('<div class="wrap">' + topbar(100) + '<div class="card center">'
      + mascot(mstate)
      + '<div class="flame">&#128293;</div>'
      + '<h1>' + info.streak + ' ' + (info.streak === 1 ? "dia" : "dias") + ' de racha</h1>'
      + (shields ? '<div class="shields">' + shields + '</div>' : '')
      + '<div class="week">' + cells + '</div>'
      + goalHtml
      + achHtml
      + '<div class="stat-row"><div class="stat">&#11088; <b>' + info.xp + '</b> XP total</div></div>'
      + (info.milestone ? '<div class="milestone">&#127881; Nuevo escudo de racha!</div>' : '')
      + '<div class="nudge" id="nudge">Guarda tu progreso en todos tus dispositivos: <a href="#" id="nudge-account">crea una cuenta</a> (opcional).'
      + '<button class="x" id="xn" aria-label="Cerrar">&times;</button></div>'
      + (hasNext ? '<button class="btn btn-gold" id="nextL">Siguiente leccion &rarr;</button>'
                   + '<button class="btn btn-ghost" id="moreL2">Ver todas las lecciones</button>'
                 : '<button class="btn btn-gold" id="moreL">Ver todas las lecciones</button>')
      + '</div></div>');
    var xn = byId("xn"); if (xn) xn.onclick = function () { byId("nudge").style.display = "none"; };
    var na = byId("nudge-account"); if (na) na.onclick = function (e) { e.preventDefault(); if (window.VESPER_SYNC && VESPER_SYNC.openAuth) VESPER_SYNC.openAuth(); else location.href = "login.html"; };
    var nx = byId("nextL"); if (nx) nx.onclick = function () { location.search = "?id=" + encodeURIComponent(lesson.nextLessonId); };
    var ml = byId("moreL"); if (ml) ml.onclick = function () { location.search = ""; };
    var ml2 = byId("moreL2"); if (ml2) ml2.onclick = function () { location.search = ""; };
  }

  /* ---------- ADAPTIVE START (warm-up + personalizacion) ---------- */
  function buildAdapted() {
    if (A && A.adaptLesson && profile) {
      lesson = A.adaptLesson(baseLesson, { session: (A.getSession ? A.getSession() : null) });
    } else {
      lesson = baseLesson;
    }
  }

  function startLesson() {
    var sess = (A && A.getSession) ? A.getSession() : null;
    var calibrate = A && profile && !sess && baseLesson.exercises && baseLesson.exercises.length >= 3;
    if (calibrate) { renderWarmup(); }
    else { buildAdapted(); renderCover(); }
  }

  /* ---------- REVIEW ("boss") quiz: lección sintética ---------- */
  function buildReviewLesson(rid) {
    if (!PATH) return null;
    var p = rid.split(":"), lv = p[1], sk = p[2];
    var meta = (PATH.SKILLS && PATH.SKILLS[sk]) || { label: sk };
    var built = PATH.build(L, ORDER), gg = built.levels[lv];
    if (!gg) return null;
    var ids = (gg.bySkill[sk] || []).filter(function (x) { return built.completed[x]; });
    if (ids.length < 2) return null;
    var pool = [];
    ids.forEach(function (lid) {
      var l = L[lid]; if (!l || !l.exercises || !l.exercises.length) return;
      var ex = shuffle(l.exercises.slice());
      pool = pool.concat(ex.slice(0, 2)); /* hasta 2 por lección */
    });
    shuffle(pool);
    var picked = pool.slice(0, Math.min(10, pool.length));
    return {
      lessonId: rid, level: lv, track: "Repaso", isReview: true, reviewLevel: lv, reviewSkill: sk,
      title: "Repaso: " + meta.label + " " + lv,
      explanation: {
        body: "Pon a prueba todo lo que aprendiste en " + meta.label + " (" + lv + "). Son preguntas mezcladas de tus lecciones completadas. Necesitas 80% para la maestría. (Repaso general de la destreza.)",
        examples: []
      },
      exercises: picked, xpReward: 20 + 5 * ids.length, mascotState: "thinking", nextLessonId: null
    };
  }

  /* quiz corto de calibracion al inicio de la sesion */
  function renderWarmup() {
    var band = A.levelToBand(A.profileLevel());
    var qs2 = A.warmupBank(band, 3);
    var idx = 0, ans = [];
    function step() {
      if (idx >= qs2.length) { finishWarm(); return; }
      var q = qs2[idx];
      var dots = qs2.map(function (_, i) { return '<span class="warm-dot' + (i <= idx ? " on" : "") + '"></span>'; }).join("");
      var opts = q.options.map(function (o, i) { return '<button class="opt" data-i="' + i + '">' + esc(o) + '</button>'; }).join("");
      show('<div class="wrap">' + topbar(6 + idx * 4) + '<div class="card center">'
        + mascot("thinking", A.greeting() + " Calibremos la sesion en 3 toques.") + '</div>'
        + '<div class="card"><div class="exnum">Calibracion &middot; ' + (idx + 1) + ' de ' + qs2.length + '</div>'
        + '<h2>' + esc(q.q) + '</h2><div class="opts">' + opts + '</div>'
        + '<div style="text-align:center;margin-top:10px">' + dots + '</div></div></div>');
      each(".opt", function (b) {
        b.onclick = function () {
          var i = +b.getAttribute("data-i");
          ans.push({ correct: i === q.correct, skill: q.skill });
          idx++; step();
        };
      });
    }
    function finishWarm() {
      var r = A.scoreWarmup(ans);
      buildAdapted();
      var msg = r.calibration > 0 ? "Vas muy bien: subimos el reto."
        : (r.calibration < 0 ? "Reforzamos lo basico, con calma." : "Listo, ajusto la leccion a tu nivel.");
      show('<div class="wrap">' + topbar(18) + '<div class="card center">'
        + mascot(r.calibration >= 0 ? "correct" : "explaining", msg)
        + '<h1>Sesion lista</h1>'
        + '<p class="muted">' + r.correct + ' de ' + r.total + ' en la calibracion</p>'
        + '<button class="btn btn-gold" id="go">Empezar leccion</button></div></div>');
      byId("go").onclick = renderCover;
    }
    step();
  }

  /* ---------- helpers ---------- */
  function byId(x) { return document.getElementById(x); }
  function each(sel, fn) { var n = document.querySelectorAll(sel); for (var i = 0; i < n.length; i++) fn(n[i]); }

  /* ---------- boot ---------- */
  if (!L || !Object.keys(L).length) { show('<div class="wrap"><div class="card center"><h1>Sin lecciones</h1><p class="muted">No se cargaron los datos.</p></div></div>'); return; }
  if (window.VESPER_THEME && VESPER_THEME.mountFloat) VESPER_THEME.mountFloat();
  if (!id) { renderIndex(); return; }
  if (id.indexOf("review:") === 0) {
    baseLesson = buildReviewLesson(id);
    if (!baseLesson || !baseLesson.exercises.length) {
      show('<div class="wrap"><div class="card center">' + mascot("thinking", "Aún no hay repaso disponible.")
        + '<h1>Repaso no disponible</h1><p class="muted">Completa al menos 2 lecciones de esta destreza.</p>'
        + '<a class="btn btn-gold" href="leccion.html">Ver lecciones</a></div></div>');
      return;
    }
    lesson = baseLesson;
    renderCover();
    return;
  }
  baseLesson = L[id];
  if (!baseLesson) {
    show('<div class="wrap"><div class="card center">' + mascot("incorrect", "No encuentro esa leccion.")
      + '<h1>Leccion no encontrada</h1><a class="btn btn-gold" href="leccion.html">Ver lecciones</a></div></div>');
    return;
  }
  lesson = baseLesson;
  startLesson();
})();
</script>
<script>
  /* PWA: registra el service worker (offline) solo en http/https, no en file:// */
  if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () { /* sin SW: sigue funcionando online */ });
    });
  }
</script>
