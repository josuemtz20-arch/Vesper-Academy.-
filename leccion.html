<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lecciones gratis · Vesper Academy</title>
<meta name="description" content="Aprende ingles gratis, sin cuenta. Lecciones cortas con ejercicios, racha diaria y XP.">
<link rel="icon" href="assets/images/favicon_32.png" sizes="32x32">
<link rel="manifest" href="manifest_lecciones.webmanifest">
<meta name="theme-color" content="#1B1B2F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vesper Lecciones">
<link rel="apple-touch-icon" href="assets/images/apple_touch_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/vesper_tokens.css">
<script src="vesper_prefs.js"></script>
<script src="vesper_sfx.js"></script>
<script src="vesper_icons.js"></script>
<style>
  :root{
    --ink:#1B1B2F; --gold:#c5a059; --gold2:#a8843d; --success:#2D9E75; --error:#C0392B;
    --cream:#f5f2eb; --paper:#ffffff; --muted:#6b6b76; --line:#ece7da;
    --gold-tint:rgba(197,160,89,.14); --ok-tint:rgba(45,158,117,.12); --no-tint:rgba(192,57,43,.10);
    --radius:16px; --shadow:0 6px 22px rgba(27,27,47,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.5;-webkit-text-size-adjust:100%}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  .wrap{max-width:600px;margin:0 auto;padding:14px 16px 40px;min-height:100vh}
  h1{font-family:"Inria Serif",Georgia,serif;font-size:1.7rem;line-height:1.2;margin:.2em 0}
  h2{font-family:"Inria Serif",Georgia,serif;font-size:1.25rem;margin:.1em 0 .5em}
  p{margin:.4em 0}
  .muted{color:var(--muted);font-size:.92rem}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .back{flex:0 0 auto;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;
    text-decoration:none;color:var(--ink);background:var(--paper);border:1px solid var(--line);font-size:1.2rem}
  .progress{flex:1;height:10px;background:#eee6d4;border-radius:999px;overflow:hidden}
  .bar{height:100%;background:var(--gold);border-radius:999px;transition:width .35s ease}
  /* cards */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
  .center{text-align:center}
  .center-row{justify-content:center}
  /* mascot */
  .mascot{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
  .center .mascot{flex-direction:column;align-items:center}
  .mascot-img{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--gold-tint);border:2px solid var(--gold);flex:0 0 auto}
  .bubble{background:var(--gold-tint);border-radius:14px;padding:9px 13px;font-size:.95rem;position:relative}
  /* meta pills */
  .lcard-top{display:flex;align-items:center;gap:8px;margin:6px 0}
  .pill{background:var(--ink);color:var(--cream);font-weight:600;font-size:.78rem;padding:3px 10px;border-radius:999px}
  .track{color:var(--gold);font-weight:600;font-size:.85rem;text-transform:uppercase;letter-spacing:.04em}
  /* body + examples */
  .body{font-size:1.02rem}
  .examples{list-style:none;padding:0;margin:14px 0 4px;display:grid;gap:8px}
  .examples li{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .examples .en{display:block;font-weight:600}
  .examples .es{display:block;color:var(--muted);font-size:.9rem}
  /* buttons */
  .btn{display:block;width:100%;min-height:50px;border:none;border-radius:13px;font-family:inherit;font-size:1.02rem;font-weight:600;
    cursor:pointer;margin-top:14px;background:var(--ink);color:var(--cream);padding:12px 16px}
  .btn:disabled{opacity:.45;cursor:default}
  .btn-gold{background:var(--gold);color:var(--ink)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn:active:not(:disabled){transform:translateY(1px)}
  /* MCQ */
  .exnum{font-size:.82rem;color:var(--muted);font-weight:600;margin:-4px 0 10px}
  /* icono SVG en línea (auto-escala con el texto) */
  .ei{display:inline-flex;align-items:center;vertical-align:-.14em}
  .ei svg{width:1.05em;height:1.05em;display:block}
  .flame .ei svg{width:1em;height:1em}
  .ach-badge .ab-ic svg{width:1.7rem;height:1.7rem}
  .srch-ic svg{width:1rem;height:1rem;display:block}
  .shields{color:var(--gold)}
  .shields .ei{margin:0 1px}
  /* combo dentro de la lección */
  .combo-chip{display:inline-flex;align-items:center;gap:7px;font-size:.8rem;font-weight:700;letter-spacing:.01em;
    color:var(--ink);background:linear-gradient(180deg,#fbe7b6,#f4d488);border:1px solid var(--gold2);
    padding:5px 13px;border-radius:999px;margin:0 0 10px;box-shadow:0 4px 14px rgba(168,132,61,.28);
    animation:combo-pop .35s cubic-bezier(.2,.8,.3,1.2)}
  .combo-chip b{font-size:1rem;font-variant-numeric:tabular-nums}
  @keyframes combo-pop{0%{transform:scale(.6) translateY(4px);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  .xp-bonus{display:inline-block;font-size:.9rem;font-weight:700;color:var(--gold2);margin:8px 0 2px;
    background:var(--gold-tint);padding:5px 12px;border-radius:999px}
  /* confetti (lección perfecta / combos) */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  .confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;opacity:.95;
    animation:confetti-fall var(--cf-dur,1900ms) cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes confetti-fall{0%{transform:translateY(-10vh) rotate(0);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:.85}}
  @media(prefers-reduced-motion:reduce){.combo-chip{animation:none}.confetti{display:none}}
  /* speaking */
  .speak-target{text-align:center;margin:8px 0 14px;padding:20px 16px;border-radius:16px;
    background:linear-gradient(165deg,var(--gold-tint),rgba(197,160,89,.04));border:1px solid var(--gold2)}
  .speak-target .en{display:block;font-family:"Inria Serif",Georgia,serif;font-size:1.5rem;line-height:1.25;color:var(--ink)}
  .speak-target .es{display:block;font-size:.92rem;color:var(--muted);margin-top:6px}
  .speak-row{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
  .speak-row .btn{margin-top:0;width:auto;min-height:44px;padding:10px 16px;font-size:.92rem;border-radius:999px}
  .mic-btn{width:100%;background:linear-gradient(180deg,#fff,#f5ead0);border:1.5px solid var(--gold);color:var(--ink)}
  .mic-btn.rec{background:linear-gradient(180deg,#ffe6e6,#ffcccc);border-color:#e88;animation:mic-pulse 1.1s ease infinite}
  @keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.38)}50%{box-shadow:0 0 0 12px rgba(192,57,43,0)}}
  .heard{text-align:center;min-height:1.2em;margin:10px 0 2px;font-size:.95rem;color:var(--muted)}
  @media(prefers-reduced-motion:reduce){.mic-btn.rec{animation:none}}
  /* tarjetas de acción del hub (repaso espaciado y liga) */
  .hub-card{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
    padding:15px 16px;border-radius:16px;margin-bottom:14px;transition:transform .15s ease,box-shadow .15s ease}
  .hub-card:hover{transform:translateY(-2px)}
  .hub-card .hc-ic{flex:0 0 auto;width:46px;height:46px;border-radius:14px;display:flex;align-items:center;
    justify-content:center;font-size:1.5rem}
  .hub-card .hc-ic svg{width:24px;height:24px}
  .hub-card .hc-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .hub-card .hc-tx b{font-size:1.02rem}
  .hub-card .hc-tx span{font-size:.86rem}
  .hub-card .hc-cta{flex:0 0 auto;font-weight:700;font-size:.9rem;opacity:.9}
  /* repaso espaciado: cálido crema-oro */
  .srs-banner{border:1px solid var(--gold2);background:linear-gradient(180deg,#fffdf6,#f8edcf);
    box-shadow:0 6px 20px rgba(168,132,61,.16)}
  .srs-banner .hc-ic{background:var(--gold-tint);color:var(--gold2)}
  .srs-banner .hc-tx span{color:var(--muted)}
  .srs-banner .hc-cta{color:var(--gold2)}
  /* liga: premium crepúsculo (índigo + oro) */
  .league-widget{border:1px solid #2c2c4a;color:var(--cream);
    background:linear-gradient(160deg,#2a2c50,#1B1B2F 65%,#14122a);box-shadow:0 12px 30px rgba(20,18,42,.32)}
  .league-widget .hc-ic{background:rgba(201,168,76,.18);box-shadow:inset 0 0 0 1px rgba(243,226,171,.35)}
  .league-widget .hc-tx b{color:#fff}
  .league-widget .hc-tx span{color:#c8c6e0}
  .league-widget .hc-cta{color:var(--gold)}
  /* tira de gemas/vidas durante el ejercicio */
  .econ-strip{display:flex;justify-content:flex-end;gap:8px;align-items:center;margin:2px 0 10px}
  .econ-gems,.econ-hearts{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:.86rem;
    padding:4px 11px;border-radius:999px;border:1px solid var(--line);background:var(--paper)}
  .econ-gems{color:#0f7c8a}
  .econ-strip .ei{display:inline-flex}
  .econ-strip .ei svg{width:15px;height:15px;display:block}
  .econ-hearts .ei+.ei{margin-left:1px}
  .opts{display:grid;gap:10px;margin:6px 0}
  .opt{text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-family:inherit;
    font-size:1rem;color:var(--ink);cursor:pointer;min-height:50px}
  .opt.sel{border-color:var(--gold);background:var(--gold-tint)}
  .opt.correct{border-color:var(--success);background:var(--ok-tint)}
  .opt.wrong{border-color:var(--error);background:var(--no-tint)}
  .opt.locked{cursor:default}
  /* find the error (TOEFL written expression) */
  .fe-sentence{font-size:1.12rem;line-height:2.2;margin:6px 0 14px;color:var(--ink)}
  .fe-seg{display:inline;border:none;background:none;font-family:inherit;font-size:inherit;color:var(--ink);cursor:pointer;
    text-decoration:underline;text-decoration-color:var(--gold2);text-underline-offset:4px;text-decoration-thickness:2px;
    padding:1px 3px;border-radius:7px}
  .fe-seg .fe-lab{font-size:.62em;font-weight:800;color:var(--gold2);margin-right:1px;vertical-align:super}
  .fe-seg.sel{background:var(--gold-tint)}
  .fe-seg.correct{background:var(--ok-tint);text-decoration-color:var(--success)}
  .fe-seg.correct .fe-lab{color:var(--success)}
  .fe-seg.wrong{background:var(--no-tint);text-decoration-color:var(--error)}
  .fe-seg.wrong .fe-lab{color:var(--error)}
  .fe-seg.locked{cursor:default}
  /* word order */
  .hint{background:var(--gold-tint);border-radius:12px;padding:8px 12px;font-size:.9rem;margin:2px 0 12px}
  .answer{min-height:56px;border:1.5px dashed var(--gold);border-radius:13px;padding:9px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--cream)}
  .answer .ph{color:var(--muted);font-size:.92rem;padding:4px 6px}
  .bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:44px}
  .chip{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:9px 15px;font-family:inherit;font-size:1rem;
    color:var(--ink);cursor:pointer;min-height:42px}
  .chip.placed{background:var(--gold-tint);border-color:var(--gold)}
  .chip.correct{background:var(--ok-tint);border-color:var(--success)}
  .chip.wrong{background:var(--no-tint);border-color:var(--error)}
  /* feedback */
  .fbbox{display:flex;gap:12px;align-items:flex-start;border-radius:13px;padding:12px;margin-top:14px}
  .fbbox.ok{background:var(--ok-tint)}
  .fbbox.no{background:var(--no-tint)}
  .fb-cat{width:46px;height:46px;border-radius:50%;object-fit:cover;flex:0 0 auto;border:2px solid var(--paper)}
  .explain{margin-top:6px;font-size:.92rem}
  /* feedback / xp screen */
  .xpbar{height:14px;background:#eee6d4;border-radius:999px;overflow:hidden;margin:14px 0}
  .xpfill{height:100%;background:var(--success);border-radius:999px;transition:width .6s ease}
  /* streak */
  .flame{font-size:2.6rem;line-height:1}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:16px 0}
  .day{background:var(--cream);border:1px solid var(--line);border-radius:11px;padding:8px 0;text-align:center;font-size:.8rem;color:var(--muted)}
  .day i{display:block;font-style:normal;font-size:1.05rem;margin-top:3px}
  .day.on{background:var(--gold-tint);border-color:var(--gold);color:var(--ink);font-weight:600}
  .day.today{outline:2px solid var(--gold)}
  .shields{font-size:1.4rem;margin:4px 0}
  .milestone{background:var(--gold-tint);border-radius:12px;padding:10px;font-weight:600;margin:10px 0}
  .stat-row{display:flex;gap:10px;justify-content:center;margin:12px 0}
  .stat{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:8px 14px;font-size:.95rem}
  /* index */
  .hero{display:flex;justify-content:center;margin-top:6px}
  .grid{display:grid;gap:12px;margin-top:8px}
  .lcard{text-align:left;display:block;width:100%}
  .lcard h2{margin:.2em 0}
  /* soft account nudge */
  .nudge{position:relative;background:var(--cream);border:1px dashed var(--gold);border-radius:12px;padding:11px 34px 11px 12px;font-size:.88rem;margin:14px 0;text-align:left}
  .nudge a{color:var(--ink);font-weight:600}
  .nudge .x{position:absolute;top:6px;right:8px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
  /* ===== Hub progresivo (estilo Test-English) ===== */
  .hub-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 6px}
  .hub-hello{font-family:"Inria Serif",Georgia,serif;font-size:1.5rem;line-height:1.1;margin:0}
  .hub-stats{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 4px}
  .hub-stat{background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:.85rem;font-weight:600}
  /* continue card */
  .cont-card{display:flex;align-items:center;gap:14px;text-align:left;width:100%;background:linear-gradient(135deg,var(--ink),#2c2c4a);color:var(--cream);border:none;border-radius:18px;padding:16px 18px;cursor:pointer;margin:10px 0 6px;box-shadow:var(--shadow)}
  .cont-ico{flex:0 0 auto;width:48px;height:48px;border-radius:50%;background:var(--gold);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
  .cont-card .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;opacity:.8}
  .cont-card .ttl{font-weight:700;font-size:1.05rem;margin:2px 0}
  .cont-card .meta{font-size:.8rem;opacity:.85}
  /* level tabs */
  .lvl-tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 2px 4px;margin:6px -2px 2px;-webkit-overflow-scrolling:touch}
  .lvl-tab{flex:0 0 auto;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);background:var(--paper);border-radius:13px;padding:8px 12px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lvl-tab.on{border-color:var(--gold);background:var(--gold-tint)}
  .lvl-tab .nm{font-weight:700;font-size:.95rem}
  .lvl-tab .pc{font-size:.72rem;color:var(--muted)}
  .ring{width:30px;height:30px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--ink)}
  .ring i{width:22px;height:22px;border-radius:50%;background:var(--paper);display:flex;align-items:center;justify-content:center;font-style:normal}
  /* level header */
  .lvl-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0 2px}
  .lvl-head h2{margin:0;font-size:1.2rem}
  .lvl-head .lvl-badge{font-size:.72rem;font-weight:700;color:#fff;border-radius:999px;padding:3px 10px}
  .lvl-prog{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 2px}
  .lvl-prog i{display:block;height:100%;border-radius:999px;transition:width .5s ease}
  /* skill section */
  .skill-sec{margin:14px 0 2px}
  .skill-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;margin:8px 0 8px;color:var(--ink)}
  .skill-h .ic{font-size:1.1rem}
  .skill-h .ct{margin-left:auto;font-size:.78rem;color:var(--muted);font-weight:600}
  /* lesson cards */
  .lgrid{display:grid;gap:10px}
  .lcard2{display:flex;align-items:center;gap:12px;text-align:left;width:100%;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lcard2:active:not(.locked){transform:translateY(1px)}
  .lcard2.completed{border-color:var(--success)}
  .lcard2.locked{opacity:.6;cursor:not-allowed;background:var(--cream)}
  .lc-badge{flex:0 0 auto;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;background:var(--gold-tint);color:var(--ink)}
  .lcard2.completed .lc-badge{background:var(--ok-tint)}
  .lcard2.locked .lc-badge{background:#e9e6dd}
  .lc-body{flex:1;min-width:0}
  .lc-ttl{font-weight:600;font-size:1rem;line-height:1.25}
  .lc-sub{font-size:.8rem;color:var(--muted);margin-top:2px}
  .lc-stars{color:var(--gold);font-size:.95rem;letter-spacing:1px}
  .lc-stars .off{color:var(--line)}
  .lc-go{flex:0 0 auto;color:var(--muted);font-size:1.1rem}
  .hub-toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--cream);padding:10px 16px;border-radius:999px;font-size:.85rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:9997}
  .hub-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* adaptive badge + warm-up */
  .adapt-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);color:var(--ink);border:1px solid var(--gold);border-radius:999px;padding:5px 12px;font-size:.78rem;font-weight:600;margin:8px 0 2px}
  .warm-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--line);margin:0 3px}
  .warm-dot.on{background:var(--gold)}
  /* true / false */
  .statement{font-size:1.08rem;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:6px 0 4px}
  .tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 4px}
  .tf-btn{min-height:54px;border:1.5px solid var(--line);border-radius:13px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer}
  .tf-btn.sel{border-color:var(--gold);background:var(--gold-tint)}
  .tf-btn.correct{border-color:var(--success);background:var(--ok-tint)}
  .tf-btn.wrong{border-color:var(--error);background:var(--no-tint)}
  .tf-btn.locked{cursor:default}
  /* fill blank + translate input */
  .type-input{width:100%;min-height:50px;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;font-family:inherit;font-size:1.05rem;color:var(--ink);background:var(--paper);-webkit-appearance:none}
  .type-input:focus{outline:none;border-color:var(--gold)}
  .type-input:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .type-input.correct{border-color:var(--success);background:var(--ok-tint)}
  .type-input.wrong{border-color:var(--error);background:var(--no-tint)}
  .fb-sentence{font-size:1.12rem;margin:8px 0 10px;line-height:2}
  .fb-sentence input{display:inline-block;width:auto;min-width:108px;min-height:0;padding:6px 10px;vertical-align:baseline}
  /* matching */
  .match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 4px}
  .match-item{display:block;width:100%;text-align:center;border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;margin-bottom:8px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:.98rem;cursor:pointer;min-height:48px}
  .match-item.sel{border-color:var(--gold);background:var(--gold-tint)}
  .match-item.done{border-color:var(--success);background:var(--ok-tint);cursor:default;opacity:.7}
  .match-item.bad{border-color:var(--error);background:var(--no-tint);animation:vc-shake .4s ease}
  /* listening */
  .listen-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:4px 0 8px}
  .listen-play{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--cream);border:none;border-radius:14px;padding:14px 20px;font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer}
  .listen-play .ic{font-size:1.25rem}
  .listen-slow{display:inline-flex;align-items:center;gap:8px;background:var(--paper);color:var(--ink);border:1.5px solid var(--line);border-radius:14px;padding:13px 16px;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer}
  .listen-slow:active{transform:translateY(1px)}
  .listen-note{color:var(--muted);font-size:.85rem;margin:0 0 12px}
  /* reading passage */
  .passage{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:6px 0 14px;max-height:340px;overflow:auto;-webkit-overflow-scrolling:touch}
  .passage h3{font-family:"Inria Serif",Georgia,serif;font-size:1.15rem;margin:0 0 8px}
  .passage p{font-size:1.04rem;line-height:1.7;margin:0 0 10px}
  .passage p:last-child{margin-bottom:0}
  .read-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);color:var(--ink);border:1px solid var(--gold);border-radius:999px;padding:4px 11px;font-size:.76rem;font-weight:600;margin:0 0 8px}
  .rq{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .rq:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .rq .rq-q{font-weight:600;font-size:1rem;margin:0 0 8px}
  .rq-num{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:4px}
  /* categorize */
  .cat-pool{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px;min-height:40px}
  .cat-tk{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:8px 14px;font-family:inherit;font-size:.96rem;color:var(--ink);cursor:pointer}
  .cat-tk.sel{border-color:var(--gold);background:var(--gold-tint)}
  .cat-tk.correct{border-color:var(--success);background:var(--ok-tint)}
  .cat-tk.wrong{border-color:var(--error);background:var(--no-tint)}
  .cat-buckets{display:grid;gap:10px}
  .cat-bucket{border:1.5px dashed var(--line);border-radius:13px;padding:10px 12px;min-height:60px;background:var(--cream)}
  .cat-bucket.active{border-color:var(--gold)}
  .cat-bucket h4{margin:0 0 4px;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .cat-bucket .cat-tk{margin:4px 4px 0 0;display:inline-block}
  /* gamificación: meta diaria, logros, repaso */
  .hub-stat.met{background:var(--ok-tint);border-color:var(--success);color:var(--ink)}
  .lcard2.review{background:linear-gradient(135deg,var(--gold-tint),var(--paper));border-color:var(--gold);border-style:dashed}
  .lcard2.review .lc-badge{background:var(--gold);color:var(--ink)}
  .trophy-shelf{margin:8px 0 2px;border:1px solid var(--line);border-radius:14px;background:var(--paper);padding:4px 12px}
  .trophy-shelf summary{cursor:pointer;font-weight:700;font-size:.9rem;list-style:none;display:flex;align-items:center;gap:8px;padding:8px 0}
  .trophy-shelf summary::-webkit-details-marker{display:none}
  .trophy-shelf .t-count{margin-left:auto;font-size:.78rem;color:var(--muted)}
  .trophy-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 10px}
  .trophy{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:.82rem;background:var(--cream);opacity:.55}
  .trophy.on{opacity:1;border-color:var(--gold);background:var(--gold-tint)}
  .trophy .t-ic{font-size:1rem}
  .trophy .t-nm{font-weight:600}
  .goal-card{background:var(--cream);border:1px solid var(--line);border-radius:13px;padding:12px;margin:12px 0;font-weight:600}
  .goal-card.met{background:var(--ok-tint);border-color:var(--success)}
  .goal-bar{height:9px;background:#eee6d4;border-radius:999px;overflow:hidden;margin:8px 0 4px}
  .goal-bar i{display:block;height:100%;background:var(--gold);border-radius:999px;transition:width .5s ease}
  .goal-card.met .goal-bar i{background:var(--success)}
  .goal-done{display:block;color:var(--success);font-size:.86rem}
  .ach-pop{display:grid;gap:8px;margin:12px 0}
  .ach-badge{display:flex;align-items:center;gap:11px;text-align:left;background:var(--gold-tint);border:1px solid var(--gold);border-radius:13px;padding:10px 13px}
  .ach-badge .ab-ic{font-size:1.7rem;line-height:1}
  .ach-badge .ab-tx{display:flex;flex-direction:column}
  .ach-badge .ab-tx b{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gold)}
  .ach-badge .ab-tx span{font-weight:700}
  /* celebración de cosmético desbloqueado (reusa .ach-pop/.ach-badge) */
  .ach-badge .cos-dot{display:inline-block;width:24px;height:24px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px var(--gold)}
  .ach-badge .cos-svg{display:inline-flex;width:30px;height:30px}
  .ach-badge .cos-svg svg{width:30px;height:30px}
  .ach-badge .cos-pel img{width:34px;height:34px;object-fit:contain;display:block}
  .cos-cta{display:inline-block;margin-top:2px;font-weight:700;color:var(--gold-ink,var(--gold));text-decoration:none;font-size:.86rem}
  /* buscador + filtros del hub */
  .hub-search{margin:12px 0 2px}
  .srch{position:relative}
  .srch-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;opacity:.7}
  .srch input{width:100%;min-height:46px;border:1.5px solid var(--line);border-radius:13px;padding:11px 14px 11px 40px;
    font-family:inherit;font-size:1rem;color:var(--ink);background:var(--paper);-webkit-appearance:none}
  .srch input:focus{outline:none;border-color:var(--gold)}
  .filter-row{display:flex;gap:8px;overflow-x:auto;padding:2px;margin:8px -2px 0;-webkit-overflow-scrolling:touch}
  .filter-row + .filter-row{margin-top:6px}
  .fchip{flex:0 0 auto;border:1.5px solid var(--line);background:var(--paper);border-radius:999px;padding:8px 13px;
    font-family:inherit;font-size:.85rem;font-weight:600;color:var(--ink);cursor:pointer;min-height:40px;white-space:nowrap}
  .fchip.on{border-color:var(--gold);background:var(--gold-tint)}
  .fchip:active{transform:translateY(1px)}
  .search-results{margin-top:12px}
  .search-results .lc-lvl{display:inline-block;font-size:.7rem;font-weight:700;color:var(--gold);
    letter-spacing:.04em;text-transform:uppercase;margin-right:6px}
  .search-empty{padding:14px 4px;color:var(--muted)}
  @media(min-width:640px){
    h1{font-size:2rem}
    .mascot-img{width:84px;height:84px}
    .wrap{padding-top:22px}
  }
  /* tablet / desktop: aprovecha el ancho con tarjetas de lección en 2 columnas.
     El reproductor (cover, explicación y ejercicios) se mantiene en 1 columna. */
  @media(min-width:760px){
    .wrap{max-width:720px}
    .lgrid{grid-template-columns:1fr 1fr;align-items:stretch}
    .grid{grid-template-columns:1fr 1fr}
    .lcard2{height:100%}
  }
  /* ===== Mapa de mundos (HUB estilo videojuego) ===== */
  .hub-strip{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 2px}
  .hub-icon{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;flex:none;border-radius:50%;
    background:var(--paper);border:1px solid var(--line);text-decoration:none;color:var(--ink);font-size:1.2rem;cursor:pointer;font-family:inherit}
  .hub-icon:active{transform:translateY(1px)}
  /* cinta de mundos (selector de niveles A1–C2) — cada mundo lleva su acento temático */
  .worlds{display:flex;gap:11px;overflow-x:auto;padding:12px 4px 14px;margin:12px -4px 4px;
    scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .worlds::-webkit-scrollbar{display:none}
  .world{flex:0 0 auto;position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:98px;
    border:1.5px solid var(--line);background:var(--paper);border-radius:18px;padding:14px 12px 11px;cursor:pointer;
    font-family:inherit;color:var(--ink);scroll-snap-align:start;box-shadow:0 2px 9px rgba(27,27,47,.05)}
  .world::before{content:"";position:absolute;left:14px;right:14px;top:0;height:4px;border-radius:0 0 4px 4px;
    background:var(--w-accent,var(--gold));opacity:0;transition:opacity .18s ease}
  .world.on::before{opacity:1}
  /* anillo de progreso con la sigla del nivel al centro */
  .world .w-ring{position:relative;width:54px;height:54px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;
    background:conic-gradient(var(--w-accent,var(--gold)) calc(var(--pct,0)*1%),var(--line) 0)}
  .world .w-ring-hole{position:relative;width:44px;height:44px;border-radius:50%;background:var(--paper);
    display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(27,27,47,.05)}
  .world .w-code{font-weight:800;font-size:1.02rem;letter-spacing:.01em;color:var(--ink)}
  .world .w-nm{font-weight:700;font-size:.82rem;line-height:1.16;text-align:center;color:var(--ink);max-width:86px}
  .world .w-pc{font-size:.72rem;color:var(--muted);font-weight:600}
  .world.on{border-color:var(--w-accent,var(--gold));background:var(--w-accent-soft,var(--gold-tint))}
  .world.on .w-pc{color:var(--ink)}
  /* mundo dominado (100%) */
  .world.complete .w-done{position:absolute;top:8px;right:9px;width:20px;height:20px;border-radius:50%;
    background:var(--success);color:#fff;display:grid;place-items:center;box-shadow:0 1px 4px rgba(45,158,117,.4)}
  .world.complete .w-done svg{width:13px;height:13px}
  /* mundo bloqueado: legible (sin opacity baja que rompe contraste) */
  .world.locked{cursor:not-allowed;background:var(--cream);border-style:dashed}
  .world.locked .w-ring{background:var(--line)}
  .world.locked .w-ring-hole{background:var(--cream)}
  .world.locked .w-code,.world.locked .w-nm{color:var(--muted)}
  .world .w-lk{position:absolute;top:7px;right:9px;width:21px;height:21px;border-radius:50%;background:var(--ink);
    color:var(--cream);display:grid;place-items:center;opacity:.92}
  .world .w-lk svg{width:12px;height:12px}
  .world:focus-visible{outline:3px solid var(--w-accent,var(--gold));outline-offset:2px}
  /* ruta serpenteante */
  /* ===== Escena 2D del mundo: cielo estrellado navy + isla de terreno ===== */
  .wsky{position:relative;margin:14px 0 16px;border-radius:20px;overflow:hidden;
    background:radial-gradient(120% 90% at 50% -10%,#20203c 0%,var(--ink,#1B1B2F) 55%,#14122a 100%);
    box-shadow:inset 0 0 0 1px rgba(197,160,89,.18),0 14px 34px rgba(20,18,42,.30)}
  .wsky::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.55;
    background-repeat:no-repeat;background-image:
      radial-gradient(1.5px 1.5px at 12% 16%,rgba(243,226,171,.9),transparent 60%),
      radial-gradient(1.2px 1.2px at 78% 8%,rgba(255,255,255,.7),transparent 60%),
      radial-gradient(1.6px 1.6px at 33% 60%,rgba(243,226,171,.7),transparent 60%),
      radial-gradient(1.2px 1.2px at 88% 46%,rgba(255,255,255,.6),transparent 60%),
      radial-gradient(1.3px 1.3px at 58% 82%,rgba(243,226,171,.65),transparent 60%),
      radial-gradient(1.1px 1.1px at 22% 90%,rgba(255,255,255,.5),transparent 60%),
      radial-gradient(1.4px 1.4px at 68% 70%,rgba(243,226,171,.6),transparent 60%)}
  .wisland{position:relative;z-index:1;margin:10px;border-radius:18px;padding:8px 0 16px;
    border:1px solid var(--w-accent,#c5a059);
    box-shadow:0 10px 26px rgba(20,18,42,.42),inset 0 1px 0 rgba(255,255,255,.05);
    background:linear-gradient(180deg,rgba(27,27,47,.28),rgba(27,27,47,.64))}
  .wisland::before{content:"";position:absolute;inset:0;z-index:-1;border-radius:18px;pointer-events:none;
    background-image:var(--w-terrain);background-size:cover;background-position:center;opacity:.20;
    filter:saturate(.85) brightness(.8);
    -webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.95),rgba(0,0,0,.35) 70%,transparent);
            mask-image:linear-gradient(180deg,rgba(0,0,0,.95),rgba(0,0,0,.35) 70%,transparent)}
  .wisland::after{content:"";position:absolute;inset:0;z-index:-1;border-radius:18px;pointer-events:none;opacity:.5;
    background:radial-gradient(80% 50% at 50% 0%,var(--w-glow,rgba(197,160,89,.25)) 0%,transparent 60%)}
  .wmap{position:relative;display:flex;flex-direction:column;align-items:center;gap:30px;margin:0 auto;padding:12px 0 6px;width:100%;max-width:340px}
  /* capa de terreno: paisaje del bioma detrás del camino. Las piezas se pintan
     con clases .terr (compartidas con el motivo de bioma de la portada de lección). */
  .wterrain{position:absolute;left:0;top:0;z-index:0;overflow:visible;pointer-events:none}
  .terr .prop{opacity:.92}
  .terr .sh{fill:rgba(8,7,20,.45)}
  .terr .lf{fill:var(--w-accent,#5E8A4E)}
  .terr .lf2{fill:var(--w-accent,#5E8A4E);opacity:.7}
  .terr .tk{fill:#3a2a1c}
  .terr .stem{fill:#cabfa6}
  .terr .rk{fill:#34344f;stroke:rgba(255,255,255,.07);stroke-width:.6}
  .terr .rk2{fill:none;stroke:rgba(255,255,255,.12);stroke-width:.6}
  .terr .bdy{fill:#23234a;stroke:rgba(255,255,255,.06);stroke-width:.5}
  .terr .win{fill:var(--gold,#c5a059)}
  .terr .glow{fill:var(--gold,#c5a059);opacity:.32}
  .terr .dot{fill:#f5f2eb;opacity:.85}
  .terr .ln{fill:none;stroke:var(--w-accent,#5E8A4E);stroke-width:1.4;stroke-linecap:round}
  .terr .ln2{fill:none;stroke:var(--w-accent,#5E8A4E);stroke-width:1.2;opacity:.7}
  .terr .spark{fill:var(--gold,#c5a059)}
  .terr .ring{fill:none;stroke:var(--w-accent,#6A5FA8);stroke-width:1.4;opacity:.8}
  .terr .gem{fill:var(--w-accent,#3FA08A);opacity:.85}
  .terr .gem2{fill:none;stroke:rgba(255,255,255,.28);stroke-width:.5}
  .terr .flag{fill:none;stroke:var(--gold,#c5a059);stroke-width:1.2}
  .biome-motif{flex:none;display:block}
  .biome-motif .prop{opacity:1}
  /* ===== Camino temático (calzada en capas, trazado por JS sobre los nodos) =====
     Orden DOM = profundidad. paintTrail pone el MISMO "d" medido en todas las
     <path>; .wtrail-line queda penúltima (el avatar mide su longitud) y
     .wtrail-comet última (cuenta de luz que recorre la ruta). El carácter de
     cada mundo se afina en .wmap[data-world="XX"] más abajo. */
  .wtrail{position:absolute;left:0;top:0;z-index:1;overflow:visible;pointer-events:none}
  .wtrail path{fill:none;stroke-linecap:round;stroke-linejoin:round}
  .wtrail-base{stroke:var(--w-accent,#c5a059);stroke-width:26;opacity:.16;stroke-linecap:round}   /* arcén/terreno bajo la calzada */
  .wtrail-road{stroke:var(--w-accent,#c5a059);stroke-width:16;opacity:.30}                          /* superficie de la calzada */
  .wtrail-tex{stroke:var(--w-accent,#c5a059);stroke-width:19;opacity:.34;stroke-dasharray:1.5 8}    /* textura: adoquín/tabla/peldaño/estrella */
  .wtrail-glow{stroke:var(--w-glow,rgba(197,160,89,.4));stroke-width:10;opacity:.55}
  .wtrail-line{stroke:var(--gold,#c5a059);stroke-width:3.5;stroke-dasharray:2 12;opacity:.95}        /* veta dorada = ruta recorrida (PENÚLTIMA) */
  .wtrail-comet{stroke:var(--gold,#c5a059);stroke-width:7;stroke-linecap:round;stroke-dasharray:16 99999;  /* cuenta de luz dorada (ÚLTIMA) */
    filter:drop-shadow(0 0 6px var(--gold,#c5a059));opacity:.95;
    will-change:stroke-dashoffset;animation:g-comet 13s linear infinite;animation-play-state:paused}  /* paintTrail la reanuda con --total ya medido */
  @keyframes g-comet{from{stroke-dashoffset:0}to{stroke-dashoffset:calc(-1 * var(--total,4000px))}}
  /* nodos/carteles por encima del terreno y el camino */
  .wisland .wnode{z-index:2}
  .wisland .wstart{z-index:2}
  /* avatar (gato Vesper) que recorre el sendero — contenedor animado;
     el gato (.wcat) lleva el color del skin (--vc-filter); la capa .wacc
     superpone el accesorio elegido sin recibir el tinte de color */
  .wavatar{position:absolute;left:0;top:0;width:50px;height:50px;z-index:3;
    offset-anchor:50% 50%;offset-rotate:0deg;pointer-events:none;animation:wbob 2.4s ease-in-out infinite}
  .wavatar .wcat{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 6px 7px rgba(20,18,42,.5)) var(--vc-filter,hue-rotate(0deg))}
  /* pelaje (apariencia completa por imagen): conserva sus propios colores (sin tinte) */
  .wavatar.has-pelaje .wcat{filter:drop-shadow(0 6px 7px rgba(20,18,42,.5))}
  .wavatar .wacc{position:absolute;inset:0;pointer-events:none}
  .wavatar .wacc svg{width:100%;height:100%;display:block;overflow:visible;
    filter:drop-shadow(0 1px 1px rgba(20,18,42,.45))}
  @keyframes wbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  /* títulos/etiquetas legibles sobre la isla oscura */
  .wisland .wtitle{color:var(--cream,#f5f2eb)}
  .wisland .wnode.locked .wtitle{color:rgba(245,242,235,.55)}
  /* checkpoint de destreza = cartel de zona tallado en el terreno */
  .wisland .wcheck{position:relative;z-index:2;background:linear-gradient(180deg,#262649,#191930);
    border:1px solid var(--w-accent,#c5a059);border-left:1px solid var(--w-accent,#c5a059);border-radius:11px;
    color:var(--cream,#f5f2eb);letter-spacing:.02em;
    box-shadow:0 4px 0 rgba(8,7,20,.5),inset 0 1px 0 rgba(255,255,255,.06)}
  .wisland .wcheck .ic::before{color:var(--w-accent,#c5a059)}
  .wisland .wcheck .ct{color:var(--gold,#c5a059)}
  /* Guardián del mundo (jefe): arco/portal — distinto del castillo */
  .wbtn.boss{width:92px;height:90px;border-radius:46px 46px 16px 16px;border-width:4px;font-size:1.8rem;
    background:linear-gradient(160deg,#23234a,var(--ink,#1B1B2F));border-color:var(--w-accent,#c5a059);
    color:var(--w-accent,#c5a059);box-shadow:0 7px 0 rgba(20,18,42,.45),0 10px 24px rgba(20,18,42,.5)}
  .wbtn.boss.locked{filter:grayscale(.65) brightness(.7);color:#8e8aa6;border-color:#3a3a55;cursor:not-allowed;box-shadow:none}
  .wbtn.boss.ready{color:var(--gold,#c5a059);border-color:var(--gold,#c5a059)}
  .wbtn.boss.ready::after{content:"";position:absolute;inset:-7px;border-radius:46px 46px 16px 16px;pointer-events:none;
    box-shadow:0 0 0 0 rgba(197,160,89,.5);animation:wpulse 1.7s ease-in-out infinite}
  .wbtn.boss.conquered{background:linear-gradient(160deg,#dcc08a,var(--gold,#c5a059));color:#1B1B2F;border-color:var(--gold2,#a8843d)}
  .wbtn.boss .beam{opacity:0}
  .wbtn.boss.ready .beam,.wbtn.boss.conquered .beam{opacity:1;animation:wbeam 2.6s ease-in-out infinite}
  @keyframes wbeam{0%,100%{opacity:.5}50%{opacity:1}}
  .wboss-node .wlabel.boss-lb{background:var(--w-accent,#1B1B2F);color:#fff}
  .wboss-node .wtitle{font-weight:800;color:var(--cream,#f5f2eb)}
  .wbridge{display:block;width:4px;height:26px;margin:9px auto 0;border-radius:3px;
    background:repeating-linear-gradient(180deg,var(--gold,#c5a059) 0 5px,transparent 5px 10px)}
  /* mini-reto (repaso por destreza): más pequeño y subordinado al Guardián */
  .wbtn.castle.mini{width:58px;height:54px;border-radius:14px;border-width:3px;font-size:1.2rem;
    background:linear-gradient(150deg,#2c2c4a,#1B1B2F);border-color:var(--w-accent,#c5a059);color:var(--w-accent,#c5a059)}
  .wbtn.castle.mini.completed{background:linear-gradient(150deg,#dcc08a,var(--gold,#c5a059));border-color:var(--gold2,#a8843d);color:#1B1B2F}
  .wnode.mini .wtitle{font-size:.74rem}
  .wnode.mini .wlabel.mini-lb{font-size:.56rem;background:#2c2c4a;color:var(--gold,#c5a059)}
  /* reduce-motion: sin caminar del avatar, sin haz del faro, sin titileo del cielo */
  @media(prefers-reduced-motion:reduce){

  .vesper-reduce-motion .wavatar{animation:none}
  .vesper-reduce-motion .wbtn.boss .beam{animation:none;opacity:1}

  /* ===== Pantallas del Guardián (portada / medidor / resultado) ===== */
  .boss-cover{background:linear-gradient(170deg,#23234a,var(--ink,#1B1B2F));color:var(--cream,#f5f2eb);

  @keyframes boss-throb{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

  .bm-bar{flex:1;min-width:60px;height:9px;border-radius:999px;background:rgba(27,27,47,.14);overflow:hidden}

  /* ===== Identidad del mundo al entrar a una lección ===== */
  #app[data-world] .topbar .bar{background:linear-gradient(90deg,var(--w-accent,#c5a059),var(--gold,#c5a059))}

  .lesson-world .lw-nm{display:block;font-family:"Inria Serif",Georgia,serif;font-size:1.06rem;line-height:1.1;color:var(--cream,#f5f2eb)}

  .wbtn.completed{background:linear-gradient(150deg,#e6cd97,var(--gold));border-color:var(--gold2,#a8843d);color:#1f1a0e;
    box-shadow:0 5px 0 rgba(120,86,20,.5),var(--shadow),inset 0 0 0 2.5px rgba(255,255,255,.38),inset 0 0 0 4.5px rgba(168,132,61,.4)}

  /* iconos SVG de estado del nodo */
  .wbtn .wglyph{width:30px;height:30px;display:block}
  .wbtn.is-current .wglyph{width:36px;height:36px}
  .wbtn.completed .wglyph{width:31px;height:31px}
  .wbtn.is-current{width:88px;height:88px;font-size:2rem;border-color:var(--gold);

  /* el marcador de "lección conquistada" y el remate del capstone los define cada mundo en su sección [data-world] */
  @media(prefers-reduced-motion:reduce){.wbtn.is-current::after,.wbtn.completed::after,.wbtn.castle.completed svg path:last-child{animation:none}}
  .wbtn.castle{width:90px;height:78px;border-radius:18px;border-width:4px;font-size:1.8rem;

  .wlabel{position:absolute;top:-29px;left:50%;transform:translateX(-50%);white-space:nowrap;z-index:2;
    background:var(--ink);color:var(--gold);font-size:.64rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;

  .wtitle{margin-top:9px;font-size:.8rem;font-weight:600;color:var(--ink);text-align:center;max-width:135px;line-height:1.25}
  .wnode.locked .wtitle{color:var(--muted);font-weight:500}
  /* checkpoint de destreza */
  .wcheck{position:relative;z-index:1;align-self:stretch;display:flex;align-items:center;gap:9px;margin:2px 4px -8px;padding:8px 14px;
    background:var(--gold-tint);border:1px solid var(--gold);border-left:3px solid var(--gold);border-radius:999px;font-weight:700;font-size:.86rem;color:var(--ink)}
  .wcheck .ic{position:relative;font-size:1.05rem}
  .wcheck .ic::before{content:"\2691";color:var(--gold2,#a8843d);margin-right:4px;font-size:.95rem}
  .wcheck .ct{margin-left:auto;font-size:.76rem;color:var(--gold2,#a8843d);font-weight:700}
  .wcheck .ck-ic{display:inline-flex;align-items:center}
  .wcheck .ck-ic svg{width:18px;height:18px}
  .wisland .wcheck .ck-ic{color:var(--w-accent,#c5a059)}
  /* iconos de destreza (chips de filtro + resultados de búsqueda) */
  .skill-ic{display:inline-flex;align-items:center;vertical-align:-3px}
  .skill-ic svg{width:15px;height:15px}
  .lc-sub .skill-ic svg{width:13px;height:13px}
  /* escudo del jefe en SVG (portada / medidor / resultado) */
  .boss-emblem{color:var(--w-accent,#c5a059);line-height:0}
  .boss-emblem svg{width:54px;height:58px}
  .boss-emblem svg.boss-art{width:118px;height:118px}
  /* retrato del guardián (IA) en portada / resultado y en el nodo del mapa; respaldo = bossArt SVG */
  .boss-emblem img.boss-photo{display:block;margin:2px auto;width:120px;height:120px;border-radius:50%;
    object-fit:cover;border:3px solid var(--w-accent,#c5a059);box-shadow:0 8px 20px rgba(20,18,42,.55)}
  .boss-emblem.lit img.boss-photo{border-color:var(--gold,#c5a059)}
  .wbtn.boss .boss-node-photo{display:block;width:100%;height:100%;object-fit:cover;border-radius:42px 42px 12px 12px}
  .wbtn.boss .boss-art{width:100%;height:100%}
  .boss-emblem.lit{color:var(--gold,#c5a059)}
  .boss-emblem.dim{color:#8e8aa6}
  .bm-ic{display:inline-flex;align-items:center;color:var(--w-accent,#c5a059)}
  .bm-ic svg{width:16px;height:17px}
  /* gallardete de inicio de mundo */
  .wstart{position:relative;z-index:1;align-self:center;margin:2px 0 6px;padding:5px 26px;background:var(--ink,#1B1B2F);color:var(--gold,#c5a059);
    font-family:Georgia,serif;font-variant:small-caps;letter-spacing:.06em;font-size:.78rem;font-weight:700;border:1px solid var(--gold,#c5a059);
    clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 50%,calc(100% - 8px) 100%,8px 100%,0 50%);box-shadow:var(--shadow)}
  /* ===== Banner de mundo (cabecera del mapa) ===== */
  .world-banner{position:relative;height:130px;margin:14px 0 20px;border-radius:16px;overflow:hidden;
    border:1px solid var(--gold,#c5a059);box-shadow:0 6px 22px rgba(27,27,47,.18),inset 0 0 0 1px rgba(197,160,89,.28)}
  .world-banner__img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;z-index:0}
  .world-banner::before{content:"";position:absolute;inset:0;z-index:1;
    background:radial-gradient(125% 150% at 100% 50%,rgba(27,27,47,.62) 0%,rgba(27,27,47,0) 46%),
               linear-gradient(90deg,rgba(27,27,47,.92) 0%,rgba(27,27,47,.78) 34%,rgba(27,27,47,.30) 62%,rgba(27,27,47,.05) 100%),
               linear-gradient(180deg,rgba(27,27,47,.12) 0%,rgba(27,27,47,.42) 100%)}
  .world-banner__body{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;
    gap:6px;padding:0 18px;max-width:60%}
  .world-banner__logo{position:absolute;z-index:2;right:16px;top:50%;transform:translateY(-50%);height:78px;width:auto;
    object-fit:contain;filter:drop-shadow(0 2px 7px rgba(27,27,47,.65))}
  .world-banner__eyebrow{font-size:.62rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold,#c5a059);display:flex;align-items:center;gap:8px}
  .world-banner__eyebrow::after{content:"";flex:0 0 26px;height:1px;background:var(--gold,#c5a059);opacity:.7}
  .world-banner__title{font-family:"Inria Serif",Georgia,serif;font-size:1.5rem;line-height:1.05;font-weight:700;
    color:var(--cream,#f5f2eb);text-shadow:0 1px 8px rgba(27,27,47,.6);margin:0}
  .world-banner__meta{display:flex;align-items:center;gap:10px;font-size:.72rem;font-weight:600;color:rgba(245,242,235,.82)}
  .world-banner__badge{font-weight:800;color:var(--ink,#1B1B2F);background:var(--gold,#c5a059);

/* Foco de teclado visible (WCAG 2.4.7) */
:focus-visible{outline:3px solid var(--gold,#c5a059);outline-offset:2px}


/* =====================================================================
   VESPER ACADEMY — Hub "Ascenso a la Maestria" · capa de mundos
   Pegar al FINAL del <style> de leccion.html (despues de la linea ~362).
   ---------------------------------------------------------------------
   ORO INVARIANTE: #c5a059 / #a8843d / --gold-tint = logro/recompensa.
   --w-accent / --w-accent-soft / --w-glow = ATMOSFERA del mundo
   (heredados inline desde WORLD_THEME via style en .world-banner y .wmap).
   Solo se animan transform/opacity/filter/background-position en bucles.
   Keyframes: globales "g-*", por mundo "amb-<NIVEL>-*". wpulse intacto.
   wflag QUEDA OBSOLETO (los gestos-Mario se reemplazan) — ver pasos.
   ===================================================================== */

/* =========================================================
   0. BASE COMUN DE LA CAPA AMBIENTAL (coordinador, una vez)
   ========================================================= */
.wamb{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.wamb i{position:absolute;display:block;will-change:transform,opacity}
.wamb--map{z-index:0}                 /* en el mapa: debajo de .wnode (z1) */

/* =========================================================
   1. ANIMACIONES GLOBALES (solo selectores BASE, sin [data-world])
   ========================================================= */

/* 1a. Banner: ken-burns + parallax del scrim */
.world-banner__img{transform-origin:50% 50%;will-change:transform;
  animation:g-kenburns 34s ease-in-out infinite alternate}
@keyframes g-kenburns{
  0%{transform:scale(1.06) translate3d(-1.2%,-0.8%,0)}
  50%{transform:scale(1.11) translate3d(1.0%,0.6%,0)}
  100%{transform:scale(1.07) translate3d(-0.6%,1.0%,0)}}
.world-banner::before{will-change:transform;
  animation:g-banner-parallax 38s ease-in-out infinite alternate}
@keyframes g-banner-parallax{
  0%{transform:translate3d(0,0,0)}
  100%{transform:translate3d(-1.1%,0.4%,0)}}

/* 1b. (El sendero punteado animado se sustituyó por el SVG .wtrail medido en JS) */

/* 1c. Nodos en reposo: bob sutil (no el actual / bloqueado / castillo) */
.wbtn:not(.is-current):not(.locked):not(.castle){will-change:transform;
  animation:g-node-bob 4.2s ease-in-out infinite}
.wnode:nth-of-type(4n+1) .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-0.4s}
.wnode:nth-of-type(4n+2) .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-1.3s}
.wnode:nth-of-type(4n+3) .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-2.2s;animation-duration:4.8s}
.wnode:nth-of-type(4n)   .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-3.1s;animation-duration:3.9s}
@keyframes g-node-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.wbtn:active:not(.locked){animation:none}

/* 1d. Cinta de mundos: entrada en cascada + lift en hover + halo "on" */
.worlds .world{animation:g-world-in .5s cubic-bezier(.22,.61,.36,1) both}
.worlds .world:nth-child(1){animation-delay:.02s}
.worlds .world:nth-child(2){animation-delay:.08s}
.worlds .world:nth-child(3){animation-delay:.14s}
.worlds .world:nth-child(4){animation-delay:.20s}
.worlds .world:nth-child(5){animation-delay:.26s}
.worlds .world:nth-child(6){animation-delay:.32s}
.worlds .world:nth-child(n+7){animation-delay:.38s}
@keyframes g-world-in{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.world{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease,background .18s ease}
.world:not(.locked):hover,.world:not(.locked):focus-visible{transform:translateY(-3px);box-shadow:0 9px 22px var(--w-glow,rgba(27,27,47,.16))}
.world.on{animation:g-world-onpulse 3.6s ease-in-out infinite}
@keyframes g-world-onpulse{0%,100%{box-shadow:0 5px 16px rgba(27,27,47,.09)}50%{box-shadow:0 7px 22px var(--w-glow,rgba(197,160,89,.30))}}

/* 1e. Barra de progreso: shimmer dorado (oro invariante, nunca acento) */
.world-banner__bar > i{position:relative;overflow:hidden}
.world-banner__bar > i::after{content:"";position:absolute;top:0;bottom:0;left:0;width:42%;
  background:linear-gradient(100deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.55) 50%,rgba(255,255,255,0) 100%);
  transform:translateX(-160%);will-change:transform;
  animation:g-bar-shimmer 3.4s ease-in-out infinite;pointer-events:none}
@keyframes g-bar-shimmer{0%{transform:translateX(-160%)}60%{transform:translateX(320%)}100%{transform:translateX(320%)}}

/* 1f. Estrellas ganadas: titileo dorado muy leve (recompensa) */
.wnode.done .wstars{will-change:filter,opacity;animation:g-star-twinkle 5s ease-in-out infinite}
.wnode:nth-of-type(3n+1).done .wstars{animation-delay:-1.7s}
.wnode:nth-of-type(3n+2).done .wstars{animation-delay:-3.3s;animation-duration:5.6s}
@keyframes g-star-twinkle{
  0%,100%{filter:drop-shadow(0 0 3px rgba(197,160,89,.45)) brightness(1);opacity:1}
  50%{filter:drop-shadow(0 0 6px rgba(197,160,89,.70)) brightness(1.12);opacity:.94}}

/* =========================================================
   2. MUNDO A1 — EL HOGAR · "brasas de amanecer" (acento #C07A33)
   ========================================================= */
.world-banner[data-world="A1"]::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(78% 120% at 8% -6%,var(--w-accent-soft) 0%,rgba(192,122,51,0) 55%),
             radial-gradient(40% 60% at 16% 4%,var(--w-glow) 0%,rgba(192,122,51,0) 60%);
  mix-blend-mode:screen;opacity:.62;animation:amb-A1-glow 11s ease-in-out infinite}
@keyframes amb-A1-glow{0%,100%{opacity:.5;filter:blur(.5px) saturate(1)}50%{opacity:.82;filter:blur(1.4px) saturate(1.18)}}
.world-banner[data-world="A1"] .wamb i{bottom:6%;width:3px;height:3px;border-radius:50%;
  background:var(--w-glow);filter:blur(.6px);opacity:0;box-shadow:0 0 4px var(--w-glow);
  animation:amb-A1-rise 17s ease-in-out infinite}
.world-banner[data-world="A1"] .wamb i:nth-child(1){left:12%;width:2px;height:2px;animation-duration:15s;animation-delay:2s}
.world-banner[data-world="A1"] .wamb i:nth-child(2){left:26%;width:4px;height:4px;animation-duration:21s;animation-delay:5s}
.world-banner[data-world="A1"] .wamb i:nth-child(3){left:39%;width:2px;height:2px;animation-duration:18s;animation-delay:7s}
.world-banner[data-world="A1"] .wamb i:nth-child(4){left:52%;width:3px;height:3px;animation-duration:22s;animation-delay:11s}
.world-banner[data-world="A1"] .wamb i:nth-child(5){left:64%;width:4px;height:4px;animation-duration:14s;animation-delay:13s}
.world-banner[data-world="A1"] .wamb i:nth-child(6){left:77%;width:2px;height:2px;animation-duration:19s;animation-delay:3s}
.world-banner[data-world="A1"] .wamb i:nth-child(7){left:88%;width:3px;height:3px;animation-duration:16s;animation-delay:19s}
@keyframes amb-A1-rise{
  0%{opacity:0;transform:translate3d(0,0,0) scale(.85)}
  12%{opacity:.15}
  46%{opacity:.5;transform:translate3d(5px,-30px,0) scale(1.05)}
  72%{opacity:.34;transform:translate3d(2px,-48px,0) scale(.92)}
  100%{opacity:0;transform:translate3d(8px,-64px,0) scale(.8)}}
.wmap[data-world="A1"] .wamb--map i{bottom:4%;width:3px;height:3px;border-radius:50%;
  background:var(--w-glow);filter:blur(.6px);opacity:0;animation:amb-A1-rise 20s ease-in-out infinite}
.wmap[data-world="A1"] .wamb--map i:nth-child(1){left:18%;width:2px;height:2px;animation-duration:18s;animation-delay:2s}
.wmap[data-world="A1"] .wamb--map i:nth-child(2){left:44%;width:3px;height:3px;animation-duration:22s;animation-delay:7s}
.wmap[data-world="A1"] .wamb--map i:nth-child(3){left:70%;width:2px;height:2px;animation-duration:16s;animation-delay:13s}
.wmap[data-world="A1"]::before{background-image:
  linear-gradient(180deg,var(--w-accent-soft) 0%,rgba(192,122,51,0) 100%),
  repeating-linear-gradient(180deg,rgba(197,160,89,.5) 0 9px,transparent 9px 20px)}
.wmap[data-world="A1"] .wbtn.completed:not(.castle)::before{content:"";position:absolute;top:-13px;left:50%;
  width:18px;height:9px;margin-left:-9px;background:transparent;border:1.5px solid var(--gold2,#a8843d);
  border-bottom:0;border-radius:9px 9px 0 0;box-shadow:0 1px 0 0 var(--gold,#c5a059);
  filter:drop-shadow(0 1px 1px rgba(27,27,47,.3))}

/* =========================================================
   8. PREFERS-REDUCED-MOTION — UN solo bloque que detiene/atenua TODO
   (globales g-*, todos los amb-<NIVEL>-*, wpulse, capas .wamb).
   Estado en reposo bello y legible; particulas congeladas como textura.
   ========================================================= */
@media (prefers-reduced-motion:reduce){
  /* globales */
  .world-banner__img,.world-banner::before,.wmap::before,.wmap::after,
  .wbtn,.wbtn.is-current::after,.worlds .world,.world.on,
  .world-banner__bar > i::after,.wnode.done .wstars,
  /* capas ambientales (banner + mapa) y sus pseudos pintados */
  .wamb i,.wamb::before,.wamb--map i,.wamb--map::before,
  /* sellos de completado por mundo (settle) */
  .wmap[data-world] .wbtn.completed:not(.castle)::after,
  /* gestos del castillo por mundo */
  .wmap[data-world] .wbtn.castle::before,
  .wmap[data-world] .wbtn.castle.completed svg path:last-child,
  /* scrim que respira (A1) */
  .world-banner[data-world="A1"]::after{
    animation:none !important;
  }
  .world-banner__img{transform:scale(1.06)}
  .world:not(.locked):hover,.world:not(.locked):focus-visible{transform:none}
  /* congelar particulas como textura tenue (no eliminarlas) */
  .wamb i,.wamb--map i{opacity:.3;transform:none}
  /* dejar sellos en su fotograma final, legibles */
  .wmap[data-world] .wbtn.completed:not(.castle)::after{opacity:1;transform:none}
  .wmap[data-world="B2"] .wbtn.completed:not(.castle)::after{transform:translate(-50%,5%) rotate(-45deg);opacity:.6}
  .world-banner[data-world="A1"] .wamb i,.wmap[data-world="A1"] .wamb--map i{opacity:.32}
  .world-banner[data-world="B1"] .wamb i:nth-child(9){opacity:0}
}

/* =====================================================================
   VESPER ACADEMY — "El Sendero Vivo": camino temático + paisaje en capas
   + vida (animación). Oro (#c5a059/#a8843d) = recompensa INVARIANTE; el
   acento del mundo (--w-accent/-soft/--w-glow) lleva la atmósfera. Solo
   se animan transform / opacity / filter / stroke-dashoffset. Todo se
   congela bajo prefers-reduced-motion y .vesper-reduce-motion (al final).
   ===================================================================== */

/* ---- keyframes globales (g-*) ---- */
@keyframes g-sway{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
@keyframes g-flag{0%,100%{transform:skewX(-7deg) rotate(-1.5deg)}50%{transform:skewX(7deg) rotate(1.5deg)}}
@keyframes g-flick{0%,100%{opacity:.6}42%{opacity:1}68%{opacity:.82}}
@keyframes g-twinkle{0%,100%{opacity:.5;transform:scale(.8)}50%{opacity:1;transform:scale(1.14)}}
@keyframes g-beam{0%,100%{transform:rotate(-20deg);opacity:.1}50%{transform:rotate(20deg);opacity:.3}}
@keyframes g-smoke{0%{transform:translateY(0) scale(1);opacity:.55}100%{transform:translateY(-13px) scale(1.7);opacity:0}}
@keyframes g-roadbreathe{0%,100%{opacity:.42}50%{opacity:.66}}   /* centrado en la base .55 del glow */
@keyframes g-roadtwinkle{0%,100%{opacity:.7}50%{opacity:1}}

/* ---- terreno: profundidad + suelo + vida ---- */
.wterrain{overflow:visible}
/* siluetas laterales = masas de terreno continuas (el camino atraviesa un lugar) */
.terr .sil{fill:#23234a;opacity:.55}
.terr .sil2{fill:#20203c;opacity:.6}                 /* capa trasera, más oscura/lejana */
.terr .sil-rim{fill:none;stroke:var(--w-accent,#5E8A4E);stroke-width:1.1;opacity:.5}
/* repisa de suelo bajo cada grupo de props (para que no "floten") */
.terr .ground{fill:var(--w-accent-soft,rgba(197,160,89,.12));opacity:.85}
/* perspectiva atmosférica: lejos = más claro/desaturado; cerca = más oscuro/saturado */
.terr .far{opacity:.55;filter:saturate(.7)}
.terr .near{filter:brightness(.92) saturate(1.12)}
/* pivotes por elemento (SVG necesita transform-box:fill-box) */
.terr .sway,.terr .lf,.terr .lf2,.terr .flag,.terr .ring,.terr .spark,.terr .gem,.terr .glow,.terr .win,.terr .beam,.terr .smoke{transform-box:fill-box}
/* vida idle de props (global; el camino se afina por mundo más abajo) */
.terr .sway{transform-origin:50% 100%;animation:g-sway 4.8s ease-in-out infinite}
.terr .flag{transform-origin:0% 100%;animation:g-flag 3.4s ease-in-out infinite}
.terr .glow,.terr .win{transform-origin:50% 50%;animation:g-flick 5s ease-in-out infinite}
.terr .spark,.terr .gem{transform-origin:50% 50%;animation:g-twinkle 5.5s ease-in-out infinite}
.terr .ring{fill:none;stroke:var(--w-accent,#6A5FA8);stroke-width:1.4;opacity:.8}          /* anillo estático (girar una elipse se ve mal) */
.terr .beamray{fill:var(--w-glow,rgba(61,134,176,.5))}
.terr .beam{transform-origin:0% 50%;opacity:.2;animation:g-beam 7s ease-in-out infinite}    /* faro: pivota en la lámpara */
.terr .smoke{transform-origin:50% 100%;animation:g-smoke 4.6s ease-out infinite}
/* desfase determinista por posición para que no titilen al unísono */
.terr .prop:nth-of-type(2n) .glow,.terr .prop:nth-of-type(2n) .win{animation-delay:-2.3s}
.terr .prop:nth-of-type(3n) .glow,.terr .prop:nth-of-type(3n) .win{animation-delay:-3.7s}
.terr .prop:nth-of-type(3n) .spark,.terr .prop:nth-of-type(3n) .gem{animation-delay:-3.1s}
.terr .prop:nth-of-type(3n+1) .spark,.terr .prop:nth-of-type(3n+1) .gem{animation-delay:-1.6s}
.terr .prop:nth-of-type(4n) .sway{animation-duration:5.6s}
.terr .prop:nth-of-type(5n) .sway{animation-duration:4.1s}
/* solo animan las piezas de PRIMER PLANO (.near) + el héroe (sin clase de
   profundidad); las capas lejana (.far) y media (.mid) descansan estáticas para
   no tener ~150 animaciones simultáneas en un mapa de 4000px (la quietud del
   fondo además refuerza la profundidad). */
.terr .far .sway,.terr .far .glow,.terr .far .spark,.terr .far .win,.terr .far .gem,.terr .far .flag,
.terr .mid .sway,.terr .mid .glow,.terr .mid .spark,.terr .mid .win,.terr .mid .gem,.terr .mid .flag{animation:none}

/* ---- carácter del camino por mundo ----
   La textura/veta son ESTÁTICAS (patrón labrado: adoquín/tabla/peldaño/estrella);
   el único trazo en movimiento es .wtrail-comet (una cuenta de luz fina) para no
   repintar toda la franja del mapa varias veces por fotograma. Los respiros de luz
   usan opacity (compositor). */
/* A1 — adoquín de hogar (cálido) */
.wmap[data-world="A1"] .wtrail-tex{stroke-dasharray:2 7}
.wmap[data-world="A1"] .wtrail-comet{animation-duration:12s}
/* A2 — pasaderas de piedra en el bosque (dosel que respira) */
.wmap[data-world="A2"] .wtrail-tex{stroke-dasharray:3 9}
.wmap[data-world="A2"] .wtrail-glow{animation:g-roadbreathe 6s ease-in-out infinite}
.wmap[data-world="A2"] .wtrail-comet{animation-duration:16s}
/* B1 — paseo marítimo con farolas (vía guiada) */
.wmap[data-world="B1"] .wtrail-tex{stroke-dasharray:2 7}
.wmap[data-world="B1"] .wtrail-line{stroke-dasharray:1 14;stroke-width:4;filter:drop-shadow(0 0 4px var(--gold,#c5a059))}
.wmap[data-world="B1"] .wtrail-comet{animation-duration:10s}
/* B2 — escalinata de ascenso (peldaños fijos; el cometa SUBE) */
.wmap[data-world="B2"] .wtrail-tex{stroke-dasharray:12 5;opacity:.5}
.wmap[data-world="B2"] .wtrail-line{stroke-dasharray:3 10}
.wmap[data-world="B2"] .wtrail-comet{animation-duration:13s;animation-direction:reverse}
/* C1 — vía constelar (sin pavimento; la ruta ES luz) */
.wmap[data-world="C1"] .wtrail-base{opacity:.1}
.wmap[data-world="C1"] .wtrail-road{opacity:.16}
.wmap[data-world="C1"] .wtrail-tex{opacity:0}
.wmap[data-world="C1"] .wtrail-glow{stroke-width:13;opacity:.42;filter:blur(1px)}
.wmap[data-world="C1"] .wtrail-line{stroke-dasharray:1 9;stroke-width:2.4;filter:drop-shadow(0 0 5px var(--gold,#c5a059));animation:g-roadtwinkle 6s ease-in-out infinite}
.wmap[data-world="C1"] .wtrail-comet{animation-duration:18s}
/* C2 — calzada de aurora hacia el castillo */
.wmap[data-world="C2"] .wtrail-road{opacity:.26;filter:blur(1px)}
.wmap[data-world="C2"] .wtrail-tex{opacity:0}
.wmap[data-world="C2"] .wtrail-glow{stroke-width:12;animation:g-roadbreathe 8s ease-in-out infinite}
.wmap[data-world="C2"] .wtrail-line{stroke-dasharray:3 11}
.wmap[data-world="C2"] .wtrail-comet{animation-duration:15s}

/* ---- profundidad al hacer scroll (parallax): las masas laterales (fondo)
   se rezagan respecto a nodos/camino. JS (applyParallax) traslada .wsil ~0.12x
   del scroll; se anula bajo reduced-motion. ---- */
.wsil{will-change:transform}

/* ---- atmósfera por mundo (.watmo): una capa de clima/niebla/nebulosa/aurora
   detrás del camino y los nodos. Tokens de acento/glow; solo transform/opacity. ---- */
.watmo{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.watmo::before,.watmo::after{content:"";position:absolute;pointer-events:none;will-change:transform,opacity}
/* A1 — bruma cálida de hogar que sube del suelo */
.wisland[data-world="A1"] .watmo::before{inset:auto 0 0 0;height:55%;
  background:radial-gradient(120% 90% at 50% 120%,var(--w-glow) 0%,transparent 60%);opacity:.22;animation:g-atmo-breathe 9s ease-in-out infinite}
/* A2 — niebla de bosque a la deriva en el tercio inferior */
.wisland[data-world="A2"] .watmo::before{inset:auto -20% 5% -20%;height:42%;
  background:linear-gradient(0deg,var(--w-accent-soft) 0%,transparent 82%);opacity:.55;filter:blur(2px);animation:g-atmo-drift 26s ease-in-out infinite alternate}
/* B1 — calina costera que barre en horizontal */
.wisland[data-world="B1"] .watmo::before{inset:28% -28% auto -28%;height:34%;
  background:linear-gradient(90deg,transparent,var(--w-accent-soft) 44%,rgba(255,255,255,.06) 50%,var(--w-accent-soft) 56%,transparent);opacity:.5;filter:blur(3px);animation:g-atmo-sweep 30s linear infinite}
/* B2 — polvo dorado que asciende */
.wisland[data-world="B2"] .watmo::before{inset:auto 0 0 0;height:62%;
  background:linear-gradient(0deg,var(--w-accent-soft) 0%,transparent 72%);opacity:.4;animation:g-atmo-breathe 11s ease-in-out infinite}
/* C1 — nubes de nebulosa a la deriva */
.wisland[data-world="C1"] .watmo::before{inset:-12% -15% auto -15%;height:72%;
  background:radial-gradient(closest-side at 30% 40%,var(--w-accent-soft) 0%,transparent 70%),radial-gradient(closest-side at 75% 60%,var(--w-glow) 0%,transparent 65%);opacity:.5;filter:blur(8px);animation:g-atmo-float 34s ease-in-out infinite alternate}
/* C2 — cortinas de aurora que ondean */
.wisland[data-world="C2"] .watmo::before{inset:-12% 0 auto 0;height:82%;transform-origin:50% 0;
  background:linear-gradient(95deg,transparent 0%,var(--w-glow) 35%,var(--w-accent-soft) 55%,transparent 100%);opacity:.28;filter:blur(10px);animation:g-atmo-aurora 16s ease-in-out infinite}
.wisland[data-world="C2"] .watmo::after{inset:-8% 0 auto 0;height:62%;transform-origin:50% 0;
  background:linear-gradient(85deg,transparent 12%,var(--w-accent-soft) 50%,transparent 88%);opacity:.2;filter:blur(14px);animation:g-atmo-aurora 22s ease-in-out -6s infinite}
@keyframes g-atmo-breathe{0%,100%{opacity:.15;transform:translateY(7px)}50%{opacity:.3;transform:translateY(-5px)}}
@keyframes g-atmo-drift{0%{transform:translateX(-6%)}100%{transform:translateX(6%)}}
@keyframes g-atmo-sweep{0%{transform:translateX(-32%)}100%{transform:translateX(32%)}}
@keyframes g-atmo-float{0%{transform:translate(-3%,0)}100%{transform:translate(4%,2%)}}
@keyframes g-atmo-aurora{0%,100%{transform:skewX(-7deg) translateX(-4%);opacity:.16}50%{transform:skewX(7deg) translateX(4%);opacity:.32}}

/* ---- reduced-motion: congela TODO lo nuevo en un cuadro bello y legible ---- */
@media(prefers-reduced-motion:reduce){
  /* !important: vence a los ajustes por mundo .wmap[data-world] .wtrail-* (0,3,0) */
  .wtrail-comet,.wtrail-tex,.wtrail-line,.wtrail-glow,.wtrail-road{animation:none!important}
  .wtrail-comet{stroke-dashoffset:calc(var(--total,0px) * (var(--rest,0) / -100))}
  .terr .sway,.terr .flag,.terr .glow,.terr .win,.terr .spark,.terr .gem,.terr .ring,.terr .beam,.terr .smoke{animation:none}
  .terr .glow,.terr .win,.terr .spark,.terr .gem{opacity:1;transform:none}
  .terr .smoke{opacity:.28}.terr .beam{opacity:.2;transform:rotate(0deg)}
  .watmo::before,.watmo::after{animation:none!important}
  .wsil{transform:none!important}
}
.vesper-reduce-motion .wtrail-comet,.vesper-reduce-motion .wtrail-tex,.vesper-reduce-motion .wtrail-line,.vesper-reduce-motion .wtrail-glow,.vesper-reduce-motion .wtrail-road{animation:none!important}
.vesper-reduce-motion .wtrail-comet{stroke-dashoffset:calc(var(--total,0px) * (var(--rest,0) / -100))}
.vesper-reduce-motion .terr .sway,.vesper-reduce-motion .terr .flag,.vesper-reduce-motion .terr .glow,.vesper-reduce-motion .terr .win,.vesper-reduce-motion .terr .spark,.vesper-reduce-motion .terr .gem,.vesper-reduce-motion .terr .ring,.vesper-reduce-motion .terr .beam,.vesper-reduce-motion .terr .smoke{animation:none}
.vesper-reduce-motion .terr .glow,.vesper-reduce-motion .terr .win,.vesper-reduce-motion .terr .spark,.vesper-reduce-motion .terr .gem{opacity:1;transform:none}
.vesper-reduce-motion .terr .smoke{opacity:.28}.vesper-reduce-motion .terr .beam{opacity:.2;transform:rotate(0deg)}
.vesper-reduce-motion .watmo::before,.vesper-reduce-motion .watmo::after{animation:none!important}
.vesper-reduce-motion .wsil{transform:none!important}

/* =====================================================================
   "Vesper te escribe": burbuja de chat flotante (FAB + globo emergente).
   Llama la atención hacia el chat con un mensaje y un punto de no leído.
   Se congela bajo prefers-reduced-motion / .vesper-reduce-motion.
   ===================================================================== */
.vchat-nudge{position:fixed;right:14px;bottom:16px;z-index:9998;display:flex;flex-direction:column;
  align-items:flex-end;gap:11px;pointer-events:none}
.vchat-nudge > *{pointer-events:auto}
/* deja sitio para que el botón flotante no tape el final del contenido */
body.has-chat-nudge .wrap{padding-bottom:96px}
.vchat-fab{position:relative;width:62px;height:62px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;
  background:var(--paper);border:2px solid var(--gold);box-shadow:0 8px 22px rgba(27,27,47,.22);
  text-decoration:none;cursor:pointer;-webkit-tap-highlight-color:transparent;
  opacity:0;transform:scale(.55) translateY(10px);transition:opacity .3s ease,transform .38s cubic-bezier(.18,.89,.32,1.4)}
.vchat-fab img{width:54px;height:54px;border-radius:50%;object-fit:cover;display:block;background:var(--gold-tint)}
.vchat-fab .vchat-dot{position:absolute;top:-3px;right:-3px;min-width:20px;height:20px;border-radius:999px;
  background:var(--error);color:#fff;border:2px solid var(--paper);font-size:.7rem;font-weight:800;
  display:grid;place-items:center;padding:0 4px;box-shadow:0 0 0 0 rgba(192,57,43,.5)}
.vchat-fab .vchat-dot[hidden]{display:none}
.vchat-pop{position:relative;max-width:236px;background:var(--paper);border:1px solid var(--line);
  border-radius:16px 16px 5px 16px;box-shadow:0 12px 32px rgba(27,27,47,.22);padding:12px 13px 12px;
  transform-origin:bottom right;opacity:0;transform:scale(.7) translateY(12px);
  transition:opacity .25s ease,transform .28s cubic-bezier(.18,.89,.32,1.32)}
.vchat-pop[hidden]{display:none}
.vchat-pop::after{content:"";position:absolute;right:19px;bottom:-7px;width:13px;height:13px;background:var(--paper);
  border-right:1px solid var(--line);border-bottom:1px solid var(--line);transform:rotate(45deg)}
.vchat-name{font-size:.68rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--gold2);
  display:flex;align-items:center;gap:6px;margin:0 0 5px}
.vchat-name i{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;flex:0 0 auto}
.vchat-msg{margin:0;font-size:.92rem;line-height:1.42;color:var(--ink)}
.vchat-cta{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:var(--ink);color:var(--cream);
  text-decoration:none;font-size:.84rem;font-weight:700;border-radius:11px;padding:9px 14px}
.vchat-cta:active{transform:translateY(1px)}
.vchat-x{position:absolute;top:5px;right:5px;width:25px;height:25px;border:none;background:none;cursor:pointer;
  color:var(--muted);font-size:1.15rem;line-height:1;border-radius:50%;display:grid;place-items:center}
.vchat-x:hover{background:var(--cream)}
.vchat-typing{display:flex;gap:5px;padding:6px 2px 4px}
.vchat-typing i{width:8px;height:8px;border-radius:50%;background:var(--muted);opacity:.45;
  animation:vchat-type 1s ease-in-out infinite}
.vchat-typing i:nth-child(2){animation-delay:.16s}
.vchat-typing i:nth-child(3){animation-delay:.32s}
@keyframes vchat-type{0%,60%,100%{opacity:.35;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.vchat-nudge.show-fab .vchat-fab{opacity:1;transform:none}
.vchat-nudge.show-pop .vchat-pop{opacity:1;transform:none}
.vchat-nudge.wiggle.show-fab .vchat-fab{animation:vchat-wiggle 3.2s ease-in-out 1.1s infinite}
.vchat-nudge.show-fab .vchat-dot:not([hidden]){animation:vchat-pulse 1.9s ease-in-out infinite}
@keyframes vchat-wiggle{0%,86%,100%{transform:rotate(0)}90%{transform:rotate(-8deg)}94%{transform:rotate(8deg)}98%{transform:rotate(-3deg)}}
@keyframes vchat-pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}70%{box-shadow:0 0 0 8px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
@media(prefers-reduced-motion:reduce){
  .vchat-fab,.vchat-pop{transition:none}
  .vchat-nudge.wiggle.show-fab .vchat-fab{animation:none}
  .vchat-fab .vchat-dot,.vchat-typing i{animation:none!important}
}
.vesper-reduce-motion .vchat-fab,.vesper-reduce-motion .vchat-pop{transition:none}
.vesper-reduce-motion .vchat-nudge.wiggle.show-fab .vchat-fab{animation:none}
.vesper-reduce-motion .vchat-fab .vchat-dot,.vesper-reduce-motion .vchat-typing i{animation:none!important}

/* =====================================================================
   Hub premium: hero (cabecera) + sección de niveles + vitrina de logros.
   El hero es un panel SIEMPRE oscuro (como el banner del mundo) → usa
   --navy/--navy2 (oscuros en todos los temas) con texto claro fijo;
   los elementos sobre ORO llevan texto oscuro fijo (oro es claro en
   todos los temas). Resto usa tokens que el motor de temas adapta.
   ===================================================================== */
.hub-hero{position:relative;overflow:hidden;border-radius:20px;margin:2px 0 12px;padding:15px 15px 14px;
  background:linear-gradient(140deg,var(--navy,#1B1B2F),var(--navy2,#2c2c4a));color:#f5f2eb;
  box-shadow:0 12px 30px rgba(20,18,42,.26)}
.hub-hero::before{content:"";position:absolute;right:-46px;top:-58px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(197,160,89,.30),transparent 70%);pointer-events:none}
.hub-hero__top{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.hub-hero__greet{display:flex;align-items:center;gap:11px;min-width:0}
.hub-hero__greet .vesper-mascot{flex:0 0 auto;gap:0}
.hub-hero__greet .vc-img{width:52px;height:52px;border-color:var(--gold)}
.hub-hero__id{min-width:0}
.hub-hello{font-family:"Inria Serif",Georgia,serif;font-size:1.42rem;line-height:1.05;margin:0;color:#f5f2eb}
.hub-sub{margin:4px 0 0;font-size:.82rem;color:rgba(245,242,235,.72)}
.hub-rank{display:inline-block;margin-top:6px;font-size:.7rem;font-weight:800;letter-spacing:.03em;
  color:#2b2410;background:linear-gradient(135deg,#e9d39a,var(--gold,#c5a059));border-radius:999px;padding:3px 11px}
.hub-actions{display:flex;align-items:center;gap:7px;flex:0 0 auto}
.hub-ic{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;
  background:rgba(245,242,235,.10);border:1px solid rgba(245,242,235,.20);color:#f5f2eb;text-decoration:none;cursor:pointer;font-family:inherit}
.hub-ic svg{width:19px;height:19px}
.hub-ic:hover{background:rgba(197,160,89,.32);border-color:var(--gold)}
.hub-ic:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.hub-stats3{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.hstat{flex:1 1 92px;display:flex;align-items:center;gap:9px;background:rgba(245,242,235,.07);
  border:1px solid rgba(245,242,235,.14);border-radius:13px;padding:9px 11px;min-width:0}
.hstat__ic{width:30px;height:30px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;
  background:rgba(197,160,89,.20);color:var(--gold,#c5a059)}
.hstat__ic svg{width:17px;height:17px}
.hstat--link{text-decoration:none;cursor:pointer;transition:background .15s ease}
.hstat--link:hover{background:rgba(245,242,235,.12)}
.hstat__ic--badge{background:rgba(245,242,235,.12)}
.hstat__ic--badge svg{width:24px;height:24px}
.hstat__tx{display:flex;flex-direction:column;min-width:0}
.hstat__v{font-size:1.02rem;font-weight:800;line-height:1.05;color:#f5f2eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hstat__l{font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:rgba(245,242,235,.62);font-weight:700;margin-top:2px;white-space:nowrap}
.hstat__ring{width:30px;height:30px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--gold,#c5a059) calc(var(--gp,0)*1%),rgba(245,242,235,.16) 0)}
.hstat__ring i{width:22px;height:22px;border-radius:50%;background:#26243f;display:grid;place-items:center;
  font-style:normal;font-size:.64rem;font-weight:800;color:var(--gold,#c5a059)}
.hstat.met .hstat__ic{background:rgba(45,158,117,.28);color:#86e3c1}
.hstat.met .hstat__ring{background:conic-gradient(#2D9E75 calc(var(--gp,0)*1%),rgba(245,242,235,.16) 0)}
.hstat.met .hstat__ring i{color:#86e3c1}
/* vida en los iconos de estadística: flameo, destello, gleam y respiración del anillo */
.ic-flame{transform-origin:50% 85%;animation:ic-flame 1.5s ease-in-out infinite}
.ic-flame__core{animation:ic-core 1.5s ease-in-out infinite}
.ic-star{transform-origin:50% 50%;animation:ic-star 3.2s ease-in-out infinite}
.ic-star__tw{animation:ic-twinkle 1.8s ease-in-out infinite}
.ic-shield{transform-origin:50% 55%;animation:ic-shield 2.6s ease-in-out infinite}
.ic-shield__gl{animation:ic-gleam 3.4s ease-in-out infinite}
.hstat__ring{animation:ic-ring 3.6s ease-in-out infinite}
.hstat.met .hstat__ring{animation:ic-ring-met 1.8s ease-in-out infinite}
@keyframes ic-flame{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.06,1.13) rotate(-2.5deg)}55%{transform:scale(.96,1.02) rotate(1.5deg)}80%{transform:scale(1.05,1.09) rotate(2.5deg)}}
@keyframes ic-core{0%,100%{opacity:.35}40%{opacity:.85}70%{opacity:.5}}
@keyframes ic-star{0%,100%{transform:rotate(0) scale(1)}50%{transform:rotate(8deg) scale(1.12)}}
@keyframes ic-twinkle{0%,100%{opacity:.15}45%{opacity:1}}
@keyframes ic-shield{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes ic-gleam{0%,62%,100%{opacity:0}78%{opacity:.9}}
@keyframes ic-ring{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
@keyframes ic-ring-met{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(45,158,117,.5)}50%{transform:scale(1.05);box-shadow:0 0 0 5px rgba(45,158,117,0)}}
@media(prefers-reduced-motion:reduce){
  .ic-flame,.ic-flame__core,.ic-star,.ic-star__tw,.ic-shield,.ic-shield__gl,.hstat__ring,.hstat.met .hstat__ring{animation:none!important}

}
.vesper-reduce-motion .ic-flame,.vesper-reduce-motion .ic-flame__core,.vesper-reduce-motion .ic-star,.vesper-reduce-motion .ic-star__tw,.vesper-reduce-motion .ic-shield,.vesper-reduce-motion .ic-shield__gl,.vesper-reduce-motion .hstat__ring,.vesper-reduce-motion .hstat.met .hstat__ring{animation:none!important}
