<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lecciones gratis · Vesper Academy</title>
<meta name="description" content="Aprende ingles gratis, sin cuenta. Lecciones cortas con ejercicios, racha diaria y XP.">
<link rel="icon" href="assets/images/favicon_32.png" sizes="32x32">
<link rel="manifest" href="manifest_lecciones.webmanifest">
<meta name="theme-color" content="#1B1B2F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vesper Lecciones">
<link rel="apple-touch-icon" href="assets/images/apple_touch_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/vesper_tokens.css">
<script src="vesper_prefs.js"></script>
<style>
  :root{
    --ink:#1B1B2F; --gold:#c5a059; --gold2:#a8843d; --success:#2D9E75; --error:#C0392B;
    --cream:#f5f2eb; --paper:#ffffff; --muted:#6b6b76; --line:#ece7da;
    --gold-tint:rgba(197,160,89,.14); --ok-tint:rgba(45,158,117,.12); --no-tint:rgba(192,57,43,.10);
    --radius:16px; --shadow:0 6px 22px rgba(27,27,47,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.5;-webkit-text-size-adjust:100%}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  .wrap{max-width:600px;margin:0 auto;padding:14px 16px 40px;min-height:100vh}
  h1{font-family:"Inria Serif",Georgia,serif;font-size:1.7rem;line-height:1.2;margin:.2em 0}
  h2{font-family:"Inria Serif",Georgia,serif;font-size:1.25rem;margin:.1em 0 .5em}
  p{margin:.4em 0}
  .muted{color:var(--muted);font-size:.92rem}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .back{flex:0 0 auto;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;
    text-decoration:none;color:var(--ink);background:var(--paper);border:1px solid var(--line);font-size:1.2rem}
  .progress{flex:1;height:10px;background:#eee6d4;border-radius:999px;overflow:hidden}
  .bar{height:100%;background:var(--gold);border-radius:999px;transition:width .35s ease}
  /* cards */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
  .center{text-align:center}
  .center-row{justify-content:center}
  /* mascot */
  .mascot{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
  .center .mascot{flex-direction:column;align-items:center}
  .mascot-img{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--gold-tint);border:2px solid var(--gold);flex:0 0 auto}
  .bubble{background:var(--gold-tint);border-radius:14px;padding:9px 13px;font-size:.95rem;position:relative}
  /* meta pills */
  .lcard-top{display:flex;align-items:center;gap:8px;margin:6px 0}
  .pill{background:var(--ink);color:var(--cream);font-weight:600;font-size:.78rem;padding:3px 10px;border-radius:999px}
  .track{color:var(--gold);font-weight:600;font-size:.85rem;text-transform:uppercase;letter-spacing:.04em}
  /* body + examples */
  .body{font-size:1.02rem}
  .examples{list-style:none;padding:0;margin:14px 0 4px;display:grid;gap:8px}
  .examples li{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .examples .en{display:block;font-weight:600}
  .examples .es{display:block;color:var(--muted);font-size:.9rem}
  /* buttons */
  .btn{display:block;width:100%;min-height:50px;border:none;border-radius:13px;font-family:inherit;font-size:1.02rem;font-weight:600;
    cursor:pointer;margin-top:14px;background:var(--ink);color:var(--cream);padding:12px 16px}
  .btn:disabled{opacity:.45;cursor:default}
  .btn-gold{background:var(--gold);color:var(--ink)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn:active:not(:disabled){transform:translateY(1px)}
  /* MCQ */
  .exnum{font-size:.82rem;color:var(--muted);font-weight:600;margin:-4px 0 10px}
  .opts{display:grid;gap:10px;margin:6px 0}
  .opt{text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-family:inherit;
    font-size:1rem;color:var(--ink);cursor:pointer;min-height:50px}
  .opt.sel{border-color:var(--gold);background:var(--gold-tint)}
  .opt.correct{border-color:var(--success);background:var(--ok-tint)}
  .opt.wrong{border-color:var(--error);background:var(--no-tint)}
  .opt.locked{cursor:default}
  /* find the error (TOEFL written expression) */
  .fe-sentence{font-size:1.12rem;line-height:2.2;margin:6px 0 14px;color:var(--ink)}
  .fe-seg{display:inline;border:none;background:none;font-family:inherit;font-size:inherit;color:var(--ink);cursor:pointer;
    text-decoration:underline;text-decoration-color:var(--gold2);text-underline-offset:4px;text-decoration-thickness:2px;
    padding:1px 3px;border-radius:7px}
  .fe-seg .fe-lab{font-size:.62em;font-weight:800;color:var(--gold2);margin-right:1px;vertical-align:super}
  .fe-seg.sel{background:var(--gold-tint)}
  .fe-seg.correct{background:var(--ok-tint);text-decoration-color:var(--success)}
  .fe-seg.correct .fe-lab{color:var(--success)}
  .fe-seg.wrong{background:var(--no-tint);text-decoration-color:var(--error)}
  .fe-seg.wrong .fe-lab{color:var(--error)}
  .fe-seg.locked{cursor:default}
  /* word order */
  .hint{background:var(--gold-tint);border-radius:12px;padding:8px 12px;font-size:.9rem;margin:2px 0 12px}
  .answer{min-height:56px;border:1.5px dashed var(--gold);border-radius:13px;padding:9px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--cream)}
  .answer .ph{color:var(--muted);font-size:.92rem;padding:4px 6px}
  .bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:44px}
  .chip{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:9px 15px;font-family:inherit;font-size:1rem;
    color:var(--ink);cursor:pointer;min-height:42px}
  .chip.placed{background:var(--gold-tint);border-color:var(--gold)}
  .chip.correct{background:var(--ok-tint);border-color:var(--success)}
  .chip.wrong{background:var(--no-tint);border-color:var(--error)}
  /* feedback */
  .fbbox{display:flex;gap:12px;align-items:flex-start;border-radius:13px;padding:12px;margin-top:14px}
  .fbbox.ok{background:var(--ok-tint)}
  .fbbox.no{background:var(--no-tint)}
  .fb-cat{width:46px;height:46px;border-radius:50%;object-fit:cover;flex:0 0 auto;border:2px solid var(--paper)}
  .explain{margin-top:6px;font-size:.92rem}
  /* feedback / xp screen */
  .xpbar{height:14px;background:#eee6d4;border-radius:999px;overflow:hidden;margin:14px 0}
  .xpfill{height:100%;background:var(--success);border-radius:999px;transition:width .6s ease}
  /* streak */
  .flame{font-size:2.6rem;line-height:1}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:16px 0}
  .day{background:var(--cream);border:1px solid var(--line);border-radius:11px;padding:8px 0;text-align:center;font-size:.8rem;color:var(--muted)}
  .day i{display:block;font-style:normal;font-size:1.05rem;margin-top:3px}
  .day.on{background:var(--gold-tint);border-color:var(--gold);color:var(--ink);font-weight:600}
  .day.today{outline:2px solid var(--gold)}
  .shields{font-size:1.4rem;margin:4px 0}
  .milestone{background:var(--gold-tint);border-radius:12px;padding:10px;font-weight:600;margin:10px 0}
  .stat-row{display:flex;gap:10px;justify-content:center;margin:12px 0}
  .stat{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:8px 14px;font-size:.95rem}
  /* index */
  .hero{display:flex;justify-content:center;margin-top:6px}
  .grid{display:grid;gap:12px;margin-top:8px}
  .lcard{text-align:left;display:block;width:100%}
  .lcard h2{margin:.2em 0}
  /* soft account nudge */
  .nudge{position:relative;background:var(--cream);border:1px dashed var(--gold);border-radius:12px;padding:11px 34px 11px 12px;font-size:.88rem;margin:14px 0;text-align:left}
  .nudge a{color:var(--ink);font-weight:600}
  .nudge .x{position:absolute;top:6px;right:8px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
  /* ===== Hub progresivo (estilo Test-English) ===== */
  .hub-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 6px}
  .hub-hello{font-family:"Inria Serif",Georgia,serif;font-size:1.5rem;line-height:1.1;margin:0}
  .hub-stats{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 4px}
  .hub-stat{background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:.85rem;font-weight:600}
  /* continue card */
  .cont-card{display:flex;align-items:center;gap:14px;text-align:left;width:100%;background:linear-gradient(135deg,var(--ink),#2c2c4a);color:var(--cream);border:none;border-radius:18px;padding:16px 18px;cursor:pointer;margin:10px 0 6px;box-shadow:var(--shadow)}
  .cont-ico{flex:0 0 auto;width:48px;height:48px;border-radius:50%;background:var(--gold);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
  .cont-card .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;opacity:.8}
  .cont-card .ttl{font-weight:700;font-size:1.05rem;margin:2px 0}
  .cont-card .meta{font-size:.8rem;opacity:.85}
  /* level tabs */
  .lvl-tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 2px 4px;margin:6px -2px 2px;-webkit-overflow-scrolling:touch}
  .lvl-tab{flex:0 0 auto;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);background:var(--paper);border-radius:13px;padding:8px 12px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lvl-tab.on{border-color:var(--gold);background:var(--gold-tint)}
  .lvl-tab .nm{font-weight:700;font-size:.95rem}
  .lvl-tab .pc{font-size:.72rem;color:var(--muted)}
  .ring{width:30px;height:30px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--ink)}
  .ring i{width:22px;height:22px;border-radius:50%;background:var(--paper);display:flex;align-items:center;justify-content:center;font-style:normal}
  /* level header */
  .lvl-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0 2px}
  .lvl-head h2{margin:0;font-size:1.2rem}
  .lvl-head .lvl-badge{font-size:.72rem;font-weight:700;color:#fff;border-radius:999px;padding:3px 10px}
  .lvl-prog{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 2px}
  .lvl-prog i{display:block;height:100%;border-radius:999px;transition:width .5s ease}
  /* skill section */
  .skill-sec{margin:14px 0 2px}
  .skill-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;margin:8px 0 8px;color:var(--ink)}
  .skill-h .ic{font-size:1.1rem}
  .skill-h .ct{margin-left:auto;font-size:.78rem;color:var(--muted);font-weight:600}
  /* lesson cards */
  .lgrid{display:grid;gap:10px}
  .lcard2{display:flex;align-items:center;gap:12px;text-align:left;width:100%;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lcard2:active:not(.locked){transform:translateY(1px)}
  .lcard2.completed{border-color:var(--success)}
  .lcard2.locked{opacity:.6;cursor:not-allowed;background:var(--cream)}
  .lc-badge{flex:0 0 auto;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;background:var(--gold-tint);color:var(--ink)}
  .lcard2.completed .lc-badge{background:var(--ok-tint)}
  .lcard2.locked .lc-badge{background:#e9e6dd}
  .lc-body{flex:1;min-width:0}
  .lc-ttl{font-weight:600;font-size:1rem;line-height:1.25}
  .lc-sub{font-size:.8rem;color:var(--muted);margin-top:2px}
  .lc-stars{color:var(--gold);font-size:.95rem;letter-spacing:1px}
  .lc-stars .off{color:var(--line)}
  .lc-go{flex:0 0 auto;color:var(--muted);font-size:1.1rem}
  .hub-toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--cream);padding:10px 16px;border-radius:999px;font-size:.85rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:9997}
  .hub-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* adaptive badge + warm-up */
  .adapt-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);color:var(--ink);border:1px solid var(--gold);border-radius:999px;padding:5px 12px;font-size:.78rem;font-weight:600;margin:8px 0 2px}
  .warm-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--line);margin:0 3px}
  .warm-dot.on{background:var(--gold)}
  /* true / false */
  .statement{font-size:1.08rem;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:6px 0 4px}
  .tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 4px}
  .tf-btn{min-height:54px;border:1.5px solid var(--line);border-radius:13px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer}
  .tf-btn.sel{border-color:var(--gold);background:var(--gold-tint)}
  .tf-btn.correct{border-color:var(--success);background:var(--ok-tint)}
  .tf-btn.wrong{border-color:var(--error);background:var(--no-tint)}
  .tf-btn.locked{cursor:default}
  /* fill blank + translate input */
  .type-input{width:100%;min-height:50px;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;font-family:inherit;font-size:1.05rem;color:var(--ink);background:var(--paper);-webkit-appearance:none}
  .type-input:focus{outline:none;border-color:var(--gold)}
  .type-input:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .type-input.correct{border-color:var(--success);background:var(--ok-tint)}
  .type-input.wrong{border-color:var(--error);background:var(--no-tint)}
  .fb-sentence{font-size:1.12rem;margin:8px 0 10px;line-height:2}
  .fb-sentence input{display:inline-block;width:auto;min-width:108px;min-height:0;padding:6px 10px;vertical-align:baseline}
  /* matching */
  .match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 4px}
  .match-item{display:block;width:100%;text-align:center;border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;margin-bottom:8px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:.98rem;cursor:pointer;min-height:48px}
  .match-item.sel{border-color:var(--gold);background:var(--gold-tint)}
  .match-item.done{border-color:var(--success);background:var(--ok-tint);cursor:default;opacity:.7}
  .match-item.bad{border-color:var(--error);background:var(--no-tint);animation:vc-shake .4s ease}
  /* listening */
  .listen-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:4px 0 8px}
  .listen-play{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--cream);border:none;border-radius:14px;padding:14px 20px;font-family:inherit;font-size:1.05rem;font-weight:600;cursor:pointer}
  .listen-play .ic{font-size:1.25rem}
  .listen-slow{display:inline-flex;align-items:center;gap:8px;background:var(--paper);color:var(--ink);border:1.5px solid var(--line);border-radius:14px;padding:13px 16px;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer}
  .listen-slow:active{transform:translateY(1px)}
  .listen-note{color:var(--muted);font-size:.85rem;margin:0 0 12px}
  /* reading passage */
  .passage{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:6px 0 14px;max-height:340px;overflow:auto;-webkit-overflow-scrolling:touch}
  .passage h3{font-family:"Inria Serif",Georgia,serif;font-size:1.15rem;margin:0 0 8px}
  .passage p{font-size:1.04rem;line-height:1.7;margin:0 0 10px}
  .passage p:last-child{margin-bottom:0}
  .read-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);color:var(--ink);border:1px solid var(--gold);border-radius:999px;padding:4px 11px;font-size:.76rem;font-weight:600;margin:0 0 8px}
  .rq{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .rq:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .rq .rq-q{font-weight:600;font-size:1rem;margin:0 0 8px}
  .rq-num{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:4px}
  /* categorize */
  .cat-pool{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px;min-height:40px}
  .cat-tk{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:8px 14px;font-family:inherit;font-size:.96rem;color:var(--ink);cursor:pointer}
  .cat-tk.sel{border-color:var(--gold);background:var(--gold-tint)}
  .cat-tk.correct{border-color:var(--success);background:var(--ok-tint)}
  .cat-tk.wrong{border-color:var(--error);background:var(--no-tint)}
  .cat-buckets{display:grid;gap:10px}
  .cat-bucket{border:1.5px dashed var(--line);border-radius:13px;padding:10px 12px;min-height:60px;background:var(--cream)}
  .cat-bucket.active{border-color:var(--gold)}
  .cat-bucket h4{margin:0 0 4px;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .cat-bucket .cat-tk{margin:4px 4px 0 0;display:inline-block}
  /* gamificación: meta diaria, logros, repaso */
  .hub-stat.met{background:var(--ok-tint);border-color:var(--success);color:var(--ink)}
  .lcard2.review{background:linear-gradient(135deg,var(--gold-tint),var(--paper));border-color:var(--gold);border-style:dashed}
  .lcard2.review .lc-badge{background:var(--gold);color:var(--ink)}
  .trophy-shelf{margin:8px 0 2px;border:1px solid var(--line);border-radius:14px;background:var(--paper);padding:4px 12px}
  .trophy-shelf summary{cursor:pointer;font-weight:700;font-size:.9rem;list-style:none;display:flex;align-items:center;gap:8px;padding:8px 0}
  .trophy-shelf summary::-webkit-details-marker{display:none}
  .trophy-shelf .t-count{margin-left:auto;font-size:.78rem;color:var(--muted)}
  .trophy-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 10px}
  .trophy{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:.82rem;background:var(--cream);opacity:.55}
  .trophy.on{opacity:1;border-color:var(--gold);background:var(--gold-tint)}
  .trophy .t-ic{font-size:1rem}
  .trophy .t-nm{font-weight:600}
  .goal-card{background:var(--cream);border:1px solid var(--line);border-radius:13px;padding:12px;margin:12px 0;font-weight:600}
  .goal-card.met{background:var(--ok-tint);border-color:var(--success)}
  .goal-bar{height:9px;background:#eee6d4;border-radius:999px;overflow:hidden;margin:8px 0 4px}
  .goal-bar i{display:block;height:100%;background:var(--gold);border-radius:999px;transition:width .5s ease}
  .goal-card.met .goal-bar i{background:var(--success)}
  .goal-done{display:block;color:var(--success);font-size:.86rem}
  .ach-pop{display:grid;gap:8px;margin:12px 0}
  .ach-badge{display:flex;align-items:center;gap:11px;text-align:left;background:var(--gold-tint);border:1px solid var(--gold);border-radius:13px;padding:10px 13px}
  .ach-badge .ab-ic{font-size:1.7rem;line-height:1}
  .ach-badge .ab-tx{display:flex;flex-direction:column}
  .ach-badge .ab-tx b{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gold)}
  .ach-badge .ab-tx span{font-weight:700}
  /* buscador + filtros del hub */
  .hub-search{margin:12px 0 2px}
  .srch{position:relative}
  .srch-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;opacity:.7}
  .srch input{width:100%;min-height:46px;border:1.5px solid var(--line);border-radius:13px;padding:11px 14px 11px 40px;
    font-family:inherit;font-size:1rem;color:var(--ink);background:var(--paper);-webkit-appearance:none}

  /* ===== Mapa de mundos (HUB estilo videojuego) ===== */
  .hub-strip{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 2px}

  /* ruta serpenteante */
  /* ===== Escena 2D del mundo: cielo estrellado navy + isla de terreno ===== */
  .wsky{position:relative;margin:14px 0 16px;border-radius:20px;overflow:hidden;
    background:radial-gradient(120% 90% at 50% -10%,#20203c 0%,var(--ink,#1B1B2F) 55%,#14122a 100%);
    box-shadow:inset 0 0 0 1px rgba(197,160,89,.18),0 14px 34px rgba(20,18,42,.30)}
  .wsky::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.55;
    background-repeat:no-repeat;background-image:
      radial-gradient(1.5px 1.5px at 12% 16%,rgba(243,226,171,.9),transparent 60%),
      radial-gradient(1.2px 1.2px at 78% 8%,rgba(255,255,255,.7),transparent 60%),
      radial-gradient(1.6px 1.6px at 33% 60%,rgba(243,226,171,.7),transparent 60%),
      radial-gradient(1.2px 1.2px at 88% 46%,rgba(255,255,255,.6),transparent 60%),
      radial-gradient(1.3px 1.3px at 58% 82%,rgba(243,226,171,.65),transparent 60%),
      radial-gradient(1.1px 1.1px at 22% 90%,rgba(255,255,255,.5),transparent 60%),
      radial-gradient(1.4px 1.4px at 68% 70%,rgba(243,226,171,.6),transparent 60%)}
  .wisland{position:relative;z-index:1;margin:10px;border-radius:18px;padding:8px 0 16px;
    border:1px solid var(--w-accent,#c5a059);

    background:linear-gradient(180deg,rgba(27,27,47,.28),rgba(27,27,47,.64))}
  .wisland::before{content:"";position:absolute;inset:0;z-index:-1;border-radius:18px;pointer-events:none;
    background-image:var(--w-terrain);background-size:cover;background-position:center;opacity:.20;
    filter:saturate(.85) brightness(.8);
    -webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.95),rgba(0,0,0,.35) 70%,transparent);
            mask-image:linear-gradient(180deg,rgba(0,0,0,.95),rgba(0,0,0,.35) 70%,transparent)}
  .wisland::after{content:"";position:absolute;inset:0;z-index:-1;border-radius:18px;pointer-events:none;opacity:.5;
    background:radial-gradient(80% 50% at 50% 0%,var(--w-glow,rgba(197,160,89,.25)) 0%,transparent 60%)}
  .wmap{position:relative;display:flex;flex-direction:column;align-items:center;gap:30px;margin:0 auto;padding:12px 0 6px;width:100%;max-width:340px}
  /* capa de terreno: paisaje del bioma detrás del camino. Las piezas se pintan
     con clases .terr (compartidas con el motivo de bioma de la portada de lección). */
  .wterrain{position:absolute;left:0;top:0;z-index:0;overflow:visible;pointer-events:none}

  .terr .rk2{fill:none;stroke:rgba(255,255,255,.12);stroke-width:.6}
  .terr .bdy{fill:#23234a;stroke:rgba(255,255,255,.06);stroke-width:.5}
  .terr .win{fill:var(--gold,#c5a059)}
  .terr .glow{fill:var(--gold,#c5a059);opacity:.32}
  .terr .dot{fill:#f5f2eb;opacity:.85}
  .terr .ln{fill:none;stroke:var(--w-accent,#5E8A4E);stroke-width:1.4;stroke-linecap:round}
  .terr .ln2{fill:none;stroke:var(--w-accent,#5E8A4E);stroke-width:1.2;opacity:.7}
  .terr .spark{fill:var(--gold,#c5a059)}
  .terr .ring{fill:none;stroke:var(--w-accent,#6A5FA8);stroke-width:1.4;opacity:.8}

  .biome-motif{flex:none;display:block}

  /* sendero SVG: calzada ancha + glow + línea dorada (trazado por JS sobre los nodos) */
  .wtrail{position:absolute;left:0;top:0;z-index:1;overflow:visible;pointer-events:none}

  .wtrail-road{stroke:var(--w-accent,#c5a059);stroke-width:17;opacity:.20}
  .wtrail-glow{stroke:var(--w-glow,rgba(197,160,89,.4));stroke-width:9;opacity:.5}
  .wtrail-line{stroke:var(--gold,#c5a059);stroke-width:3.5;stroke-dasharray:2 12;opacity:.95}
  /* nodos/carteles por encima del terreno y el camino */
  .wisland .wnode{z-index:2}
  .wisland .wstart{z-index:2}
  /* avatar (gato Vesper) que recorre el sendero */
  .wavatar{position:absolute;left:0;top:0;width:50px;height:50px;z-index:3;object-fit:contain;

  @keyframes wbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  /* títulos/etiquetas legibles sobre la isla oscura */
  .wisland .wtitle{color:var(--cream,#f5f2eb)}

    color:var(--cream,#f5f2eb);letter-spacing:.02em;

  .wisland .wcheck .ic::before{color:var(--w-accent,#c5a059)}
  .wisland .wcheck .ct{color:var(--gold,#c5a059)}
  /* Guardián del mundo (jefe): arco/portal — distinto del castillo */
  .wbtn.boss{width:92px;height:90px;border-radius:46px 46px 16px 16px;border-width:4px;font-size:1.8rem;
    background:linear-gradient(160deg,#23234a,var(--ink,#1B1B2F));border-color:var(--w-accent,#c5a059);
    color:var(--w-accent,#c5a059);box-shadow:0 7px 0 rgba(20,18,42,.45),0 10px 24px rgba(20,18,42,.5)}
  .wbtn.boss.locked{filter:grayscale(.65) brightness(.7);color:#8e8aa6;border-color:#3a3a55;cursor:not-allowed;box-shadow:none}
  .wbtn.boss.ready{color:var(--gold,#c5a059);border-color:var(--gold,#c5a059)}

    box-shadow:0 0 0 0 rgba(197,160,89,.5);animation:wpulse 1.7s ease-in-out infinite}
  .wbtn.boss.conquered{background:linear-gradient(160deg,#dcc08a,var(--gold,#c5a059));color:#1B1B2F;border-color:var(--gold2,#a8843d)}
  .wbtn.boss .beam{opacity:0}

  .wboss-node .wlabel.boss-lb{background:var(--w-accent,#1B1B2F);color:#fff}

  /* mini-reto (repaso por destreza): más pequeño y subordinado al Guardián */

  /* ===== Pantallas del Guardián (portada / medidor / resultado) ===== */
  .boss-cover{background:linear-gradient(170deg,#23234a,var(--ink,#1B1B2F));color:var(--cream,#f5f2eb);

  /* ===== Identidad del mundo al entrar a una lección ===== */

  .lesson-world{display:flex;align-items:center;gap:12px;justify-content:center;margin:0 0 12px;padding:8px 14px;border-radius:14px;

/* Foco de teclado visible (WCAG 2.4.7) */

/* =====================================================================
   VESPER ACADEMY — Hub "Ascenso a la Maestria" · capa de mundos
   Pegar al FINAL del <style> de leccion.html (despues de la linea ~362).
   ---------------------------------------------------------------------
   ORO INVARIANTE: #c5a059 / #a8843d / --gold-tint = logro/recompensa.
   --w-accent / --w-accent-soft / --w-glow = ATMOSFERA del mundo
   (heredados inline desde WORLD_THEME via style en .world-banner y .wmap).
   Solo se animan transform/opacity/filter/background-position en bucles.
   Keyframes: globales "g-*", por mundo "amb-<NIVEL>-*". wpulse intacto.
   wflag QUEDA OBSOLETO (los gestos-Mario se reemplazan) — ver pasos.
   ===================================================================== */

/* =========================================================
   0. BASE COMUN DE LA CAPA AMBIENTAL (coordinador, una vez)
   ========================================================= */
.wamb{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.wamb i{position:absolute;display:block;will-change:transform,opacity}
.wamb--map{z-index:0}                 /* en el mapa: debajo de .wnode (z1) */

/* =========================================================
   1. ANIMACIONES GLOBALES (solo selectores BASE, sin [data-world])
   ========================================================= */

/* 1a. Banner: ken-burns + parallax del scrim */
.world-banner__img{transform-origin:50% 50%;will-change:transform;
  animation:g-kenburns 34s ease-in-out infinite alternate}
@keyframes g-kenburns{
  0%{transform:scale(1.06) translate3d(-1.2%,-0.8%,0)}
  50%{transform:scale(1.11) translate3d(1.0%,0.6%,0)}
  100%{transform:scale(1.07) translate3d(-0.6%,1.0%,0)}}
.world-banner::before{will-change:transform;
  animation:g-banner-parallax 38s ease-in-out infinite alternate}
@keyframes g-banner-parallax{
  0%{transform:translate3d(0,0,0)}
  100%{transform:translate3d(-1.1%,0.4%,0)}}

/* 1b. (El sendero punteado animado se sustituyó por el SVG .wtrail medido en JS) */

/* 1c. Nodos en reposo: bob sutil (no el actual / bloqueado / castillo) */
.wbtn:not(.is-current):not(.locked):not(.castle){will-change:transform;
  animation:g-node-bob 4.2s ease-in-out infinite}
.wnode:nth-of-type(4n+1) .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-0.4s}
.wnode:nth-of-type(4n+2) .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-1.3s}
.wnode:nth-of-type(4n+3) .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-2.2s;animation-duration:4.8s}
.wnode:nth-of-type(4n)   .wbtn:not(.is-current):not(.locked):not(.castle){animation-delay:-3.1s;animation-duration:3.9s}
@keyframes g-node-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.wbtn:active:not(.locked){animation:none}

/* 1d. Cinta de mundos: entrada en cascada + lift en hover + halo "on" */
.worlds .world{animation:g-world-in .5s cubic-bezier(.22,.61,.36,1) both}
.worlds .world:nth-child(1){animation-delay:.02s}
.worlds .world:nth-child(2){animation-delay:.08s}
.worlds .world:nth-child(3){animation-delay:.14s}
.worlds .world:nth-child(4){animation-delay:.20s}
.worlds .world:nth-child(5){animation-delay:.26s}
.worlds .world:nth-child(6){animation-delay:.32s}
.worlds .world:nth-child(n+7){animation-delay:.38s}
@keyframes g-world-in{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.world{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease,background .18s ease}
.world:not(.locked):hover,.world:not(.locked):focus-visible{transform:translateY(-3px);box-shadow:0 9px 22px rgba(27,27,47,.14)}
.world.on{animation:g-world-onpulse 3.6s ease-in-out infinite}
@keyframes g-world-onpulse{0%,100%{box-shadow:0 5px 16px rgba(27,27,47,.10)}50%{box-shadow:0 5px 20px rgba(197,160,89,.30)}}

/* 1e. Barra de progreso: shimmer dorado (oro invariante, nunca acento) */
.world-banner__bar > i{position:relative;overflow:hidden}
.world-banner__bar > i::after{content:"";position:absolute;top:0;bottom:0;left:0;width:42%;
  background:linear-gradient(100deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.55) 50%,rgba(255,255,255,0) 100%);
  transform:translateX(-160%);will-change:transform;
  animation:g-bar-shimmer 3.4s ease-in-out infinite;pointer-events:none}
@keyframes g-bar-shimmer{0%{transform:translateX(-160%)}60%{transform:translateX(320%)}100%{transform:translateX(320%)}}

/* 1f. Estrellas ganadas: titileo dorado muy leve (recompensa) */
.wnode.done .wstars{will-change:filter,opacity;animation:g-star-twinkle 5s ease-in-out infinite}
.wnode:nth-of-type(3n+1).done .wstars{animation-delay:-1.7s}
.wnode:nth-of-type(3n+2).done .wstars{animation-delay:-3.3s;animation-duration:5.6s}
@keyframes g-star-twinkle{
  0%,100%{filter:drop-shadow(0 0 3px rgba(197,160,89,.45)) brightness(1);opacity:1}
  50%{filter:drop-shadow(0 0 6px rgba(197,160,89,.70)) brightness(1.12);opacity:.94}}

.wmap[data-world="C2"] .wbtn.completed:not(.castle)::after{content:"";position:absolute;top:-14px;left:50%;width:26px;height:11px;
  transform:translateX(-50%);background:none;filter:none;
  background-image:linear-gradient(105deg,transparent 35%,rgba(255,245,210,.85) 50%,transparent 65%);
  background-size:220% 100%;background-repeat:no-repeat;
  clip-path:polygon(0 100%,12% 8%,28% 68%,50% 0,72% 68%,88% 8%,100% 100%);animation:amb-C2-settle 1.4s ease-out forwards}
@keyframes amb-C2-settle{
  0%{transform:translateX(-50%) scale(1.1);background-position:140% 0;opacity:0}

.wmap[data-world="C2"] .wcheck{border-color:var(--w-accent);border-left-color:var(--w-accent);
  background:linear-gradient(90deg,var(--w-accent-soft),var(--gold-tint))}
.wmap[data-world="C2"] .wcheck .ic::before{content:"\16A8";color:var(--w-accent);margin-right:4px;font-size:1rem;text-shadow:0 0 4px var(--w-glow)}
.wmap[data-world="C2"] .wbtn.castle{border-radius:14px 14px 18px 18px;
  background:linear-gradient(165deg,#dcc08a,var(--gold,#c5a059));border-color:var(--gold2,#a8843d)}
.wmap[data-world="C2"] .wbtn.castle::before{content:"";position:absolute;inset:-12px;border-radius:50%;pointer-events:none;z-index:-1;
  background:radial-gradient(circle,rgba(197,160,89,.5) 0%,rgba(197,160,89,0) 68%);filter:blur(4px);animation:amb-C2-beacon 6.5s ease-in-out infinite}
.wmap[data-world="C2"] .wbtn.castle::after{content:"";position:absolute;top:7px;left:50%;transform:translateX(-50%);
  width:11px;height:13px;background:var(--w-accent);opacity:.42;
  clip-path:polygon(50% 0,100% 22%,100% 64%,50% 100%,0 64%,0 22%);filter:drop-shadow(0 0 3px var(--w-glow))}
.wmap[data-world="C2"] .wbtn.castle.completed svg path:last-child{transform-origin:23px 4px;animation:amb-C2-beacon 6.5s ease-in-out infinite}
.wmap[data-world="C2"] .wlabel{letter-spacing:.1em}
@keyframes amb-C2-beacon{0%,100%{opacity:.45;transform:scale(.97)}50%{opacity:.95;transform:scale(1.04)}}
.wmap[data-world="C2"] .wstart{background:linear-gradient(160deg,#0b0b18,var(--ink,#1B1B2F));color:var(--gold,#c5a059);
  border-color:var(--gold,#c5a059);box-shadow:0 0 0 1px var(--w-accent-soft),var(--shadow)}
.wmap[data-world="C2"] .wstart > span{text-shadow:0 0 6px var(--w-glow)}

/* =========================================================
   8. PREFERS-REDUCED-MOTION — UN solo bloque que detiene/atenua TODO
   (globales g-*, todos los amb-<NIVEL>-*, wpulse, capas .wamb).
   Estado en reposo bello y legible; particulas congeladas como textura.
   ========================================================= */
@media (prefers-reduced-motion:reduce){
  /* globales */
  .world-banner__img,.world-banner::before,.wmap::before,.wmap::after,
  .wbtn,.wbtn.is-current::after,.worlds .world,.world.on,
  .world-banner__bar > i::after,.wnode.done .wstars,
  /* capas ambientales (banner + mapa) y sus pseudos pintados */
  .wamb i,.wamb::before,.wamb--map i,.wamb--map::before,
  /* sellos de completado por mundo (settle) */
  .wmap[data-world] .wbtn.completed:not(.castle)::after,
  /* gestos del castillo por mundo */
  .wmap[data-world] .wbtn.castle::before,
  .wmap[data-world] .wbtn.castle.completed svg path:last-child,
  /* scrim que respira (A1) */
  .world-banner[data-world="A1"]::after{
    animation:none !important;
  }
  .world-banner__img{transform:scale(1.06)}
  .world:not(.locked):hover,.world:not(.locked):focus-visible{transform:none}
  /* congelar particulas como textura tenue (no eliminarlas) */
  .wamb i,.wamb--map i{opacity:.3;transform:none}
  /* dejar sellos en su fotograma final, legibles */
  .wmap[data-world] .wbtn.completed:not(.castle)::after{opacity:1;transform:none}
  .wmap[data-world="B2"] .wbtn.completed:not(.castle)::after{transform:translate(-50%,5%) rotate(-45deg);opacity:.6}
  .world-banner[data-world="A1"] .wamb i,.wmap[data-world="A1"] .wamb--map i{opacity:.32}
  .world-banner[data-world="B1"] .wamb i:nth-child(9){opacity:0}
}

<script>
(function () {
  var qs = new URLSearchParams(location.search);
  var id = qs.get("id");
  if (window.VESPER_ACTIVITIES && VESPER_ACTIVITIES.merge) VESPER_ACTIVITIES.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_CONTENT_PACK && VESPER_CONTENT_PACK.merge) VESPER_CONTENT_PACK.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_EXPANSION && VESPER_EXPANSION.merge) VESPER_EXPANSION.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_EXPANSION2 && VESPER_EXPANSION2.merge) VESPER_EXPANSION2.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_TOEFL_PACK && VESPER_TOEFL_PACK.merge) VESPER_TOEFL_PACK.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_LEVELS_PACK && VESPER_LEVELS_PACK.merge) VESPER_LEVELS_PACK.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  if (window.VESPER_THEMES_PACK && VESPER_THEMES_PACK.merge) VESPER_THEMES_PACK.merge(window.VESPER_LESSONS, window.VESPER_LESSONS_ORDER);
  var L = window.VESPER_LESSONS || {};
  var ORDER = window.VESPER_LESSONS_ORDER || Object.keys(L);
  var A = window.VESPER_ADAPTIVE || null;
  var PATH = window.VESPER_PATH || null;
  var PERS = window.VESPER_PERSONA || null;
  var M = window.VESPER_MASCOT;
  var P = window.VesperProgress;
  var app = document.getElementById("app");

  var lesson = null, baseLesson = null, profile = (A && A.getProfile) ? A.getProfile() : null;
  var exIdx = 0, results = [], earnedXp = 0;

  function esc(s) {
    return ("" + (s == null ? "" : s)).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function show(html) { app.innerHTML = html; window.scrollTo(0, 0); }

  function mascot(state, line, size) {
    if (window.VESPER_MASCOT && VESPER_MASCOT.render) {
      return VESPER_MASCOT.render(state, { line: (line != null ? line : undefined), size: size || "md" });
    }
    return '<div class="mascot"><img class="mascot-img" src="assets/images/virtual_class_happy_cat.png" alt="Vesper Cat">'
      + (line ? '<div class="bubble">' + esc(line) + '</div>' : '') + '</div>';
  }
  function topbar(pct) {
    return '<div class="topbar"><a class="back" href="' + (id ? 'leccion.html' : 'index.html') + '" aria-label="Salir">&#8592;</a>'
      + '<div class="progress"><div class="bar" style="width:' + pct + '%"></div></div></div>';
  }
  /* feedbackBox(ok, explanation, wrongFallback)
     - explanation: el "por que" del ejercicio (se muestra al fallar siempre y
       al acertar si la persona pidio retro explicativa: explainOnCorrect).
     - wrongFallback: texto solo-al-fallar (p.ej. "Respuesta: ...").
     - la frase de la mascota sale en el TONO elegido (VESPER_PERSONA.line). */
  /* efecto de sonido ligero (WebAudio, sin archivos) en acierto/error.
     Respeta la preferencia "Efectos de sonido" de Configuración. */
  var _actx = null;
  function playFx(ok) {
    try {
      if (window.VESPER_PREFS && !VESPER_PREFS.soundEnabled()) return;
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      _actx = _actx || new AC();
      if (_actx.state === "suspended") { try { _actx.resume(); } catch (e) {} }
      var t = _actx.currentTime;
      var notes = ok ? [660, 990] : [300, 200];   /* sube al acertar, baja al fallar */
      notes.forEach(function (f, i) {
        var o = _actx.createOscillator(), g = _actx.createGain();
        o.type = "sine"; o.frequency.value = f;
        var t0 = t + i * 0.09;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.12, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.16);
        o.connect(g); g.connect(_actx.destination);
        o.start(t0); o.stop(t0 + 0.18);
      });
    } catch (e) {}
  }

  function feedbackBox(ok, explanation, wrongFallback) {
    playFx(ok);
    var state = ok ? "correct" : "incorrect";
    var line = (PERS && PERS.line) ? PERS.line(state) : "";
    if (!line) line = (window.VESPER_MASCOT ? VESPER_MASCOT.get(state).line : (ok ? "Bien!" : "Casi..."));
    var showExp = (PERS && PERS.explainOnCorrect) ? (!ok || PERS.explainOnCorrect()) : !ok;
    var detail = ok ? (showExp ? (explanation || "") : "") : (explanation || wrongFallback || "");
    var cat = (window.VESPER_MASCOT && VESPER_MASCOT.render)
      ? VESPER_MASCOT.render(state, { size: "sm", line: false })
      : '<img class="fb-cat" src="assets/images/virtual_class_happy_cat.png" alt="">';
    return '<div class="fbbox ' + (ok ? "ok" : "no") + '">' + cat
      + '<div><b>' + (ok ? "Correcto!" : "Incorrecto") + '</b><div class="muted">' + esc(line) + '</div>'
      + (detail ? '<div class="explain">' + esc(detail) + '</div>' : '') + '</div></div>';
  }
  function shuffle(arr, avoid) {
    for (var k = 0; k < 10; k++) {
      for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
      if (!avoid || arr.join(" ") !== avoid.join(" ")) break;
    }
    return arr;
  }

  /* ---------- INDEX / HUB progresivo (no ?id=) ---------- */
  function toast(msg) {
    var t = byId("toast"); if (!t) return;
    t.textContent = msg; t.classList.add("show");
    clearTimeout(t._h); t._h = setTimeout(function () { t.classList.remove("show"); }, 1900);
  }

  /* ---------- Mapa de mundos (HUB estilo videojuego) ---------- */
  function hudHtml(st, dg, hello) {
    var strip = '<div class="hub-strip">'
      + '<span class="hub-stat" title="Racha">&#128293; ' + (st.streak || 0) + '</span>'
      + '<span class="hub-stat" title="Experiencia">&#11088; ' + (st.xp || 0) + ' XP</span>'
      + (dg ? '<span class="hub-stat' + (dg.met ? ' met' : '') + '" title="Meta diaria">&#127919; ' + Math.min(dg.progress, dg.target) + '/' + dg.target + '</span>' : "")
      + ((st.shields || 0) ? '<span class="hub-stat" title="Escudos">&#128737;&#65039; ' + st.shields + '</span>' : "") + '</div>';
    return '<div class="hub-head"><div><h1 class="hub-hello">' + esc(hello) + '</h1>'
      + '<p class="muted" style="margin:2px 0 0;font-size:.84rem">Elige tu aventura, paso a paso.</p></div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<button class="hub-icon" id="searchToggle" type="button" aria-label="Buscar lecciones" aria-controls="hubSearch" aria-expanded="false" title="Buscar">&#128270;</button>'
      + '<a class="hub-icon" href="chat.html" aria-label="Habla con Vesper" title="Habla con Vesper">&#128172;</a>'
      + '<a class="hub-icon" href="configuracion.html" aria-label="Configuración" title="Configuración">&#9881;&#65039;</a>'
      + mascot("welcome", false, "sm") + '</div></div>'
      + strip;
  }

  /* cada mundo (nivel) = ilustración + nombre + identidad temática (acento, atmósfera, partículas)
     + jefe (Guardián del mundo: examen mixto que abre el siguiente nivel). */
  var WORLD_THEME = {
    A1: { file: "assets/images/lessons/theme_home.jpg",      worldName: "El Hogar",             accent:"#C07A33", accentSoft:"rgba(192,122,51,.15)", glow:"rgba(192,122,51,.40)", ambientName:"hearth",    ambientN:7,  mapN:3, boss:{ name:"El Centinela del Hogar",  pass:75 }, biome:["cottage","bush","lantern","pine","bush"] },
    A2: { file: "assets/images/lessons/theme_nature.jpg",    worldName: "El Sendero",           accent:"#5E8A4E", accentSoft:"rgba(94,138,78,.15)",  glow:"rgba(94,138,78,.38)",  ambientName:"trail",     ambientN:7,  mapN:4, boss:{ name:"El Guardián del Sendero", pass:75 }, biome:["pine","pine","bush","mushroom","fern"] },
    B1: { file: "assets/images/lessons/theme_city.jpg",      worldName: "El Horizonte",         accent:"#3D86B0", accentSoft:"rgba(61,134,176,.15)", glow:"rgba(61,134,176,.34)", ambientName:"skyline",   ambientN:9,  mapN:3, boss:{ name:"El Vigía del Horizonte",  pass:75 }, biome:["building","building","lamp","tower","rock"] },
    B2: { file: "assets/images/lessons/theme_business.jpg",  worldName: "La Torre",             accent:"#A8762E", accentSoft:"rgba(168,118,46,.15)", glow:"rgba(168,118,46,.42)", ambientName:"ascent",    ambientN:6,  mapN:3, boss:{ name:"El Heraldo de la Torre",  pass:75 }, biome:["crag","rock","crag","banner","pine"] },
    C1: { file: "assets/images/lessons/theme_space.jpg",     worldName: "El Firmamento",        accent:"#6A5FA8", accentSoft:"rgba(106,95,168,.16)", glow:"rgba(106,95,168,.40)", ambientName:"starfield", ambientN:10, mapN:6, boss:{ name:"El Custodio del Firmamento", pass:75 }, biome:["star4","planet","crystal","star4"] },
    C2: { file: "assets/images/lessons/theme_fantasy.jpg",   worldName: "El Castillo del Saber",accent:"#3FA08A", accentSoft:"rgba(63,160,138,.16)", glow:"rgba(63,160,138,.36)", ambientName:"aurora",    ambientN:7,  mapN:2, boss:{ name:"El Soberano del Saber",   pass:75 }, biome:["spire","banner","crystal","pine"] }
  };
  var WORLD_TAG = { A1: "Principiante", A2: "Básico", B1: "Intermedio", B2: "Intermedio alto", C1: "Avanzado", C2: "Maestría" };
  var WORLD_UMBRAL = { A1: "Umbral del Hogar", A2: "Mojón del Sendero", B1: "Arco del Horizonte", B2: "Pórtico de la Torre", C1: "Portal del Firmamento", C2: "Sello del Castillo" };
  var BOSS_AVATAR = "assets/images/mascot/vesper_cat.png";
  /* metadatos del jefe de un nivel, con defaults si el mundo no declara boss */
  function bossMeta(lv) { var t = WORLD_THEME[lv] || {}; var b = t.boss || {}; return { name: b.name || "El Guardián", subtitle: t.worldName || lv, pass: b.pass || 75 }; }

  /* ===== Iconos de marca (SVG nítidos en lugar de emojis) ===== */
  var SKILL_ICONS = {
    grammar:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.4C9.7 5 7.2 4.7 4.4 5.3v12.5c2.8-.6 5.3-.3 7.6 1.1 2.3-1.4 4.8-1.7 7.6-1.1V5.3C16.8 4.7 14.3 5 12 6.4z"/><path d="M12 6.4V19"/></svg>',
    vocab:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3.4" y="8" width="12.6" height="10" rx="2"/><path d="M7.6 8V6.4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2V14a2 2 0 0 1-2 2"/><path d="M6.4 12.4h6M6.4 15h4"/></svg>',
    reading:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3.5h7l4 4v13h-11z"/><path d="M13.5 3.5v4h4"/><path d="M9 12h6M9 15.2h6M9 8.8h3"/></svg>',
    listening: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 14v-2a7 7 0 0 1 14 0v2"/><rect x="3.4" y="13.4" width="3.8" height="6.2" rx="1.7"/><rect x="16.8" y="13.4" width="3.8" height="6.2" rx="1.7"/></svg>',
    use:       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 6.4a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v6.8a2 2 0 0 1-2 2H10l-4 3.4v-3.4H6.5a2 2 0 0 1-2-2z"/><path d="M8 8.8h8M8 11.8h5"/></svg>'
  };
  function skillIcon(sk) { return '<span class="skill-ic" aria-hidden="true">' + (SKILL_ICONS[sk] || "") + '</span>'; }
  /* glifo de estado del nodo de lección (check / play / candado) en SVG */
  function nodeGlyph(state) {
    if (state === "completed") return '<svg class="wglyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12.6l4.6 4.6L19 7.4"/></svg>';
    if (state === "locked")    return '<svg class="wglyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="10.5" width="14" height="9.5" rx="2.3"/><path d="M8 10.5V7.6a4 4 0 0 1 8 0v2.9"/><circle cx="12" cy="15" r="1.4" fill="currentColor" stroke="none"/></svg>';
    return '<svg class="wglyph" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.5 5.5v13l10.5-6.5z"/></svg>';
  }
  /* escudo SVG (jefe) — reemplaza el emoji 🛡️ */
  function shieldSvg(cls) { return '<svg class="' + (cls || "") + '" viewBox="0 0 24 26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2.5l8 3v6c0 5.4-3.6 8.6-8 10.6C7.6 20.1 4 16.9 4 11.5v-6z"/><path d="M8.4 12.2l2.7 2.7 4.5-4.9"/></svg>'; }
  /* style inline con las 3 variables del mundo (acento/soft/glow) */
  function worldVars(t) { return '--w-accent:' + t.accent + ';--w-accent-soft:' + t.accentSoft + ';--w-glow:' + t.glow; }
  /* capa ambiental reutilizable (N partículas <i>); mapMod=true para la del mapa */
  function ambLayer(n, mapMod) { var dots = ""; for (var i = 0; i < n; i++) dots += "<i></i>"; return '<div class="wamb' + (mapMod ? ' wamb--map' : '') + '" aria-hidden="true">' + dots + '</div>'; }

  /* offset-x serpenteante por parada (da la curva al sendero) */
  function dxFor(k) { return Math.round(64 * Math.sin(k * 0.85)); }
  /* ¿reducir movimiento? (preferencia del SO o ajuste de Configuración) */
  function reduceMotion() {
    try {
      if (document.documentElement.classList.contains("vesper-reduce-motion")) return true;
      return !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
    } catch (e) { return false; }
  }
  /* pseudo-aleatorio determinista (estable entre re-medidas/resize) */
  function trnd(i) { var x = Math.sin(i * 127.1 + 17.3) * 43758.5453; return x - Math.floor(x); }
  /* una pieza de paisaje del bioma (kind) como <g> SVG, escalada y posicionada.
     Paleta navy: cuerpos oscuros, acento del mundo en follaje/tejados, oro en luces. */
  function terrainProp(px, py, sc, kind) {
    var open = '<g class="prop ' + kind + '" transform="translate(' + px.toFixed(1) + ' ' + py.toFixed(1) + ') scale(' + sc.toFixed(2) + ')">';
    var sh = '<ellipse class="sh" cx="0" cy="3" rx="10" ry="3"/>';
    switch (kind) {
      case "pine":     return open + '<ellipse class="sh" cx="0" cy="3" rx="10" ry="3"/><path class="lf2" d="M0 -9 L7 7 L-7 7 Z"/><path class="lf" d="M0 -19 L8 3 L-8 3 Z"/><rect class="tk" x="-1.5" y="5" width="3" height="5"/></g>';
      case "bush":     return open + '<ellipse class="sh" cx="0" cy="4" rx="11" ry="3"/><circle class="lf" cx="-5" cy="1" r="6"/><circle class="lf" cx="5" cy="1" r="6"/><circle class="lf2" cx="0" cy="-4" r="7"/></g>';
      case "rock":     return open + '<ellipse class="sh" cx="0" cy="3" rx="9" ry="3"/><path class="rk" d="M-8 4 L-5 -5 L2 -7 L8 -1 L7 4 Z"/></g>';

  /* genera el paisaje del bioma alrededor del camino (evita los nodos) */
  function terrainSvgInner(pts, W, H, biome) {

    function pick(seed) { return biome[Math.floor(trnd(seed) * biome.length) % biome.length]; }
    function near(px, py) { for (var j = 0; j < pts.length; j++) { var dx = pts[j][0] - px, dy = pts[j][1] - py; if (dx * dx + dy * dy < 60 * 60) return true; } return false; }
    var s = "", y, k = 0;
    for (y = 44; y < H - 18; y += 56) {
      k++;

      if (!near(lx, y)) s += terrainProp(lx, y, 0.8 + trnd(k * 3) * 0.55, pick(k * 5));
      var rx = W - 7 - trnd(k * 2 + 1) * 26;                // margen derecho
      if (!near(rx, y + 22)) s += terrainProp(rx, y + 22, 0.8 + trnd(k * 7) * 0.55, pick(k * 11));
      if (trnd(k * 13) > 0.62) {                            // alguna pieza interior en hueco libre

  /* ----- Sendero 2D (medir-y-dibujar): tras pintar el mapa, mide el centro real
     de cada nodo [data-stop] dentro de #wmap, traza una curva suave que los une
     (SVG decorativo) + calzada + paisaje, y coloca al avatar (gato) sobre el nodo
     actual. El avatar "camina" al nuevo nodo con offset-path cuando data-prev != data-cur.
     Como mide el DOM real, queda alineado aunque cambien lecciones o ancho. ----- */
  function paintTrail() {
    var map = byId("wmap"); if (!map) return;
    var svg = map.querySelector(".wtrail");
    var avatar = map.querySelector(".wavatar");
    var stops = map.querySelectorAll("[data-stop]");
    if (!svg || !stops.length) return;
    var mb = map.getBoundingClientRect();
    var W = map.clientWidth || mb.width, H = map.clientHeight || mb.height, pts = [], i;
    if (W < 80) { requestAnimationFrame(paintTrail); return; }   // aún sin layout: reintenta
    for (i = 0; i < stops.length; i++) {
      var btn = stops[i].querySelector(".wbtn") || stops[i];
      var r = btn.getBoundingClientRect();
      pts.push([ r.left - mb.left + r.width / 2, r.top - mb.top + r.height / 2 ]);
    }
    function seg(a, b) {
      var my = ((a[1] + b[1]) / 2).toFixed(1);
      return " C" + a[0].toFixed(1) + " " + my + " " + b[0].toFixed(1) + " " + my + " " + b[0].toFixed(1) + " " + b[1].toFixed(1);
    }
    var d = "M" + pts[0][0].toFixed(1) + " " + pts[0][1].toFixed(1);
    for (i = 1; i < pts.length; i++) d += seg(pts[i - 1], pts[i]);
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    svg.setAttribute("width", W); svg.setAttribute("height", H);
    var paths = svg.querySelectorAll("path");
    for (i = 0; i < paths.length; i++) paths[i].setAttribute("d", d);
    /* capa de terreno: paisaje (árboles/rocas) alrededor del camino */
    var terr = map.querySelector(".wterrain");
    if (terr) {
      terr.setAttribute("viewBox", "0 0 " + W + " " + H);
      terr.setAttribute("width", W); terr.setAttribute("height", H);
      var bw = WORLD_THEME[map.getAttribute("data-world")];
      terr.innerHTML = terrainSvgInner(pts, W, H, bw && bw.biome);
    }
    if (!avatar) return;

    /* longitud de arco acumulada en cada nodo => offset-distance exacto */
    var line = paths[paths.length - 1], lens = [0];
    if (line.getTotalLength) {
      var tmp = line.cloneNode(false), pre = "M" + pts[0][0].toFixed(1) + " " + pts[0][1].toFixed(1);
      svg.appendChild(tmp);
      for (i = 1; i < pts.length; i++) { pre += seg(pts[i - 1], pts[i]); tmp.setAttribute("d", pre); lens.push(tmp.getTotalLength()); }
      svg.removeChild(tmp);
    } else { for (i = 1; i < pts.length; i++) lens.push(i); }
    var total = lens[lens.length - 1] || 1;
    function pctAt(idx) { idx = Math.max(0, Math.min(lens.length - 1, idx)); return (lens[idx] / total) * 100; }

    var cur = parseInt(map.getAttribute("data-cur"), 10); if (isNaN(cur)) cur = 0;
    var prev = parseInt(map.getAttribute("data-prev"), 10);
    var canOffset = !!(window.CSS && CSS.supports && CSS.supports("offset-path", 'path("M0 0")'));
    var animate = !isNaN(prev) && prev !== cur && !reduceMotion();

    if (canOffset) {
      avatar.style.setProperty("offset-path", 'path("' + d + '")');
      if (animate) {
        avatar.style.setProperty("transition", "none");
        avatar.style.setProperty("offset-distance", pctAt(prev) + "%");
        void avatar.offsetWidth;
        avatar.style.setProperty("transition", "offset-distance 1s ease-in-out");
        requestAnimationFrame(function () { avatar.style.setProperty("offset-distance", pctAt(cur) + "%"); });
      } else {
        avatar.style.setProperty("transition", "none");
        avatar.style.setProperty("offset-distance", pctAt(cur) + "%");
      }
    } else {
      /* fallback sin offset-path: centra con margen (deja libre transform para el bob) */
      avatar.style.margin = "-25px 0 0 -25px";
      var place = function (idx) { avatar.style.left = pts[idx][0] + "px"; avatar.style.top = pts[idx][1] + "px"; };
      if (animate) {
        place(prev); void avatar.offsetWidth;
        avatar.style.transition = "left 1s ease-in-out, top 1s ease-in-out";
        requestAnimationFrame(function () { place(cur); });
      } else { avatar.style.transition = "none"; place(cur); }
    }

  }

      + '<div class="wmap" id="wmap" data-world="' + selLevel + '" data-cur="' + curStop + '" style="' + worldVars(t) + '">'
      + '<svg class="wterrain terr" aria-hidden="true" focusable="false" preserveAspectRatio="none"></svg>'
      + '<svg class="wtrail" aria-hidden="true" focusable="false" preserveAspectRatio="none"><path class="wtrail-road"/><path class="wtrail-glow"/><path class="wtrail-line"/></svg>'
      + '<img class="wavatar" src="' + BOSS_AVATAR + '" alt="" aria-hidden="true" decoding="async">'

      + '</div></div></div>';
    return banner + scene;
  }

  /* Vitrina de logros (ganados + bloqueados), plegable. */
  function buildTrophyShelf() {
    if (!P || !P.achievementsState) return "";
    var list = P.achievementsState();
    var earned = list.filter(function (a) { return a.unlocked; }).length;
    var chips = list.map(function (a) {

  function renderIndex(selLevel) {
    clearLessonTheme();
    var st = P ? P.getState() : { streak: 0, xp: 0, shields: 0 };

    var trophyHtml = buildTrophyShelf();

    if (!PATH) {
      var cards = ORDER.map(function (k) {
        var l = L[k]; if (!l) return "";
        return '<button class="card lcard" data-go="' + esc(k) + '"><div class="lcard-top"><span class="pill">' + esc(l.level)
          + '</span><span class="track">' + esc(l.track) + '</span></div><h2>' + esc(l.title) + '</h2>'
          + '<div class="muted">' + (l.exercises ? l.exercises.length : 0) + ' ejercicios &middot; +' + (l.xpReward || 0) + ' XP</div></button>';
      }).join("");
      show('<div class="wrap"><div class="hero">' + mascot("welcome", hello) + '</div><h1>Lecciones gratis</h1><div class="grid">' + cards + '</div></div>');
      each("[data-go]", function (b) { b.onclick = function () { location.search = "?id=" + encodeURIComponent(b.getAttribute("data-go")); }; });
      return;
    }

    var built = PATH.build(L, ORDER);
    if (!selLevel) {
      var band = (A && profile) ? A.levelToBand(A.profileLevel()) : null;
      if (band && built.levels[band] && built.levels[band].total && PATH.regionUnlocked(band, built)) selLevel = band;
      else {
        /* primer mundo DESBLOQUEADO aún sin completar; si el siguiente está bloqueado
           (falta vencer su jefe), nos quedamos en el último desbloqueado (donde brilla el Guardián). */
        for (var i = 0; i < PATH.LEVELS.length; i++) {
          var lv = PATH.LEVELS[i], gg = built.levels[lv];
          if (!gg.total) continue;
          if (!PATH.regionUnlocked(lv, built)) break;   // bloqueado: detente en el anterior
          selLevel = lv;
          if (gg.done < gg.total) break;                 // incompleto y desbloqueado: aquí nos quedamos
        }
        if (!selLevel) selLevel = PATH.LEVELS[0];
      }
    }

    /* el mapa de mundos (renderWorlds + worldMap) reemplaza continuar/pestañas/secciones */

    /* buscador + filtros (ahora detrás del botón 🔍 del HUD) */
    var skillChips = PATH.SKILL_ORDER.map(function (sk) {
      var m = PATH.SKILLS[sk];
      return '<button class="fchip" type="button" aria-pressed="false" data-skill="' + sk + '">' + skillIcon(sk) + ' ' + esc(m.label) + '</button>';
    }).join("");
    var searchUI = '<div class="hub-search" id="hubSearch" hidden>'
      + '<div class="srch"><span class="srch-ic" aria-hidden="true">&#128270;</span>'
      + '<label class="sr-only" for="lessonSearch">Buscar lecciones por título, tema o nivel</label>'
      + '<input id="lessonSearch" type="search" inputmode="search" autocomplete="off" role="searchbox"'
      + ' aria-controls="searchResults" placeholder="Buscar lección, tema o nivel…"></div>'
      + '<div class="filter-row" role="group" aria-label="Filtrar por destreza">'
      + '<button class="fchip on" type="button" aria-pressed="true" data-skill="all">Todas</button>' + skillChips + '</div>'
      + '<div class="filter-row" role="group" aria-label="Filtrar por estado">'
      + '<button class="fchip on" type="button" aria-pressed="true" data-state="all">Todas</button>'
      + '<button class="fchip" type="button" aria-pressed="false" data-state="open">Pendientes</button>'
      + '<button class="fchip" type="button" aria-pressed="false" data-state="completed">Completadas</button></div></div>';

    show('<div class="wrap">'
      + hudHtml(st, dg, hello)
      + worldsRibbon(built, selLevel)
      + searchUI
      + '<div id="searchResults" class="search-results" aria-live="polite" hidden></div>'
      + '<div id="levelView">' + worldMap(selLevel, built) + '</div>'
      + trophyHtml
      + '<div class="hub-toast" id="toast"></div>');

    each(".world[data-lvl]", function (b) { b.onclick = function () { renderIndex(b.getAttribute("data-lvl")); }; });
    each(".world[data-locked-world]", function (b) { b.onclick = function () { toast("Vence al guardián del mundo anterior para desbloquearlo 🔒"); }; });
    each("[data-go]", function (b) { b.onclick = function () { location.search = "?id=" + encodeURIComponent(b.getAttribute("data-go")); }; });
    each("[data-locked]", function (b) { b.onclick = function () { toast("Completa la lección anterior para desbloquear 🔒"); }; });
    each("[data-locked-boss]", function (b) { b.onclick = function () { toast("Completa todas las lecciones del mundo para enfrentar al guardián 🛡️"); }; });

    /* ---- avatar: traza el sendero y decide si "camina" tras completar una lección ---- */
    (function () {
      var map = byId("wmap"); if (!map) return;
      var curId = AVATAR_LESSON, prevId = null;     // dónde descansa el gato en este mundo
      try { prevId = sessionStorage.getItem("vesper_last_continue"); } catch (e) {}
      if (_indexFirst && prevId && prevId !== curId && built.completed[prevId] && TRAIL_STOPS[prevId] != null) {
        map.setAttribute("data-prev", TRAIL_STOPS[prevId]);   // sólo en carga fresca, no al cambiar de pestaña
      }
      try { sessionStorage.setItem("vesper_last_continue", curId || ""); } catch (e) {}
      /* mide tras el layout (doble rAF): evita medir el sendero antes de tiempo.
         El guardia W<80 en paintTrail reintenta solo si aún no hay layout. */
      requestAnimationFrame(function () { requestAnimationFrame(paintTrail); });
      bindTrailResize();
    })();
    _indexFirst = false;

    /* ---- lógica de búsqueda/filtros (sólo actualiza #searchResults) ---- */
    function searchCard(lid) {
      var l = L[lid]; if (!l) return "";
      var stt = PATH.status(lid, built);
      var badge, attr, cls = "lcard2";
      if (stt === "completed") { cls += " completed"; badge = "&#10003;"; attr = 'data-go="' + esc(lid) + '"'; }
      else if (stt === "open") { badge = "&#9654;"; attr = 'data-go="' + esc(lid) + '"'; }
      else { cls += " locked"; badge = "&#128274;"; attr = 'data-locked="1"'; }
      var sk = PATH.skillOf(l), m = PATH.SKILLS[sk] || { label: "", icon: "" };
      return '<button class="' + cls + '" ' + attr + '>'
        + '<span class="lc-badge">' + badge + '</span>'
        + '<span class="lc-body"><span class="lc-ttl">' + esc(l.title) + '</span>'
        + '<span class="lc-sub" style="display:block;margin-top:3px"><span class="lc-lvl">' + esc(l.level) + '</span>'
        + skillIcon(sk) + ' ' + esc(m.label) + '</span></span>'
        + '<span class="lc-go">' + (stt === "locked" ? "" : "&#8250;") + '</span></button>';
    }
    var fSkill = "all", fState = "all", fQuery = "", fTimer = null;
    function applyFilter() {
      var active = !!fQuery.trim() || fSkill !== "all" || fState !== "all";
      var lvView = byId("levelView"), res = byId("searchResults");
      if (!res) return;
      if (!active) { if (lvView) lvView.hidden = false; res.hidden = true; res.innerHTML = ""; return; }
      if (lvView) lvView.hidden = true;
      res.hidden = false;
      var q = fQuery.trim().toLowerCase();
      var hits = built.order.filter(function (id) {
        var l = L[id]; if (!l) return false;
        if (fSkill !== "all" && PATH.skillOf(l) !== fSkill) return false;
        var stt = PATH.status(id, built);
        if (fState === "completed" && stt !== "completed") return false;
        if (fState === "open" && stt === "completed") return false;
        if (q) {
          var hay = (l.title + " " + (l.track || "") + " " + (l.level || "") + " " + (l.topic || "")).toLowerCase();
          if (hay.indexOf(q) < 0) return false;
        }
        return true;
      });
      if (!hits.length) {
        res.innerHTML = '<p class="search-empty">Sin resultados. Prueba otra palabra o quita un filtro.</p>';
        return;
      }
      res.innerHTML = '<div class="muted" style="margin:0 2px 8px;font-size:.85rem">' + hits.length
        + (hits.length === 1 ? ' lección' : ' lecciones') + '</div>'
        + '<div class="lgrid">' + hits.map(searchCard).join("") + '</div>';
      each("#searchResults [data-go]", function (b) { b.onclick = function () { location.search = "?id=" + encodeURIComponent(b.getAttribute("data-go")); }; });
      each("#searchResults [data-locked]", function (b) { b.onclick = function () { toast("Completa la lección anterior para desbloquear 🔒"); }; });
    }
    var inp = byId("lessonSearch");
    if (inp) inp.oninput = function () { fQuery = inp.value; clearTimeout(fTimer); fTimer = setTimeout(applyFilter, 150); };
    each("#hubSearch [data-skill]", function (b) {
      b.onclick = function () {
        fSkill = b.getAttribute("data-skill");
        each("#hubSearch [data-skill]", function (x) { var on = x === b; x.classList.toggle("on", on); x.setAttribute("aria-pressed", on ? "true" : "false"); });
        applyFilter();
      };
    });
    each("#hubSearch [data-state]", function (b) {
      b.onclick = function () {
        fState = b.getAttribute("data-state");
        each("#hubSearch [data-state]", function (x) { var on = x === b; x.classList.toggle("on", on); x.setAttribute("aria-pressed", on ? "true" : "false"); });
        applyFilter();
      };
    });

    /* abre/cierra el cajón de búsqueda; al cerrar, limpia filtros y vuelve al mapa */
    function resetSearch() {
      fQuery = ""; fSkill = "all"; fState = "all";
      var si = byId("lessonSearch"); if (si) si.value = "";
      each("#hubSearch [data-skill]", function (x) { var on = x.getAttribute("data-skill") === "all"; x.classList.toggle("on", on); x.setAttribute("aria-pressed", on ? "true" : "false"); });
      each("#hubSearch [data-state]", function (x) { var on = x.getAttribute("data-state") === "all"; x.classList.toggle("on", on); x.setAttribute("aria-pressed", on ? "true" : "false"); });
      applyFilter();
    }
    var sTog = byId("searchToggle");
    if (sTog) sTog.onclick = function () {
      var box = byId("hubSearch"); if (!box) return;
      var willOpen = box.hidden;
      box.hidden = !willOpen;
      sTog.setAttribute("aria-expanded", willOpen ? "true" : "false");
      if (willOpen) { var fi = byId("lessonSearch"); if (fi) setTimeout(function () { fi.focus(); }, 30); }
      else resetSearch();
    };
  }

  /* ---------- COVER ---------- */
  function renderCover() {
    applyLessonTheme(lesson.level);
    if (lesson.isBoss) { renderBossCover(); return; }
    var line = (A ? A.personalize("Vamos con: " + lesson.title) : "Vamos con: " + lesson.title);
    show('<div class="wrap">' + topbar(6) + '<div class="card center">'
      + lessonWorldBanner(lesson.level)
      + mascot("welcome", line)
      + '<div class="lcard-top center-row"><span class="pill">' + esc(lesson.level) + '</span><span class="track">' + esc(lesson.track) + '</span></div>'
      + '<h1>' + esc(lesson.title) + '</h1>'
      + (lesson.adapted ? '<div class="adapt-badge">&#10024; ' + esc(lesson.adaptNote) + '</div>' : '')
      + '<p class="muted">' + lesson.exercises.length + ' ejercicios &middot; +' + (lesson.xpReward || 0) + ' XP</p>'
      + '<button class="btn btn-gold" id="start">Empezar</button></div></div>');

  /* portada dramática del Guardián del mundo */
  function renderBossCover() {
    var bm = bossMeta(lesson.bossLevel), t = WORLD_THEME[lesson.bossLevel] || {};
    show('<div class="wrap">' + topbar(6) + '<div class="card center boss-cover" style="' + worldVars(t) + '">'
      + '<div class="boss-emblem" aria-hidden="true">' + shieldSvg() + '</div>'
      + biomeMotif(lesson.bossLevel)
      + '<span class="boss-eyebrow">Examen del mundo &middot; ' + esc(lesson.level) + '</span>'
      + '<h1>' + esc(bm.name) + '</h1>'
      + '<p class="muted">' + lesson.exercises.length + ' preguntas mezcladas de todas las destrezas &middot; necesitas ' + bm.pass + '% para vencerlo</p>'
      + '<p class="boss-warn">Vence al guardián para abrir el mundo siguiente.</p>'

    byId("bk").onclick = function () { location.search = ""; };
