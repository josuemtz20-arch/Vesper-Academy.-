<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habla con Vesper — Tutor IA | Vesper Academy</title>
<meta name="description" content="Conversa en vivo con Vesper, tu tutor de inglés con IA. Personalizado a tu nivel, tono e intereses.">
<!-- App instalable (PWA): isotipo VA como icono -->
<link rel="manifest" href="manifest_lecciones.webmanifest">
<meta name="theme-color" content="#141c2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vesper Chat">
<link rel="icon" href="assets/images/favicon_32.png" type="image/png" sizes="32x32">
<link rel="icon" href="assets/images/va_isotype.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/images/apple_touch_icon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;}
:root{--navy:#141c2a;--navy2:#243654;--gold:#c5a059;--gold2:#a8843d;--cream:#f5f2eb;--border:#e4e0d8;--muted:#6b7a8d;--err:#b03a3a;--ok:#2d7a4f;}
html,body{height:100%;}
body{margin:0;font-family:'Inter',sans-serif;background:var(--cream);color:var(--navy);display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}

/* Header */
header{background:var(--navy);border-bottom:3px solid var(--gold);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex:none;}
.brand{display:flex;align-items:center;gap:11px;color:#fff;text-decoration:none;}
.brand .iso{height:38px;width:38px;flex:none;color:var(--cream);}
.brand b{font-family:'Inria Serif',serif;font-size:1.02rem;line-height:1.05;}
.brand small{display:block;color:var(--gold);font-size:.58rem;letter-spacing:2px;text-transform:uppercase;}
header .right{display:flex;align-items:center;gap:14px;}
header a.back{color:rgba(255,255,255,.75);font-size:.76rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
header a.back:hover{color:var(--gold);}
.btn-new{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);border-radius:18px;padding:6px 13px;font:600 .72rem/1 'Inter',sans-serif;letter-spacing:.4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-new:hover{border-color:var(--gold);color:var(--gold);}
/* Insignia de nivel (Gratis/Pro) — también abre el código Pro */
.tier{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.85);border-radius:18px;padding:6px 12px;font:700 .7rem/1 'Inter',sans-serif;letter-spacing:.4px;cursor:pointer;white-space:nowrap;}
.tier:hover{border-color:var(--gold);color:var(--gold);}
.tier.pro{background:var(--gold);border-color:var(--gold);color:var(--navy);}

/* Zona de chat */
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:820px;width:100%;margin:0 auto;min-height:0;}
.messages{flex:1;overflow-y:auto;padding:24px 18px 8px;display:flex;flex-direction:column;gap:16px;}

.msg{display:flex;gap:11px;max-width:88%;}
.msg .avatar{flex:none;width:38px;height:38px;border-radius:50%;overflow:hidden;background:var(--navy);display:flex;align-items:center;justify-content:center;}
.msg .avatar img{width:100%;height:100%;object-fit:cover;}
.msg .avatar i{color:var(--gold);font-size:1rem;}
.bubble{padding:11px 15px;border-radius:14px;font-size:.94rem;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;box-shadow:0 1px 3px rgba(20,28,42,.07);}

.msg.vesper{align-self:flex-start;}
.msg.vesper .bubble{background:#fff;border:1px solid var(--border);border-top-left-radius:4px;color:#2a3344;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.user .bubble{background:var(--navy);color:var(--cream);border-top-right-radius:4px;}
.msg.user .avatar{background:var(--gold2);}
.msg.user .avatar i{color:#fff;}

.bubble .name{display:block;font-size:.66rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--gold2);margin-bottom:3px;}

/* Indicador de escribiendo */
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 2px;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);opacity:.5;animation:blink 1.2s infinite ease-in-out;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}

.err{align-self:center;background:#fbeaea;border:1px solid #e6c4c4;color:var(--err);font-size:.82rem;padding:9px 14px;border-radius:10px;max-width:90%;text-align:center;line-height:1.5;}
.err a{color:var(--err);font-weight:700;}

/* Barra de entrada */
.composer{flex:none;border-top:1px solid var(--border);background:var(--cream);padding:12px 16px calc(12px + env(safe-area-inset-bottom));}
.composer .row{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;}
.composer textarea{flex:1;resize:none;max-height:140px;min-height:46px;padding:12px 14px;font-size:.95rem;font-family:'Inter',sans-serif;border:1px solid var(--border);border-radius:12px;background:#fff;line-height:1.4;}
.composer textarea:focus{outline:2px solid #e3c35f;border-color:var(--gold);}
.composer .send{flex:none;width:46px;height:46px;border-radius:12px;border:none;background:var(--navy);color:var(--gold);font-size:1.05rem;cursor:pointer;transition:background .15s;}
.composer .send:hover:not(:disabled){background:var(--navy2);}
.composer .send:disabled{opacity:.5;cursor:not-allowed;}
.composer .hint{max-width:820px;margin:7px auto 0;font-size:.7rem;color:var(--muted);text-align:center;}

/* Aviso de configuración (sin PROXY_URL) */
.setup-note{background:#fbf3df;border:1px solid #e7d8a8;border-left:4px solid var(--gold2);color:#5a4d2e;font-size:.82rem;line-height:1.5;padding:11px 15px;border-radius:8px;margin:14px 18px 0;}
.setup-note code{background:#fff;border:1px solid #e7d8a8;border-radius:4px;padding:1px 5px;font-size:.9em;}
</style>
<link rel="stylesheet" href="assets/css/vesper_tokens.css">
</head>
<body>

<header>
  <a class="brand" href="index.html" aria-label="Vesper Academy — inicio">
    <svg class="iso" viewBox="0 0 512 512" aria-hidden="true">
      <g fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="166" y1="150" x2="346" y2="150"/>
        <line x1="166" y1="362" x2="346" y2="362"/>
        <path d="M182 166 L256 256 L330 166"/>
        <path d="M256 256 L184 346 L328 346 Z"/>
        <line x1="219" y1="318" x2="293" y2="318"/>
      </g>
      <g fill="#e3c35f"><circle cx="256" cy="286" r="7"/><circle cx="256" cy="305" r="4.5"/></g>
    </svg>
    <span><b>Vesper</b><small>Tutor IA</small></span>
  </a>
  <div class="right">
    <button class="tier" id="tier" type="button" title="Nivel del chat — toca para un código Pro">Gratis · Haiku</button>
    <button class="btn-new" id="btn-new" type="button"><i class="fas fa-rotate-right"></i> Nueva</button>
    <a class="back" href="leccion.html"><i class="fas fa-arrow-left"></i> Lecciones</a>
  </div>
</header>

<div class="chat-wrap">
  <div class="messages" id="messages" aria-live="polite"></div>
  <div class="composer">
    <div class="row">
      <textarea id="input" rows="1" placeholder="Escribe tu mensaje a Vesper…" autofocus></textarea>
      <button class="send" id="send" type="button" aria-label="Enviar"><i class="fas fa-paper-plane"></i></button>
    </div>
    <p class="hint">Vesper es un tutor con IA. Enter para enviar · Shift+Enter para salto de línea.</p>
  </div>
</div>

<script src="vesper_adaptive.js"></script>
<script src="vesper_persona.js"></script>
<script>
(function () {
  "use strict";

  /* ── Configuración ──
     Pega aquí la URL de tu Cloudflare Worker (ver worker/README.md).
     Mientras esté vacía, el chat muestra instrucciones en lugar de fallar. */
  var PROXY_URL = "https://patient-feather-4364.josuemtz20.workers.dev/";

  var HISTORY_KEY = "vesper_chat_history";
  var PRO_KEY = "vesper_pro_code";

  var messagesEl = document.getElementById("messages");
  var inputEl = document.getElementById("input");
  var sendBtn = document.getElementById("send");
  var newBtn = document.getElementById("btn-new");
  var tierEl = document.getElementById("tier");

  /* Código Pro (desbloquea Sonnet). Vive solo en este dispositivo; el Worker
     lo valida en el servidor. */
  function getProCode() { try { return localStorage.getItem(PRO_KEY) || ""; } catch (e) { return ""; } }
  function setProCode(v) { try { v ? localStorage.setItem(PRO_KEY, v) : localStorage.removeItem(PRO_KEY); } catch (e) {} }

  /* Insignia de nivel. tier: "pro" | "free" | null (desconocido aún). */
  function setTier(tier) {
    if (tier === "pro") {
      tierEl.textContent = "Pro · Sonnet";
      tierEl.classList.add("pro");
    } else {
      tierEl.classList.remove("pro");
      tierEl.textContent = getProCode() ? "Gratis · Haiku ⚠" : "Gratis · Haiku";
    }
  }

  /* Pedir / cambiar / quitar el código Pro */
  tierEl.addEventListener("click", function () {
    var cur = getProCode();
    var msg = cur
      ? "Tu código Pro actual está guardado. Escribe uno nuevo para cambiarlo, o deja el campo vacío para quitarlo:"
      : "¿Tienes un código Pro? Escríbelo para desbloquear a Vesper Pro (Sonnet). Lo dan los profesores / con tu plan.";
    var v = window.prompt(msg, cur);
    if (v === null) return;          // canceló
    v = v.trim();
    setProCode(v);
    setTier(null);                   // se confirmará en el próximo mensaje
    if (v) {
      addError('Código guardado. Se aplicará en tu próximo mensaje. Si es válido, verás <b>Pro · Sonnet</b> arriba.');
    } else {
      addError('Código quitado. Seguirás con Vesper gratis (Haiku).');
    }
  });
  setTier(null);

  /* System prompt del tutor: INCRUSTADO desde el perfil del alumno. */
  function buildSystem() {
    try {
      if (window.VESPER_PERSONA && VESPER_PERSONA.systemPrompt) {
        return VESPER_PERSONA.systemPrompt();
      }
    } catch (e) {}
    return "You are Vesper, a warm and elegant AI English tutor at Vesper Academy. Help the student practise English. Keep replies focused and encouraging.";
  }
  var SYSTEM = buildSystem();

  /* Historial de la conversación enviado a la API. */
  var history = loadHistory();
  var sending = false;

  function loadHistory() {
    try {
      var h = JSON.parse(localStorage.getItem(HISTORY_KEY) || "null");
      if (Array.isArray(h)) return h.filter(function (m) {
        return m && (m.role === "user" || m.role === "assistant") && typeof m.content === "string";
      });
    } catch (e) {}
    return [];
  }
  function saveHistory() {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
  }

  /* ── Render ── */
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function vesperAvatar() {
    var a = el("div", "avatar");
    var img = new Image();
    img.src = "assets/images/mascot/vesper_cat.png";
    img.alt = "Vesper";
    img.onerror = function () { a.innerHTML = '<i class="fas fa-cat"></i>'; };
    a.appendChild(img);
    return a;
  }
  function userAvatar() {
    return el("div", "avatar", '<i class="fas fa-user"></i>');
  }

  /* Crea una burbuja y devuelve el nodo .bubble (para streaming). */
  function addMessage(role, text) {
    var wrap = el("div", "msg " + (role === "user" ? "user" : "vesper"));
    wrap.appendChild(role === "user" ? userAvatar() : vesperAvatar());
    var bubble = el("div", "bubble");
    if (role !== "user") bubble.appendChild(el("span", "name", "Vesper"));
    var body = el("span");
    body.textContent = text || "";
    bubble.appendChild(body);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return body;
  }

  function addTyping() {
    var wrap = el("div", "msg vesper");
    wrap.id = "typing-row";
    wrap.appendChild(vesperAvatar());
    var bubble = el("div", "bubble");
    bubble.appendChild(el("div", "typing", "<span></span><span></span><span></span>"));
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function addError(html) {
    messagesEl.appendChild(el("div", "err", html));
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* Saludo inicial de Vesper (renderizado localmente, no es un turno real). */
  function greet() {
    var text;
    try {
      if (window.VESPER_PERSONA && VESPER_PERSONA.previewMessage) {
        var p = VESPER_PERSONA.previewMessage();
        text = (p.greet ? p.greet : "Hi! I'm Vesper.") + "\n\n" +
               "Soy tu tutor de inglés. Escríbeme lo que quieras practicar — una duda de gramática, una conversación, vocabulario… lo que necesites. 😊";
      }
    } catch (e) {}
    if (!text) text = "Hi! I'm Vesper, your English tutor. Escríbeme lo que quieras practicar y empezamos. 😊";
    addMessage("vesper", text);
  }

  /* Pinta el historial guardado (si lo hay) o el saludo. */
  function renderInitial() {
    messagesEl.innerHTML = "";
    if (!PROXY_URL) {
      messagesEl.appendChild(el("div", "setup-note",
        '<b>Falta conectar el chat.</b> Despliega el proxy (ver <code>worker/README.md</code>) ' +
        'y pega su URL en la constante <code>PROXY_URL</code> de <code>chat.html</code>.'));
    }
    if (history.length) {
      history.forEach(function (m) { addMessage(m.role, m.content); });
    } else {
      greet();
    }
  }

  /* ── Envío + streaming SSE ── */
  function send() {
    if (sending) return;
    var text = inputEl.value.trim();
    if (!text) return;

    if (!PROXY_URL) {
      addError('El chat aún no está conectado. Configura <code>PROXY_URL</code> en chat.html (ver worker/README.md).');
      return;
    }

    inputEl.value = "";
    autoGrow();
    addMessage("user", text);
    history.push({ role: "user", content: text });
    saveHistory();

    sending = true;
    sendBtn.disabled = true;
    var typingRow = addTyping();

    var body;        // nodo de texto de la burbuja de Vesper (se crea al primer token)
    var acc = "";    // texto acumulado

    fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: SYSTEM, messages: history, proCode: getProCode() })
    }).then(function (res) {
      /* nivel que sirvió el servidor (Gratis/Pro) — actualiza la insignia */
      try { setTier(res.headers.get("X-Vesper-Tier")); } catch (e) {}
      if (!res.ok) {
        return res.text().then(function (t) {
          var detail = t;
          try { var j = JSON.parse(t); if (j && j.error) detail = (typeof j.error === "string") ? j.error : (j.error.message || t); } catch (e) {}
          var e = new Error("Vesper no pudo responder (código " + res.status + "): " + (detail || "sin detalle"));
          e.handled = true;
          throw e;
        });
      }
      if (!res.body || !res.body.getReader) {
        throw new Error("streaming-unsupported");
      }
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";

      function ensureBubble() {
        if (!body) {
          if (typingRow && typingRow.parentNode) typingRow.parentNode.removeChild(typingRow);
          typingRow = null;
          body = addMessage("vesper", "");
        }
      }

      function pump() {
        return reader.read().then(function (r) {
          if (r.done) return finish();
          buffer += decoder.decode(r.value, { stream: true });

          /* Los eventos SSE se separan por línea en blanco. */
          var parts = buffer.split("\n");
          buffer = parts.pop(); // resto incompleto
          parts.forEach(function (line) {
            line = line.trim();
            if (!line || line.indexOf("data:") !== 0) return;
            var data = line.slice(5).trim();
            if (data === "[DONE]") return;
            var evt;
            try { evt = JSON.parse(data); } catch (e) { return; }
            if (evt.type === "content_block_delta" && evt.delta &&
                evt.delta.type === "text_delta" && evt.delta.text) {
              ensureBubble();
              acc += evt.delta.text;
              body.textContent = acc;
              scrollToBottom();
            } else if (evt.type === "error") {
              throw new Error(evt.error && evt.error.message ? evt.error.message : "error de la IA");
            }
          });
          return pump();
        });
      }

      function finish() {
        if (acc.trim()) {
          history.push({ role: "assistant", content: acc });
          saveHistory();
        } else {
          ensureBubble();
          body.textContent = "(Vesper no devolvió respuesta. Intenta de nuevo.)";
        }
        done();
      }

      return pump();
    }).catch(function (err) {
      if (typingRow && typingRow.parentNode) typingRow.parentNode.removeChild(typingRow);
      var msg;
      if (err && err.message === "streaming-unsupported") {
        msg = "Tu navegador no soporta streaming. Prueba con uno más reciente.";
      } else if (err && err.handled) {
        msg = escapeHtml(err.message);
      } else {
        /* fetch rechazado sin respuesta: típico de bloqueo CORS/origen o sin red */
        msg = "No se pudo conectar con Vesper. Suele ser un bloqueo de origen (CORS): "
            + "abre la página desde tu dominio autorizado, o revisa tu conexión.";
      }
      addError(msg);
      /* deshace el último turno de usuario para no dejar el historial colgado */
      if (history.length && history[history.length - 1].role === "user") {
        history.pop();
        saveHistory();
      }
      done();
    });

    function done() {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  /* ── Eventos UI ── */
  function autoGrow() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  }
  inputEl.addEventListener("input", autoGrow);
  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener("click", send);

  newBtn.addEventListener("click", function () {
    if (sending) return;
    history = [];
    saveHistory();
    /* refresca el system prompt por si cambió el perfil */
    SYSTEM = buildSystem();
    renderInitial();
    inputEl.focus();
  });

  /* Si cambian las preferencias en otra pestaña, refresca el prompt. */
  window.addEventListener("vesper:persona", function () { SYSTEM = buildSystem(); });

  renderInitial();
})();
</script>

<!-- ── PWA: registro del service worker ── -->
<script>
(function () {
  "use strict";
  if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
