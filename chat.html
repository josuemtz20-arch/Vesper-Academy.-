<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>Habla con Vesper — Tutor IA | Vesper Academy</title>
<meta name="description" content="Conversa en vivo con Vesper, tu tutor de inglés con IA. Personalizado a tu nivel, tono e intereses.">
<!-- App instalable (PWA): isotipo VA como icono -->
<link rel="manifest" href="manifest_lecciones.webmanifest">
<meta name="theme-color" content="#1B1B2F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vesper Chat">
<link rel="icon" href="assets/images/favicon_32.png" type="image/png" sizes="32x32">
<link rel="icon" href="assets/images/va_isotype.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/images/apple_touch_icon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
button,textarea,a{touch-action:manipulation;}
:root{--navy:#1B1B2F;--navy2:#2c2c4a;--gold:#c5a059;--gold2:#a8843d;--cream:#f5f2eb;--border:#e4e0d8;--muted:#6b7a8d;--err:#b03a3a;--ok:#2d7a4f;}
html{height:100%;}
/* Altura bloqueada al viewport real (móvil): --app-h la fija el JS al alto del
   visualViewport, así el teclado no tapa el composer. Fallbacks: 100dvh y 100%. */
body{margin:0;font-family:'Inter',sans-serif;background:var(--cream);color:var(--navy);display:flex;flex-direction:column;height:100%;height:100dvh;height:var(--app-h,100dvh);overflow:hidden;}

/* Header */
header{background:var(--navy);border-bottom:3px solid var(--gold);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex:none;}
.brand{display:flex;align-items:center;gap:11px;color:#fff;text-decoration:none;}
.brand .iso{height:38px;width:38px;flex:none;color:var(--cream);}
.brand b{font-family:'Inria Serif',serif;font-size:1.02rem;line-height:1.05;}
.brand small{display:block;color:var(--gold);font-size:.58rem;letter-spacing:2px;text-transform:uppercase;}
header .right{display:flex;align-items:center;gap:14px;}
header a.back{color:rgba(255,255,255,.75);font-size:.76rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
header a.back:hover{color:var(--gold);}
.btn-new{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);border-radius:18px;padding:6px 13px;font:600 .72rem/1 'Inter',sans-serif;letter-spacing:.4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-new:hover{border-color:var(--gold);color:var(--gold);}
/* Insignia de nivel (Gratis/Pro) — también abre el código Pro */
.tier{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.85);border-radius:18px;padding:6px 12px;font:700 .7rem/1 'Inter',sans-serif;letter-spacing:.4px;cursor:pointer;white-space:nowrap;}
.tier:hover{border-color:var(--gold);color:var(--gold);}
.tier.pro{background:var(--gold);border-color:var(--gold);color:var(--navy);}

/* Zona de chat */
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:820px;width:100%;margin:0 auto;min-height:0;}
.messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:24px 18px 8px;display:flex;flex-direction:column;gap:16px;}

.msg{display:flex;gap:11px;max-width:88%;}
.msg .avatar{flex:none;width:38px;height:38px;border-radius:50%;overflow:hidden;background:var(--navy);display:flex;align-items:center;justify-content:center;}
.msg .avatar img{width:100%;height:100%;object-fit:cover;}
.msg .avatar i{color:var(--gold);font-size:1rem;}
.bubble{padding:11px 15px;border-radius:14px;font-size:.94rem;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;box-shadow:0 1px 3px rgba(27,27,47,.07);}

.msg.vesper{align-self:flex-start;}
.msg.vesper .bubble{background:#fff;border:1px solid var(--border);border-top-left-radius:4px;color:#2a3344;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.user .bubble{background:var(--navy);color:var(--cream);border-top-right-radius:4px;}
.msg.user .avatar{background:var(--gold2);}
.msg.user .avatar i{color:#fff;}

.bubble .name{display:block;font-size:.66rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--gold2);margin-bottom:3px;}

/* Indicador de escribiendo */
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 2px;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);opacity:.5;animation:blink 1.2s infinite ease-in-out;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}

.err{align-self:center;background:#fbeaea;border:1px solid #e6c4c4;color:var(--err);font-size:.82rem;padding:9px 14px;border-radius:10px;max-width:90%;text-align:center;line-height:1.5;}
.err a{color:var(--err);font-weight:700;}

/* Barra de entrada */
.composer{flex:none;border-top:1px solid var(--border);background:var(--cream);padding:12px 16px calc(12px + env(safe-area-inset-bottom));}
.composer .row{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;}
/* font-size:16px evita el zoom automático de iOS Safari al enfocar */
.composer textarea{flex:1;resize:none;max-height:140px;min-height:46px;padding:12px 14px;font-size:16px;font-family:'Inter',sans-serif;border:1px solid var(--border);border-radius:12px;background:#fff;line-height:1.4;}
.composer textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(197,160,89,.28);}
.composer .send{flex:none;width:46px;height:46px;border-radius:12px;border:none;background:var(--navy);color:var(--gold);font-size:1.05rem;cursor:pointer;transition:background .15s;}
.composer .send:hover:not(:disabled){background:var(--navy2);}
.composer .send:disabled{opacity:.5;cursor:not-allowed;}
.composer .hint{max-width:820px;margin:7px auto 0;font-size:.7rem;color:var(--muted);text-align:center;}

/* Aviso de configuración (sin PROXY_URL) */
.setup-note{background:#fbf3df;border:1px solid #e7d8a8;border-left:4px solid var(--gold2);color:#5a4d2e;font-size:.82rem;line-height:1.5;padding:11px 15px;border-radius:8px;margin:14px 18px 0;}
.setup-note code{background:#fff;border:1px solid #e7d8a8;border-radius:4px;padding:1px 5px;font-size:.9em;}

/* ── Nivel 1: hablar (micrófono, voz de Vesper, práctica de pronunciación) ── */
.iconbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.85);border-radius:18px;padding:6px 10px;font:700 .72rem/1 'Inter',sans-serif;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.iconbtn:hover{border-color:var(--gold);color:var(--gold);}
.iconbtn.on{background:var(--gold);border-color:var(--gold);color:var(--navy);}

.mic{flex:none;width:46px;height:46px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--navy);font-size:1.05rem;cursor:pointer;transition:.15s;}
.mic:hover{border-color:var(--gold);color:var(--gold2);}
.mic.on{background:var(--err);border-color:var(--err);color:#fff;animation:micpulse 1.2s infinite;}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(176,58,58,.45);}50%{box-shadow:0 0 0 7px rgba(176,58,58,0);}}

.say-row{margin-top:7px;}
.say-btn{background:rgba(197,160,89,.14);border:1px solid var(--gold);color:var(--gold2);border-radius:13px;padding:10px 14px;min-height:44px;font:700 .76rem/1 'Inter',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.say-btn:hover{background:var(--gold);color:var(--navy);}

.pron{margin:2px 0;border:1px solid var(--gold);background:#fff;border-radius:14px;padding:13px 15px 14px;max-width:88%;align-self:flex-start;box-shadow:0 2px 12px rgba(27,27,47,.10);overflow-wrap:anywhere;}
.pron h4{margin:0 0 8px;font:800 .68rem/1.2 'Inter',sans-serif;letter-spacing:.5px;text-transform:uppercase;color:var(--gold2);}
.pron .target{font-size:1.06rem;line-height:1.75;margin-bottom:11px;color:#2a3344;}
.pron .target b{font-weight:600;padding:1px 2px;border-radius:5px;}
.pron .target b.hit{color:var(--ok);}
.pron .target b.miss{color:var(--err);background:rgba(176,58,58,.09);}
.pron .ctl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.pron .pbtn{border:1px solid var(--border);background:var(--cream);color:var(--navy);border-radius:11px;padding:9px 13px;font:700 .8rem/1 'Inter',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.pron .pbtn.primary{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.pron .pbtn.listening{background:var(--err);color:#fff;border-color:var(--err);animation:micpulse 1.2s infinite;}
.pron .score{font:800 1.05rem/1 'Inter',sans-serif;margin-left:auto;}
.pron .score.good{color:var(--ok);}.pron .score.mid{color:var(--gold2);}.pron .score.low{color:var(--err);}
.pron .fb{font-size:.84rem;color:var(--muted);margin-top:9px;line-height:1.5;}
.pron .close{float:right;background:none;border:none;color:var(--muted);font-size:1.2rem;line-height:1;cursor:pointer;width:40px;height:40px;margin:-9px -9px 0 0;display:flex;align-items:center;justify-content:center;border-radius:9px;}

.chat-cta{align-self:center;max-width:92%;display:flex;gap:12px;align-items:center;background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--cream);border:none;border-radius:14px;padding:13px 16px;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;margin:6px 0;box-shadow:0 4px 16px rgba(27,27,47,.18);}
.chat-cta .cic{flex:none;width:38px;height:38px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:1.05rem;}
.chat-cta .ctx b{display:block;font-size:.92rem;}.chat-cta .ctx span{font-size:.78rem;opacity:.85;}
.chat-cta .go{margin-left:auto;color:var(--gold);font-weight:700;font-size:1.15rem;}

/* ── Accesibilidad: foco visible por teclado (todos los controles) ── */
.iconbtn:focus-visible,.tier:focus-visible,.btn-new:focus-visible,header a.back:focus-visible,
.mic:focus-visible,.composer .send:focus-visible,.say-btn:focus-visible,
.pron .pbtn:focus-visible,.pron .close:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px;}
.brand:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:8px;}

/* ── Menos movimiento: congela las animaciones en bucle ── */
@media (prefers-reduced-motion:reduce){
  .typing span,.mic.on,.pron .pbtn.listening{animation:none!important;}
}

/* Header compacto + ergonomía táctil en móvil */
@media (max-width:480px){
  header{padding:8px 12px;}
  header .right{gap:7px;}
  .brand small{display:none;}
  .brand .iso{height:34px;width:34px;}
  .back .lbl,.btn-new .lbl{display:none;}
  .tier-model{display:none;}                 /* deja solo "Gratis"/"Pro" para que el header quepa */
  /* objetivos táctiles ≥44px */
  .iconbtn,.btn-new,.tier,header a.back{min-height:44px;display:inline-flex;align-items:center;}
  .iconbtn,.btn-new,header a.back,.tier{padding:6px 11px;}
  /* aprovecha el ancho: menos padding lateral */
  .messages{padding:16px 11px 6px;gap:13px;}
  .msg{max-width:92%;}
  .composer{padding:9px 11px calc(9px + env(safe-area-inset-bottom));}
  .composer .row{gap:8px;}
  .composer .hint{display:none;}              /* el placeholder ya repite la pista */
  /* paneles y CTA caben mejor */
  .pron{max-width:96%;padding:11px 12px 12px;}
  .pron .ctl{gap:6px;}
  .pron .pbtn{padding:9px 11px;font-size:.78rem;}
  .chat-cta{max-width:96%;padding:11px 13px;gap:10px;}
}

/* Pantallas muy estrechas (≤360px): apretar el header sin desbordar */
@media (max-width:360px){
  .brand b{font-size:.95rem;}
  header .right{gap:5px;}
  .iconbtn,.btn-new,header a.back,.tier{padding:6px 9px;}
  .tier{font-size:.66rem;}
}
</style>

<body>

<header>
  <a class="brand" href="index.html" aria-label="Vesper Academy — inicio">
    <svg class="iso" viewBox="0 0 512 512" aria-hidden="true">
      <g fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="166" y1="150" x2="346" y2="150"/>
        <line x1="166" y1="362" x2="346" y2="362"/>
        <path d="M182 166 L256 256 L330 166"/>
        <path d="M256 256 L184 346 L328 346 Z"/>
        <line x1="219" y1="318" x2="293" y2="318"/>
      </g>
      <g fill="#d9bd84"><circle cx="256" cy="286" r="7"/><circle cx="256" cy="305" r="4.5"/></g>
    </svg>
    <span><b>Vesper</b><small>Tutor IA</small></span>
  </a>
  <div class="right">
    <button class="iconbtn" id="tts" type="button" title="Vesper lee sus respuestas en voz alta" aria-pressed="true"><i class="fas fa-volume-high"></i></button>
    <button class="tier" id="tier" type="button" title="Nivel del chat — toca para un código Pro">Gratis<span class="tier-model"> · Haiku</span></button>

  </div>
</header>

<div class="chat-wrap">
  <div class="messages" id="messages" aria-live="polite"></div>
  <div class="composer">
    <div class="row">
      <textarea id="input" rows="1" placeholder="Escribe o toca 🎙️ para hablar…" aria-label="Escribe tu mensaje para Vesper"></textarea>
      <button class="mic" id="mic" type="button" aria-label="Hablar (dictado por voz)" title="Hablar"><i class="fas fa-microphone"></i></button>
      <button class="send" id="send" type="button" aria-label="Enviar"><i class="fas fa-paper-plane"></i></button>
    </div>
    <p class="hint">🎙️ Toca el micrófono para hablar · Enter para enviar · practica sin miedo a equivocarte.</p>
  </div>
</div>

<script src="vesper_adaptive.js"></script>
<script src="vesper_persona.js"></script>
<script src="vesper_analytics.js"></script>
<script>
(function () {
  "use strict";

  /* ── Configuración ──
     Pega aquí la URL de tu Cloudflare Worker (ver worker/README.md).
     Mientras esté vacía, el chat muestra instrucciones en lugar de fallar. */
  var PROXY_URL = "https://patient-feather-4364.josuemtz20.workers.dev/";

  var HISTORY_KEY = "vesper_chat_history";
  var PRO_KEY = "vesper_pro_code";

  var messagesEl = document.getElementById("messages");
  var inputEl = document.getElementById("input");
  var sendBtn = document.getElementById("send");
  var newBtn = document.getElementById("btn-new");
  var tierEl = document.getElementById("tier");

  /* Código Pro (desbloquea Sonnet). Vive solo en este dispositivo; el Worker
     lo valida en el servidor. */
  function getProCode() { try { return localStorage.getItem(PRO_KEY) || ""; } catch (e) { return ""; } }
  function setProCode(v) { try { v ? localStorage.setItem(PRO_KEY, v) : localStorage.removeItem(PRO_KEY); } catch (e) {} }

  /* Insignia de nivel. tier: "pro" | "free" | null (desconocido aún). */
  function setTier(tier) {
    if (tier === "pro") {
      tierEl.innerHTML = 'Pro<span class="tier-model"> · Sonnet</span>';
      tierEl.classList.add("pro");
    } else {
      tierEl.classList.remove("pro");
      tierEl.innerHTML = 'Gratis<span class="tier-model"> · Haiku</span>' + (getProCode() ? " ⚠" : "");
    }
  }

  /* Pedir / cambiar / quitar el código Pro */
  tierEl.addEventListener("click", function () {
    var cur = getProCode();
    var msg = cur
      ? "Tu código Pro actual está guardado. Escribe uno nuevo para cambiarlo, o deja el campo vacío para quitarlo:"
      : "¿Tienes un código Pro? Escríbelo para desbloquear a Vesper Pro (Sonnet). Lo dan los profesores / con tu plan.";
    var v = window.prompt(msg, cur);
    if (v === null) return;          // canceló
    v = v.trim();
    setProCode(v);
    setTier(null);                   // se confirmará en el próximo mensaje
    if (v) {
      addError('Código guardado. Se aplicará en tu próximo mensaje. Si es válido, verás <b>Pro · Sonnet</b> arriba.');
    } else {
      addError('Código quitado. Seguirás con Vesper gratis (Haiku).');
    }
  });
  setTier(null);

  /* System prompt del tutor: INCRUSTADO desde el perfil del alumno. */
  function buildSystem() {
    try {
      if (window.VESPER_PERSONA && VESPER_PERSONA.systemPrompt) {
        return VESPER_PERSONA.systemPrompt();
      }
    } catch (e) {}
    return "You are Vesper, a warm and elegant AI English tutor at Vesper Academy. Help the student practise English. Keep replies focused and encouraging.";
  }
  var SYSTEM = buildSystem();

  /* Historial de la conversación enviado a la API. */
  var history = loadHistory();
  var sending = false;

  function loadHistory() {
    try {
      var h = JSON.parse(localStorage.getItem(HISTORY_KEY) || "null");
      if (Array.isArray(h)) return h.filter(function (m) {
        return m && (m.role === "user" || m.role === "assistant") && typeof m.content === "string";
      });
    } catch (e) {}
    return [];
  }
  function saveHistory() {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
  }

  /* ── Render ── */
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function vesperAvatar() {
    var a = el("div", "avatar");
    var img = new Image();
    img.src = "assets/images/mascot/vesper_cat.png";
    img.alt = "Vesper";
    img.onerror = function () { a.innerHTML = '<i class="fas fa-cat"></i>'; };
    a.appendChild(img);
    return a;
  }
  function userAvatar() {
    return el("div", "avatar", '<i class="fas fa-user"></i>');
  }

  /* Crea una burbuja y devuelve el nodo .bubble (para streaming). */
  function addMessage(role, text) {
    var wrap = el("div", "msg " + (role === "user" ? "user" : "vesper"));
    wrap.appendChild(role === "user" ? userAvatar() : vesperAvatar());
    var bubble = el("div", "bubble");
    if (role !== "user") bubble.appendChild(el("span", "name", "Vesper"));
    var body = el("span");
    body.textContent = text || "";
    bubble.appendChild(body);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return body;
  }

  function addTyping() {
    var wrap = el("div", "msg vesper");
    wrap.id = "typing-row";
    wrap.appendChild(vesperAvatar());
    var bubble = el("div", "bubble");
    bubble.appendChild(el("div", "typing", "<span></span><span></span><span></span>"));
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function addError(html) {
    messagesEl.appendChild(el("div", "err", html));
    scrollToBottom();
  }

  /* Scroll al final, agrupado por frame (rAF): durante el streaming se llama
     muchas veces por segundo; así evitamos reflows en cada token (jank en móvil). */
  var _scrollQueued = false;
  function scrollToBottom() {
    if (_scrollQueued) return;
    _scrollQueued = true;
    requestAnimationFrame(function () {
      _scrollQueued = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }
  function nearBottom() {
    return (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight) < 140;
  }

  /* ── Móvil: la altura real cambia con el teclado y la barra de URL.
     Anclamos --app-h al alto del visualViewport para que el composer nunca
     quede tapado por el teclado, y reflotamos el último mensaje. ── */
  (function setupMobileViewport() {
    var vv = window.visualViewport;
    function apply() {
      var h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--app-h", Math.round(h) + "px");
      if (nearBottom()) scrollToBottom();
    }
    apply();
    if (vv) { vv.addEventListener("resize", apply); }
    else { window.addEventListener("resize", apply); }
    /* al enfocar el cuadro de texto, sube el último mensaje sobre el teclado */
    inputEl.addEventListener("focus", function () { setTimeout(scrollToBottom, 250); });
  })();

  /* Saludo inicial de Vesper (renderizado localmente, no es un turno real). */
  function greet() {
    var text;
    try {
      if (window.VESPER_PERSONA && VESPER_PERSONA.previewMessage) {
        var p = VESPER_PERSONA.previewMessage();
        text = (p.greet ? p.greet : "Hi! I'm Vesper.") + "\n\n" +
               "Soy tu tutor de inglés. Escríbeme lo que quieras practicar — una duda de gramática, una conversación, vocabulario… lo que necesites. 😊";
      }
    } catch (e) {}
    if (!text) text = "Hi! I'm Vesper, your English tutor. Escríbeme lo que quieras practicar y empezamos. 😊";
    decorate(addMessage("vesper", text), text);
  }

  /* Pinta el historial guardado (si lo hay) o el saludo. */
  function renderInitial() {
    messagesEl.innerHTML = "";
    if (!PROXY_URL) {
      messagesEl.appendChild(el("div", "setup-note",
        '<b>Falta conectar el chat.</b> Despliega el proxy (ver <code>worker/README.md</code>) ' +
        'y pega su URL en la constante <code>PROXY_URL</code> de <code>chat.html</code>.'));
    }
    if (history.length) {
      history.forEach(function (m) {
        var b = addMessage(m.role, m.content);
        if (m.role !== "user") decorate(b, m.content);
      });
    } else {
      greet();
    }
  }

  /* ── Envío + streaming SSE ── */
  function send() {
    if (sending) return;
    var text = inputEl.value.trim();
    if (!text) return;

    if (!PROXY_URL) {
      addError('El chat aún no está conectado. Configura <code>PROXY_URL</code> en chat.html (ver worker/README.md).');
      return;
    }

    inputEl.value = "";
    autoGrow();
    addMessage("user", text);
    history.push({ role: "user", content: text });
    saveHistory();
    track("chat_send", { len: text.length });

    sending = true;
    sendBtn.disabled = true;
    var typingRow = addTyping();

    var body;        // nodo de texto de la burbuja de Vesper (se crea al primer token)
    var acc = "";    // texto acumulado

    fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: SYSTEM, messages: history, proCode: getProCode() })
    }).then(function (res) {
      /* nivel que sirvió el servidor (Gratis/Pro) — actualiza la insignia */
      try { setTier(res.headers.get("X-Vesper-Tier")); } catch (e) {}
      if (!res.ok) {
        return res.text().then(function (t) {
          var detail = t;
          try { var j = JSON.parse(t); if (j && j.error) detail = (typeof j.error === "string") ? j.error : (j.error.message || t); } catch (e) {}
          var e = new Error("Vesper no pudo responder (código " + res.status + "): " + (detail || "sin detalle"));
          e.handled = true;
          throw e;
        });
      }
      if (!res.body || !res.body.getReader) {
        throw new Error("streaming-unsupported");
      }
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";

      function ensureBubble() {
        if (!body) {
          if (typingRow && typingRow.parentNode) typingRow.parentNode.removeChild(typingRow);
          typingRow = null;
          body = addMessage("vesper", "");
        }
      }

      function pump() {
        return reader.read().then(function (r) {
          if (r.done) return finish();
          buffer += decoder.decode(r.value, { stream: true });

          /* Los eventos SSE se separan por línea en blanco. */
          var parts = buffer.split("\n");
          buffer = parts.pop(); // resto incompleto
          parts.forEach(function (line) {
            line = line.trim();
            if (!line || line.indexOf("data:") !== 0) return;
            var data = line.slice(5).trim();
            if (data === "[DONE]") return;
            var evt;
            try { evt = JSON.parse(data); } catch (e) { return; }
            if (evt.type === "content_block_delta" && evt.delta &&
                evt.delta.type === "text_delta" && evt.delta.text) {
              ensureBubble();
              acc += evt.delta.text;
              body.textContent = acc;
              scrollToBottom();
            } else if (evt.type === "error") {
              throw new Error(evt.error && evt.error.message ? evt.error.message : "error de la IA");
            }
          });
          return pump();
        });
      }

      function finish() {
        if (acc.trim()) {
          history.push({ role: "assistant", content: acc });
          saveHistory();
          decorate(body, acc);
          if (ttsOn) speak(englishPart(acc));
          maybeCta();
        } else {
          ensureBubble();
          body.textContent = "(Vesper no devolvió respuesta. Intenta de nuevo.)";
        }
        done();
      }

      return pump();
    }).catch(function (err) {
      if (typingRow && typingRow.parentNode) typingRow.parentNode.removeChild(typingRow);
      var msg;
      if (err && err.message === "streaming-unsupported") {
        msg = "Tu navegador no soporta streaming. Prueba con uno más reciente.";
      } else if (err && err.handled) {
        msg = escapeHtml(err.message);
      } else {
        /* fetch rechazado sin respuesta: típico de bloqueo CORS/origen o sin red */
        msg = "No se pudo conectar con Vesper. Suele ser un bloqueo de origen (CORS): "
            + "abre la página desde tu dominio autorizado, o revisa tu conexión.";
      }
      addError(msg);
      /* deshace el último turno de usuario para no dejar el historial colgado */
      if (history.length && history[history.length - 1].role === "user") {
        history.pop();
        saveHistory();
      }
      done();
    });

    function done() {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  /* ── Eventos UI ── */
  function autoGrow() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  }
  inputEl.addEventListener("input", autoGrow);
  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener("click", send);

  newBtn.addEventListener("click", function () {
    if (sending) return;
    history = [];
    saveHistory();
    /* refresca el system prompt por si cambió el perfil */
    SYSTEM = buildSystem();
    renderInitial();
    inputEl.focus();
  });

  /* Si cambian las preferencias en otra pestaña, refresca el prompt. */
  window.addEventListener("vesper:persona", function () { SYSTEM = buildSystem(); });

  /* ════════════════════════════════════════════════════════════
     NIVEL 1 — Práctica de HABLAR: micrófono (dictado), voz de Vesper
     (TTS) y práctica de pronunciación con feedback palabra por palabra.
     Todo en el cliente (Web Speech API); sin tocar el backend. Es el
     on-ramp natural a las clases en vivo (CTA al examen de nivel).
     ════════════════════════════════════════════════════════════ */
  function track(ev, props) { try { if (window.VA) VA.track(ev, props || {}); } catch (e) {} }
  function goLead(src) {
    if (window.VA) { VA.goPlacement(src); return; }
    location.href = "book_placement.html?src=" + encodeURIComponent(src || "chat");
  }

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var canSTT = !!SR;
  var canTTS = ("speechSynthesis" in window) && ("SpeechSynthesisUtterance" in window);

  var micBtn = document.getElementById("mic");
  var ttsBtn = document.getElementById("tts");
  if (!canSTT && micBtn) micBtn.style.display = "none";
  if (!canTTS && ttsBtn) ttsBtn.style.display = "none";

  /* ── Voz de Vesper (TTS) ── */
  var TTS_KEY = "vesper_chat_tts";
  var ttsOn = canTTS && (function () { try { var v = localStorage.getItem(TTS_KEY); return v === null ? true : v === "1"; } catch (e) { return true; } })();
  var _voices = [];
  function loadVoices() { try { _voices = window.speechSynthesis.getVoices() || []; } catch (e) { _voices = []; } }
  if (canTTS) { loadVoices(); try { window.speechSynthesis.onvoiceschanged = loadVoices; } catch (e) {} }
  function enVoice() {
    var pref = ["Google US English", "Samantha", "Microsoft Aria", "Microsoft Jenny", "Microsoft Zira"];
    for (var i = 0; i < pref.length; i++) for (var j = 0; j < _voices.length; j++) if (_voices[j].name.indexOf(pref[i]) === 0) return _voices[j];
    for (var k = 0; k < _voices.length; k++) if ((_voices[k].lang || "").toLowerCase().indexOf("en-us") === 0) return _voices[k];
    for (var m = 0; m < _voices.length; m++) if ((_voices[m].lang || "").toLowerCase().indexOf("en") === 0) return _voices[m];
    return null;
  }
  function speak(text, rate) {
    if (!canTTS || !text) return;
    try {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US"; u.rate = rate || 0.95;
      var v = enVoice(); if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }
  if (ttsBtn) {
    var paintTts = function () {
      ttsBtn.classList.toggle("on", ttsOn);
      ttsBtn.setAttribute("aria-pressed", ttsOn ? "true" : "false");
      ttsBtn.innerHTML = '<i class="fas fa-volume-' + (ttsOn ? "high" : "xmark") + '"></i>';
      ttsBtn.title = ttsOn ? "Vesper lee en voz alta (tocar para silenciar)" : "Voz de Vesper silenciada (tocar para activar)";
    };
    paintTts();
    ttsBtn.addEventListener("click", function () {
      ttsOn = !ttsOn;
      try { localStorage.setItem(TTS_KEY, ttsOn ? "1" : "0"); } catch (e) {}
      if (!ttsOn) { try { window.speechSynthesis.cancel(); } catch (e) {} }
      paintTts(); track("tts_toggle", { on: ttsOn });
    });
  }

  /* ── Extraer la parte en inglés (para leer y para practicar) ── */
  function splitSentences(t) { return (String(t).replace(/\s+/g, " ").match(/[^.!?]+[.!?]*/g) || [String(t)]); }
  function isEng(s) { if (/[áéíóúñ¿¡]/i.test(s)) return false; return (s.toLowerCase().match(/[a-z']+/g) || []).length >= 2; }
  function englishPart(text) { return splitSentences(text).map(function (s) { return s.trim(); }).filter(Boolean).filter(isEng).join(" ").trim(); }

  /* ── Dictado por voz hacia el cuadro de texto ── */
  var rec = null, listening = false;
  function setMic(on) { listening = on; if (micBtn) { micBtn.classList.toggle("on", on); micBtn.setAttribute("aria-label", on ? "Detener" : "Hablar (dictado por voz)"); } }
  function startDictation() {
    if (!canSTT || listening) return;
    try { rec = new SR(); } catch (e) { return; }
    rec.lang = "en-US"; rec.interimResults = true; rec.continuous = false; rec.maxAlternatives = 1;
    var base = inputEl.value.trim();
    rec.onresult = function (e) {
      var fin = "", int = "";
      for (var i = e.resultIndex; i < e.results.length; i++) { var r = e.results[i]; if (r.isFinal) fin += r[0].transcript; else int += r[0].transcript; }
      inputEl.value = (base ? base + " " : "") + (fin || int); autoGrow();
    };
    rec.onerror = function () { setMic(false); };
    rec.onend = function () { setMic(false); inputEl.focus(); };
    try { rec.start(); setMic(true); track("voice_input_used"); bumpSpeak(); } catch (e) { setMic(false); }
  }
  if (micBtn) micBtn.addEventListener("click", function () {
    if (listening) { try { rec.stop(); } catch (e) {} setMic(false); }
    else startDictation();
  });

  /* ── Botón "Practícalo" bajo cada respuesta de Vesper ── */
  function decorate(body, text) {
    if (!canSTT || !body || !body.parentNode) return;
    var target = englishPart(text);
    if (!target || target.split(/\s+/).length < 2) return;   // nada útil que practicar
    var bubble = body.parentNode;
    if (bubble.querySelector(".say-row")) return;             // idempotente
    var row = el("div", "say-row");
    var btn = el("button", "say-btn", '<i class="fas fa-microphone-lines"></i> Practícalo');
    btn.type = "button";
    btn.addEventListener("click", function () { openPron(target, bubble.parentNode); });
    row.appendChild(btn);
    bubble.appendChild(row);
  }

  /* ── Puntuación de pronunciación (bag-of-words, tolerante al orden) ── */
  function normWords(s) { return (String(s).toLowerCase().match(/[a-z0-9']+/g) || []); }
  function scorePron(target, said) {
    var T = normWords(target), pool = normWords(said);
    var matched = T.map(function (w) { var i = pool.indexOf(w); if (i >= 0) { pool.splice(i, 1); return true; } return false; });
    var hits = matched.filter(Boolean).length;
    return { pct: Math.round(100 * hits / Math.max(1, T.length)), hits: hits, total: T.length, matched: matched, words: T };
  }
  function openPron(target, afterRow) {
    track("pron_practice"); bumpSpeak();
    var panel = el("div", "pron"), pr = null, prListening = false;
    function render(result) {
      var tgtHtml = result
        ? result.words.map(function (w, i) { return '<b class="' + (result.matched[i] ? "hit" : "miss") + '">' + escapeHtml(w) + "</b>"; }).join(" ")
        : escapeHtml(target);
      var scoreHtml = result ? '<span class="score ' + (result.pct >= 80 ? "good" : result.pct >= 50 ? "mid" : "low") + '">' + result.pct + "%</span>" : "";
      var fb = result
        ? (result.pct >= 80 ? "¡Muy bien! Suenas claro. " : result.pct >= 50 ? "Vas bien. Repite las palabras en rojo. " : "Sigue practicando — di cada palabra despacio. ")
          + (result.pct < 100 ? "Toca «Escúchalo» para oír el modelo." : "")
        : "Lee la frase en voz alta. Toca «Habla ahora» y dila.";
      panel.innerHTML =
        '<button class="close" aria-label="Cerrar">&times;</button>'
        + '<h4><i class="fas fa-microphone-lines"></i> Practica decirlo</h4>'
        + '<div class="target">' + tgtHtml + "</div>"
        + '<div class="ctl">'
        +   '<button class="pbtn primary" data-act="rec"><i class="fas fa-microphone"></i> ' + (result ? "Otra vez" : "Habla ahora") + "</button>"
        +   '<button class="pbtn" data-act="listen"><i class="fas fa-volume-high"></i> Escúchalo</button>'
        +   scoreHtml
        + "</div>"
        + '<div class="fb">' + fb + "</div>";
      panel.querySelector(".close").onclick = function () { try { if (pr) pr.abort(); } catch (e) {} if (panel.parentNode) panel.parentNode.removeChild(panel); };
      panel.querySelector('[data-act="listen"]').onclick = function () { speak(target); };
      panel.querySelector('[data-act="rec"]').onclick = runPron;
    }
    function runPron() {
      if (!canSTT || prListening) return;
      try { pr = new SR(); } catch (e) { return; }
      pr.lang = "en-US"; pr.interimResults = false; pr.continuous = false; pr.maxAlternatives = 1;
      var recBtn = panel.querySelector('[data-act="rec"]');
      pr.onresult = function (e) {
        var said = ""; for (var i = 0; i < e.results.length; i++) said += e.results[i][0].transcript;
        var res = scorePron(target, said); track("pron_score", { pct: res.pct }); render(res); maybeCta();
      };
      pr.onerror = function () { prListening = false; if (recBtn) { recBtn.classList.remove("listening"); recBtn.innerHTML = '<i class="fas fa-microphone"></i> Otra vez'; } };
      pr.onend = function () { prListening = false; if (recBtn) recBtn.classList.remove("listening"); };
      try { pr.start(); prListening = true; recBtn.classList.add("listening"); recBtn.innerHTML = '<i class="fas fa-microphone"></i> Escuchando…'; } catch (e) {}
    }
    render(null);
    if (afterRow && afterRow.parentNode) afterRow.parentNode.insertBefore(panel, afterRow.nextSibling);
    else messagesEl.appendChild(panel);
    scrollToBottom();
  }

  /* ── On-ramp: tras practicar hablar, ofrece la clase en vivo ── */
  var SPEAK_KEY = "vesper_chat_speakacts";
  function bumpSpeak() { try { sessionStorage.setItem(SPEAK_KEY, (+sessionStorage.getItem(SPEAK_KEY) || 0) + 1); } catch (e) {} }
  function speakActs() { try { return +sessionStorage.getItem(SPEAK_KEY) || 0; } catch (e) { return 0; } }
  function maybeCta() {
    if (speakActs() < 2) return;
    try { if (sessionStorage.getItem("vesper_chat_cta") === "1") return; sessionStorage.setItem("vesper_chat_cta", "1"); } catch (e) {}
    var c = el("button", "chat-cta");
    c.type = "button";
    c.innerHTML = '<span class="cic"><i class="fas fa-graduation-cap"></i></span>'
      + '<span class="ctx"><b>¿Listo para hablar con un profesor?</b>'
      + "<span>Practicar aquí es el primer paso. Haz tu examen de nivel gratis.</span></span>"
      + '<span class="go">&rarr;</span>';
    c.addEventListener("click", function () { goLead("chat-speaking"); });
    messagesEl.appendChild(c); scrollToBottom();
  }

  track("chat_view", { stt: canSTT, tts: canTTS });

  renderInitial();

  /* Enfoca el cuadro solo en escritorio. En móvil NO: abrir el teclado de golpe
     taparía el saludo de Vesper. Allí el foco ocurre cuando el alumno lo toca. */
  if (window.matchMedia && window.matchMedia("(min-width:768px)").matches && !("ontouchstart" in window)) {
    try { inputEl.focus(); } catch (e) {}
  }
})();
</script>

<!-- ── PWA: registro del service worker ── -->
<script>
(function () {
  "use strict";
  if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
